function ss(p){S={...S,...p};if(p.data)S.data={...S.data,...p.data};render();}

function h(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="cls")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.flat(9).forEach(c=>{if(c==null||c===false||c===undefined)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}
const div=(p,...k)=>h("div",p,...k);
const span=(p,...k)=>h("span",p,...k);

function btn(label,cb,type="primary",extra={}){
  const styles={
    primary:{background:"linear-gradient(135deg,#2563EB,#1D4ED8)",color:"#fff",border:"none",boxShadow:"0 4px 15px rgba(37,99,235,.3)"},
    white:{background:"#fff",color:"#2563EB",border:"1px solid #DBEAFE"},
    danger:{background:"#FEE2E2",color:"#DC2626",border:"1px solid #FECACA"},
    success:{background:"#DCFCE7",color:"#16A34A",border:"1px solid #BBF7D0"},
    ghost:{background:"transparent",color:"#64748B",border:"1px solid #E2E8F0"},
  };
  return h("button",{style:{...styles[type]||styles.primary,padding:"11px 20px",borderRadius:12,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap",...extra},onClick:cb},label);
}

function card(style={},...kids){
  return div({style:{background:"#fff",borderRadius:18,padding:20,boxShadow:"0 2px 20px rgba(0,0,0,.06)",border:"1px solid #EEF2FF",...style}},...kids);
}

function inp(ph,val,cb,type="text",extra={}){
  const e=h("input",{type,placeholder:ph,value:val||"",style:{width:"100%",padding:"13px 16px",background:"#F8FAFF",border:"2px solid #E8EEFF",borderRadius:12,color:"#1a1a2e",fontSize:14,outline:"none",transition:"border .2s",...extra}});
  e.addEventListener("input",ev=>cb(ev.target.value));
  e.addEventListener("focus",()=>e.style.borderColor="#2563EB");
  e.addEventListener("blur",()=>e.style.borderColor="#E8EEFF");
  return e;
}

function sel(options,value,cb,extra={}){
  const e=h("select",{style:{width:"100%",padding:"13px 16px",background:"#F8FAFF",border:"2px solid #E8EEFF",borderRadius:12,color:"#1a1a2e",fontSize:14,outline:"none",...extra}});
  options.forEach(([v,l])=>{const o=h("option",{value:v},l);if(v===value)o.selected=true;e.appendChild(o);});
  e.addEventListener("change",ev=>cb(ev.target.value));
  return e;
}

function toggle(active,cb){
  const w=div({style:{width:48,height:26,borderRadius:13,background:active?"#2563EB":"#CBD5E1",cursor:"pointer",position:"relative",transition:"background .25s",flexShrink:0}});
  w.appendChild(div({style:{position:"absolute",top:3,left:active?25:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}));
  w.addEventListener("click",()=>cb(!active));
  return w;
}

function badge(lbl,color="#2563EB"){
  return span({style:{background:color+"15",color,border:`1px solid ${color}30`,padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:600}},lbl);
}

function field(lbl,...kids){
  return div({style:{marginBottom:16}},
    div({style:{fontSize:11,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:7}},lbl),
    ...kids

async function loadAll(){
  ss({loading:true});
  try{
    const [r,o,c,ow,ri]=await Promise.all([
      db.from("restaurants").select("*").order("created_at",{ascending:false}),
      db.from("orders").select("*").order("created_at",{ascending:false}),
      db.from("customers").select("*").order("created_at",{ascending:false}),
      db.from("restaurant_owners").select("*").order("created_at",{ascending:false}),
      db.from("delivery_riders").select("*").order("created_at",{ascending:false}),
    ]);
    ss({loading:false,data:{restaurants:r.data||[],orders:o.data||[],customers:c.data||[],owners:ow.data||[],riders:ri.data||[]}});
  }catch(e){ss({loading:false});}
}

function render(){

  if(S.page==="login"){document.getElementById("root").appendChild(loginPage());return;}
  document.getElementById("root").appendChild(appShell());
  if(S.modal)document.getElementById("root").appendChild(modalOverlay());
}

      btn("+ Add",()=>ss({modal:{type:"addOwner",data:{name:"",email:"",phone:"",password:"",restaurant_id:""}}}),"primary",{padding:"10px 18px",borderRadius:12})
    ),
    owners.length===0?card({padding:40,textAlign:"center"},div({style:{fontSize:48,marginBottom:10}}),"👨‍💼",div({style:{fontSize:14,color:"#94A3B8"}}),"No owners yet"):null,
    ...owners.map(o=>{
      const rest=restaurants.find(r=>r.id===o.restaurant_id);
      return card({padding:18,marginBottom:10,display:"flex",alignItems:"center",gap:14},
        div({style:{width:48,height:48,borderRadius:"50%",background:"#EDE9FE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}),"👨‍💼",
        div({style:{flex:1}},
          div({style:{fontWeight:700,fontSize:14,color:"#1a1a2e"}},o.name),
          div({style:{fontSize:12,color:"#64748B",marginTop:2}},o.email),
          div({style:{fontSize:12,color:"#2563EB",fontWeight:600,marginTop:3}},rest?"🏪 "+rest.name:"No restaurant assigned")
        ),
        btn("🗑️",async()=>{if(confirm("Remove "+o.name+"?")){await db.from("restaurant_owners").delete().eq("id",o.id);loadAll();}},"danger",{padding:"9px 12px",fontSize:13})
      );
    })
  ));
}

// RIDERS
function riderTab(c){
  const {riders,orders}=S.data;
  c.appendChild(div({cls:"fade"},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      div({style:{fontSize:20,fontWeight:800,color:"#1E3A8A"}}),"🏍️ Riders ("+riders.length+")",
      btn("+ Add Rider",()=>ss({modal:{type:"addRider",data:{name:"",phone:"",password:"",area:"",vehicle:"Bike",emoji:"🏍️"}}}),"primary",{padding:"10px 18px",borderRadius:12})
    ),
    riders.length===0?card({padding:40,textAlign:"center"},
      div({style:{fontSize:52,marginBottom:12}}),"🏍️",
      div({style:{fontSize:16,fontWeight:700,color:"#475569",marginBottom:6}}),"No riders yet",
      div({style:{fontSize:13,color:"#94A3B8",marginBottom:20}}),"Add delivery riders so they can log in and accept orders",
      btn("+ Add First Rider",()=>ss({modal:{type:"addRider",data:{name:"",phone:"",password:"",area:"",vehicle:"Bike",emoji:"🏍️"}}}),"primary")
    ):null,
    ...riders.map(r=>{
      const total=orders.filter(o=>o.rider_name===r.name&&o.status==="Delivered").length;
      const today=orders.filter(o=>o.rider_name===r.name&&o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString()).length;
      return card({padding:20,marginBottom:14},
        div({style:{display:"flex",gap:14,alignItems:"center",marginBottom:16}},
          div({style:{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#EEF2FF,#DBEAFE)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0}}),r.emoji||"🏍️",
          div({style:{flex:1}},
            div({style:{fontWeight:800,fontSize:16,color:"#1a1a2e"}},r.name),
            div({style:{fontSize:12,color:"#64748B",marginTop:3}},r.phone),
            div({style:{fontSize:12,color:"#94A3B8",marginTop:2}},"📍 "+(r.area||"No area")+" · "+r.vehicle)
          ),
          div({style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}},
            toggle(r.active,async()=>{await db.from("delivery_riders").update({active:!r.active}).eq("id",r.id);loadAll();}),
            span({style:{fontSize:10,fontWeight:700,color:r.active?"#16A34A":"#94A3B8"}}),r.active?"Online":"Offline"
          )
        ),
        div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}},
          div({style:{background:"#F0F4FF",borderRadius:12,padding:"12px 8px",textAlign:"center"}},div({style:{fontSize:22,fontWeight:800,color:"#2563EB"}}),today,div({style:{fontSize:10,color:"#94A3B8",marginTop:2}}),"Today"),
          div({style:{background:"#DCFCE7",borderRadius:12,padding:"12px 8px",textAlign:"center"}},div({style:{fontSize:22,fontWeight:800,color:"#16A34A"}}),total,div({style:{fontSize:10,color:"#94A3B8",marginTop:2}}),"Total"),
          div({style:{background:"#FEF3C7",borderRadius:12,padding:"12px 8px",textAlign:"center"}},div({style:{fontSize:22,fontWeight:800,color:"#D97706"}}),"₹"+(total*30),div({style:{fontSize:10,color:"#94A3B8",marginTop:2}}),"Earned")
        ),
        btn("🗑️ Remove Rider",async()=>{if(confirm("Remove "+r.name+"?")){await db.from("delivery_riders").delete().eq("id",r.id);loadAll();}},"danger",{width:"100%",padding:11,fontSize:13})
      );
    })
  ));
}

// MODAL
function modalOverlay(){
  const {type,data,editId,restaurantId,restaurantName}=S.modal;
  const overlay=div({style:{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:400,backdropFilter:"blur(4px)"}});
  overlay.addEventListener("click",e=>{if(e.target===overlay)ss({modal:null});});
  const box=div({style:{background:"#fff",borderRadius:"24px 24px 0 0",padding:"28px 22px 34px",width:"100%",maxWidth:500,maxHeight:"92vh",overflowY:"auto"}});
  const d={...data};

  // Drag handle
  box.appendChild(div({style:{width:40,height:4,borderRadius:2,background:"#E2E8F0",margin:"0 auto 24px"}}));

  if(type==="addRest"){
    box.appendChild(div({style:{fontSize:18,fontWeight:800,color:"#1E3A8A",marginBottom:22}},editId?"✏️ Edit Restaurant":"🏪 New Restaurant"));
    box.appendChild(field("RESTAURANT NAME",inp("e.g. Spice Garden",d.name,v=>d.name=v)));
    box.appendChild(field("CUISINE TYPE",inp("e.g. North Indian, Chinese",d.cuisine,v=>d.cuisine=v)));
    box.appendChild(field("EMOJI",inp("🍛 🍕 🍔 🍜",d.image,v=>d.image=v)));
    box.appendChild(field("TAG LINE",inp("e.g. Best biryani in town",d.tag,v=>d.tag=v)));
    box.appendChild(field("CATEGORY",sel([["","Select"],["biryani","Biryani"],["pizza","Pizza"],["burgers","Burgers"],["chinese","Chinese"],["south","South Indian"],["north","North Indian"],["desserts","Desserts"],["cafe","Cafe"]],d.category,v=>d.category=v)));
    box.appendChild(field("DELIVERY TIME",inp("25-35 min",d.delivery_time,v=>d.delivery_time=v)));
    box.appendChild(field("PRICE RANGE",sel([["₹","₹ Budget"],["₹₹","₹₹ Mid"],["₹₹₹","₹₹₹ Premium"]],d.price_range,v=>d.price_range=v)));
    box.appendChild(field("RATING",inp("4.5",d.rating,v=>d.rating=parseFloat(v)||4.0,"number")));
    const tr=(lbl,key)=>div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #EEF2FF"}},span({style:{fontSize:14,fontWeight:500,color:"#475569"}},lbl),toggle(d[key],v=>{d[key]=v;ss({modal:{...S.modal,data:{...d}}});}));
    box.appendChild(tr("Veg Options 🥦","has_veg"));box.appendChild(tr("Non-Veg 🍗","has_nonveg"));box.appendChild(tr("Halal ☪️","is_halal"));box.appendChild(tr("Active / Live","active"));
    box.appendChild(div({style:{display:"flex",gap:12,marginTop:24}},
      btn("Cancel",()=>ss({modal:null}),"ghost",{flex:1,padding:13}),
      btn(editId?"Save Changes":"Add Restaurant",async()=>{
        if(!d.name){alert("Name required!");return;}
        if(editId)await db.from("restaurants").update({...d}).eq("id",editId);
        else await db.from("restaurants").insert([{...d}]);
        ss({modal:null});loadAll();
      },"primary",{flex:2,padding:13})
    ));
  }

  else if(type==="menu"){
    box.appendChild(div({style:{fontSize:18,fontWeight:800,color:"#1E3A8A",marginBottom:4}},"📋 "+restaurantName));
    const itemsDiv=div({style:{marginBottom:20}});
    const renderItems=async()=>{
      const {data:items}=await db.from("menu_items").select("*").eq("restaurant_id",restaurantId).order("created_at",{ascending:false});
      itemsDiv.innerHTML="";
      if(!items||!items.length){itemsDiv.appendChild(div({style:{textAlign:"center",padding:"24px",color:"#94A3B8",fontSize:13}}),"No items yet");}
      (items||[]).forEach(item=>{
        itemsDiv.appendChild(div({style:{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:"1px solid #F0F4FF"}},
          div({style:{flex:1}},div({style:{fontWeight:600,fontSize:13,color:"#1a1a2e"}},item.name),div({style:{fontSize:12,color:"#64748B",marginTop:2}},"₹"+item.price+" • "+(item.veg?"🥦":"🍗")+(item.bestseller?" ⭐":""))),
          btn("🗑️",async()=>{await db.from("menu_items").delete().eq("id",item.id);renderItems();},"danger",{padding:"7px 11px",fontSize:12})
        ));
      });
    };
    renderItems();
    box.appendChild(itemsDiv);
    const nd={name:"",price:"",veg:true};
    box.appendChild(div({style:{background:"#F8FAFF",borderRadius:14,padding:16,border:"2px solid #E8EEFF"}},
      div({style:{fontSize:13,fontWeight:700,color:"#2563EB",marginBottom:12}}),"+ Add New Item",
      field("ITEM NAME",inp("e.g. Chicken Biryani",nd.name,v=>nd.name=v)),
      field("PRICE (₹)",inp("199",nd.price,v=>nd.price=v,"number")),
      div({style:{display:"flex",gap:8,marginBottom:14}},btn("🥦 Veg",()=>{nd.veg=true;},"success",{flex:1,fontSize:12}),btn("🍗 Non-Veg",()=>{nd.veg=false;},"danger",{flex:1,fontSize:12})),
      btn("✅ Add Item",async()=>{
        if(!nd.name||!nd.price){alert("Name and price required!");return;}
        await db.from("menu_items").insert([{restaurant_id:restaurantId,name:nd.name,price:parseFloat(nd.price),veg:nd.veg}]);
        nd.name="";nd.price="";renderItems();
      },"primary",{width:"100%"})
    ));
    box.appendChild(btn("Close",()=>ss({modal:null}),"ghost",{width:"100%",marginTop:14,padding:13}));
  }

  else if(type==="addOwner"){
    box.appendChild(div({style:{fontSize:18,fontWeight:800,color:"#1E3A8A",marginBottom:22}}),"👨‍💼 New Restaurant Owner");
    box.appendChild(field("FULL NAME",inp("Owner full name",d.name,v=>d.name=v)));
    box.appendChild(field("EMAIL",inp("email@example.com",d.email,v=>d.email=v,"email")));
    box.appendChild(field("PHONE",inp("Phone number",d.phone,v=>d.phone=v,"tel")));
    box.appendChild(field("PASSWORD",inp("Set login password",d.password,v=>d.password=v,"password")));
    box.appendChild(field("ASSIGN RESTAURANT",sel([["","Select restaurant"],...S.data.restaurants.map(r=>[r.id,r.name])],d.restaurant_id,v=>d.restaurant_id=v)));
    box.appendChild(div({style:{display:"flex",gap:12,marginTop:24}},
      btn("Cancel",()=>ss({modal:null}),"ghost",{flex:1,padding:13}),
      btn("Add Owner",async()=>{
        if(!d.name||!d.email||!d.password){alert("Name, email and password required!");return;}
        const {error}=await db.from("restaurant_owners").insert([{name:d.name,email:d.email,phone:d.phone,password:d.password,restaurant_id:d.restaurant_id||null}]);
        if(error){alert("Error: "+error.message);return;}
        ss({modal:null});loadAll();
      },"primary",{flex:2,padding:13})
    ));
  }

  else if(type==="addRider"){
    box.appendChild(div({style:{fontSize:18,fontWeight:800,color:"#1E3A8A",marginBottom:6}}),"🏍️ Add Delivery Rider");
    box.appendChild(div({style:{fontSize:13,color:"#64748B",marginBottom:22}}),"Rider logs in using phone & password on the Delivery app");
    box.appendChild(field("FULL NAME",inp("Rider full name",d.name,v=>d.name=v)));
    box.appendChild(field("PHONE NUMBER",inp("10-digit mobile number",d.phone,v=>d.phone=v,"tel")));
    box.appendChild(field("LOGIN PASSWORD",inp("Set a secure password",d.password,v=>d.password=v,"password")));
    box.appendChild(field("DELIVERY AREA",inp("e.g. Coimbatore North, RS Puram",d.area,v=>d.area=v)));
    box.appendChild(field("VEHICLE TYPE",sel([["Bike","🏍️ Bike"],["Scooter","🛵 Scooter"],["Bicycle","🚴 Bicycle"],["Car","🚗 Car"],["Auto","🛺 Auto"]],d.vehicle,v=>d.vehicle=v)));
    box.appendChild(div({style:{marginBottom:20}},
      div({style:{fontSize:11,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:10}}),"RIDER EMOJI",
      div({style:{display:"flex",gap:10,flexWrap:"wrap"}},
        ...["🏍️","🛵","🚴","🚗","🛺","⚡"].map(e=>div({style:{width:50,height:50,borderRadius:12,background:d.emoji===e?"#DBEAFE":"#F8FAFF",border:d.emoji===e?"2px solid #2563EB":"2px solid #E8EEFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,cursor:"pointer",transition:"all .2s"},onClick:()=>{d.emoji=e;ss({modal:{type,data:{...d}}});}},e))
      )
    ));
    box.appendChild(div({style:{display:"flex",gap:12,marginTop:8}},
      btn("Cancel",()=>ss({modal:null}),"ghost",{flex:1,padding:13}),
      btn("✅ Add Rider",async()=>{
        if(!d.name||!d.phone||!d.password){alert("Name, phone and password are required!");return;}
        const {error}=await db.from("delivery_riders").insert([{name:d.name,phone:d.phone,password:d.password,area:d.area||"",vehicle:d.vehicle||"Bike",emoji:d.emoji||"🏍️",active:true}]);
        if(error){alert("Error: "+error.message);return;}
        ss({modal:null});loadAll();
      },"primary",{flex:2,padding:13})
    ));
  }

  overlay.appendChild(box);
  return overlay;
}

render();
</script>
</body>
</html>
