body{font-family:'Poppins',sans-serif;background:#F0F4FF;color:#1a1a2e;}

select.inp{appearance:none;}
@keyframes spin{to{transform:rotate(360deg);}}

var SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4";
var SBH={"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","apikey":SKEY,"Accept":"application/json"};
var SB={
  from:function(table){
    return {
      select:function(cols){
        var q=cols&&cols!=="*"?"select="+cols:"select=*";
        var filters=[];
        var obj={
          eq:function(col,val){filters.push(col+"=eq."+encodeURIComponent(val));return obj;},
          in:function(col,vals){filters.push(col+"=in.("+vals.map(function(v){return '"'+v+'"';}).join(",")+ ")");return obj;},
          order:function(col,opts){filters.push("order="+col+"."+(opts&&opts.ascending===false?"desc":"asc"));return obj;},
          limit:function(n){filters.push("limit="+n);return obj;},
          then:function(resolve,reject){
            var url=SURL+"/rest/v1/"+table+"?"+q+(filters.length?"&"+filters.join("&"):"");
            return fetch(url,{headers:SBH}).then(function(r){return r.json();}).then(function(d){return resolve({data:Array.isArray(d)?d:[]});}).catch(reject||function(){});
          }
        };
        return obj;
      },
      insert:function(rows){
        return fetch(SURL+"/rest/v1/"+table,{method:"POST",headers:Object.assign({},SBH,{"Prefer":"return=representation"}),body:JSON.stringify(rows[0])}).then(function(r){return r.json();}).then(function(d){return {data:d,error:null};}).catch(function(e){return {data:null,error:e};});
      },
      update:function(data){
        var filters=[];
        var obj={
          eq:function(col,val){filters.push(col+"=eq."+encodeURIComponent(val));return obj;},
          then:function(resolve,reject){
            var url=SURL+"/rest/v1/"+table+"?"+filters.join("&");
            return fetch(url,{method:"PATCH",headers:SBH,body:JSON.stringify(data)}).then(function(r){return {data:null,error:null};}).then(resolve).catch(reject||function(){});
          }
        };
        return obj;
      },
      delete:function(){
        var filters=[];
        var obj={
          eq:function(col,val){filters.push(col+"=eq."+encodeURIComponent(val));return obj;},
          then:function(resolve,reject){
            var url=SURL+"/rest/v1/"+table+"?"+filters.join("&");
            return fetch(url,{method:"DELETE",headers:SBH}).then(function(){return {data:null,error:null};}).then(resolve).catch(reject||function(){});
          }
        };
        return obj;
      }
    };
  }
};

function set(obj) { Object.assign(state, obj); render(); }

// ── helpers ──────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "style") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "class") e.className = v;
    else e.setAttribute(k, v);
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "object" ? c : document.createTextNode(String(c)));
  });
  return e;
}

function badge(text, color) {
  return el("span", {class:"badge", style:{background:color+"20",color,border:`1px solid ${color}40`}}, text);
}
function statusColor(s) {
  return {Delivered:"#16A34A","On the Way":"#7C3AED",Preparing:"#D97706",Cancelled:"#DC2626",Pending:"#2563EB"}[s]||"#64748B";
}
function tog(active, cb) {
  const w = el("div",{style:{width:46,height:24,borderRadius:12,background:active?"#2563EB":"#CBD5E1",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}},
    el("div",{style:{position:"absolute",top:3,left:active?25:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s"}})
  );
  w.addEventListener("click",()=>cb(!active));
  return w;
}

// ── data ─────────────────────────────────
async function loadAll() {
  set({loading:true});
  try {
    const [r,o,c,ow,ri] = await Promise.all([
      SB.from("restaurants").select("*").order("created_at",{ascending:false}),
      SB.from("orders").select("*").order("created_at",{ascending:false}),
      SB.from("customers").select("*").order("created_at",{ascending:false}),
      SB.from("restaurant_owners").select("*").order("created_at",{ascending:false}),
      SB.from("delivery_riders").select("*").order("created_at",{ascending:false}),
    ]);
    set({loading:false, restaurants:r.data||[], orders:o.data||[], customers:c.data||[], owners:ow.data||[], riders:ri.data||[]});
  } catch(e) { set({loading:false}); }
}

// ── render ────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.page === "login") { app.appendChild(loginPage()); return; }
  app.appendChild(appPage());
  if (state.drawer) app.appendChild(drawerMenu());
  if (state.modal) app.appendChild(modalView());
}

        el("div",{style:{fontSize:"26px",fontWeight:"800",color:"#1E3A8A",marginBottom:"6px"}},"Zaiqa Admin"),

// ── DASHBOARD ────────────────────────────
function dashTab() {
  const {orders,customers,restaurants,riders} = state;
  const revenue = orders.filter(o=>o.status==="Delivered").reduce((a,o)=>a+(o.total||0),0);
  const pending = orders.filter(o=>["Pending","Preparing"].includes(o.status)).length;
  const today = orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString()).length;
  const stats = [["📦","Total Orders",orders.length,"#2563EB"],["💰","Revenue","₹"+revenue.toLocaleString(),"#16A34A"],["👥","Customers",customers.length,"#7C3AED"],["🏪","Restaurants",restaurants.length,"#D97706"],["⏳","Pending",pending,"#DC2626"],["📅","Today",today,"#0891B2"]];
  return el("div",{},
    el("div",{style:{fontSize:"13px",color:"#64748B",marginBottom:"16px"}},new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})),
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"24px"}},
      ...stats.map(([icon,label,val,color])=>
        el("div",{class:"card",style:{marginBottom:"0",display:"flex",alignItems:"center",gap:"12px"}},
          el("div",{style:{fontSize:"28px"}}),icon,
          el("div",{},
            el("div",{style:{fontSize:"22px",fontWeight:"900",color}}),String(val),
            el("div",{style:{fontSize:"11px",color:"#94A3B8",marginTop:"2px"}}),label
          )
        )
      )
    ),
    el("div",{style:{fontSize:"16px",fontWeight:"700",color:"#1E3A8A",marginBottom:"12px"}},"Recent Orders"),
    ...orders.slice(0,5).map(o=>
      el("div",{class:"card",style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        el("div",{},
          el("div",{style:{fontWeight:"700",fontSize:"13px"}}),o.customer_name||"Customer",
          el("div",{style:{fontSize:"12px",color:"#64748B",marginTop:"2px"}}),(o.restaurant_name||"")+" • ₹"+(o.total||0)
        ),
        badge(o.status, statusColor(o.status))

}

      return el("div",{class:"card",style:{display:"flex",alignItems:"center",gap:"14px"}},
        el("div",{style:{width:"46px",height:"46px",borderRadius:"50%",background:"#EDE9FE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:"0"}},"👨‍💼"),
        el("div",{style:{flex:"1"}},
          el("div",{style:{fontWeight:"700",fontSize:"14px"}}),o.name,
          el("div",{style:{fontSize:"12px",color:"#64748B",marginTop:"2px"}}),o.email,
          el("div",{style:{fontSize:"12px",color:"#2563EB",fontWeight:"600",marginTop:"3px"}}),rest?"🏪 "+rest.name:"No restaurant"
        ),
        el("button",{class:"btn-danger",onclick:async()=>{if(confirm("Remove "+o.name+"?")){await SB.from("restaurant_owners").delete().eq("id",o.id);loadAll();}}},"🗑️")
      );
    })
  );
}

// ── RIDERS ────────────────────────────────
function riderTab() {
  return el("div",{},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}},
      el("div",{style:{fontSize:"18px",fontWeight:"700",color:"#1E3A8A"}},"🏍️ Riders ("+state.riders.length+")"),
      el("button",{class:"btn-ghost",style:{padding:"10px 18px"},onclick:()=>set({modal:{type:"addRider",data:{name:"",phone:"",password:"",area:"",vehicle:"Bike",emoji:"🏍️"}}})},"+ Add Rider")
    ),
    state.riders.length === 0 ?
      el("div",{class:"card",style:{textAlign:"center",padding:"50px 20px"}},
        el("div",{style:{fontSize:"52px",marginBottom:"12px"}},"🏍️"),
        el("div",{style:{fontSize:"15px",fontWeight:"700",color:"#475569",marginBottom:"6px"}},"No riders yet"),
        el("div",{style:{fontSize:"13px",color:"#94A3B8",marginBottom:"20px"}},"Add riders so they can log in and accept deliveries"),
        el("button",{class:"btn-ghost",onclick:()=>set({modal:{type:"addRider",data:{name:"",phone:"",password:"",area:"",vehicle:"Bike",emoji:"🏍️"}}})},"+ Add First Rider")
      ) : null,
    ...state.riders.map(r=>{
      const total = state.orders.filter(o=>o.rider_name===r.name&&o.status==="Delivered").length;
      const today = state.orders.filter(o=>o.rider_name===r.name&&o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString()).length;
      return el("div",{class:"card"},
        el("div",{style:{display:"flex",gap:"12px",alignItems:"center",marginBottom:"14px"}},
          el("div",{style:{fontSize:"32px",width:"54px",height:"54px",background:"#EEF2FF",borderRadius:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}}),r.emoji||"🏍️",
          el("div",{style:{flex:"1"}},
            el("div",{style:{fontWeight:"800",fontSize:"15px"}}),r.name,
            el("div",{style:{fontSize:"12px",color:"#64748B",marginTop:"3px"}}),"📱 "+r.phone,
            el("div",{style:{fontSize:"12px",color:"#94A3B8",marginTop:"2px"}}),"📍 "+(r.area||"No area")+" · "+r.vehicle
          ),
          el("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}},
            tog(r.active, async v=>{await SB.from("delivery_riders").update({active:v}).eq("id",r.id);loadAll();}),
            el("div",{style:{fontSize:"10px",fontWeight:"700",color:r.active?"#16A34A":"#94A3B8"}}),r.active?"Online":"Offline"
          )
        ),
        el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}},
          el("div",{style:{background:"#EEF2FF",borderRadius:"10px",padding:"10px",textAlign:"center"}},el("div",{style:{fontSize:"20px",fontWeight:"800",color:"#2563EB"}}),today,el("div",{style:{fontSize:"10px",color:"#94A3B8",marginTop:"2px"}},"Today")),
          el("div",{style:{background:"#DCFCE7",borderRadius:"10px",padding:"10px",textAlign:"center"}},el("div",{style:{fontSize:"20px",fontWeight:"800",color:"#16A34A"}}),total,el("div",{style:{fontSize:"10px",color:"#94A3B8",marginTop:"2px"}},"Total")),
          el("div",{style:{background:"#FEF3C7",borderRadius:"10px",padding:"10px",textAlign:"center"}},el("div",{style:{fontSize:"20px",fontWeight:"800",color:"#D97706"}}),"₹"+(total*30),el("div",{style:{fontSize:"10px",color:"#94A3B8",marginTop:"2px"}},"Earned"))
        ),
        el("button",{class:"btn-danger",style:{width:"100%",padding:"10px"},onclick:async()=>{if(confirm("Remove "+r.name+"?")){await SB.from("delivery_riders").delete().eq("id",r.id);loadAll();}}},"🗑️ Remove Rider")
      );
    })
  );
}

// ── MODAL ─────────────────────────────────
function modalView() {
  const {type, data, editId, rid, rname} = state.modal;
  const d = {...data};
  const wrap = el("div",{},
    el("div",{class:"modal-bg",onclick:()=>set({modal:null})}),
    el("div",{class:"modal-box"})
  );
  const box = wrap.lastChild;
  box.appendChild(el("div",{style:{width:"36px",height:"4px",borderRadius:"2px",background:"#E2E8F0",margin:"0 auto 20px"}}));

  if (type === "addRest") {
    box.appendChild(el("div",{style:{fontSize:"17px",fontWeight:"800",color:"#1E3A8A",marginBottom:"18px"}}, editId?"✏️ Edit Restaurant":"🏪 New Restaurant"));
    const fields = [["RESTAURANT NAME","text",d.name,v=>d.name=v,"e.g. Spice Garden"],["CUISINE","text",d.cuisine,v=>d.cuisine=v,"e.g. North Indian"],["EMOJI","text",d.image,v=>d.image=v,"🍛 🍕 🍔"],["TAG LINE","text",d.tag,v=>d.tag=v,"Best in town"],["DELIVERY TIME","text",d.delivery_time,v=>d.delivery_time=v,"25-35 min"],["RATING","number",d.rating,v=>d.rating=parseFloat(v)||4.0,"4.5"]];
    fields.forEach(([lbl,type,val,cb,ph])=>{
      box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"6px"}},lbl));
      box.appendChild(el("input",{class:"inp",type,placeholder:ph,value:val||"",oninput:e=>cb(e.target.value)}));
    });
    [["Veg Options 🥦","has_veg"],["Non-Veg 🍗","has_nonveg"],["Halal ☪️","is_halal"],["Active / Live","active"]].forEach(([lbl,key])=>{
      const row = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #F0F4FF"}},
        el("span",{style:{fontSize:"14px",fontWeight:"500"}},lbl), tog(d[key],v=>{d[key]=v;state.modal.data=d;render();})
      );
      box.appendChild(row);
    });
    box.appendChild(el("div",{style:{display:"flex",gap:"12px",marginTop:"20px"}},
      el("button",{class:"btn-ghost",style:{flex:"1",padding:"13px"},onclick:()=>set({modal:null})},"Cancel"),
      el("button",{class:"btn-primary",style:{flex:"2"},onclick:async()=>{
        if(!d.name){alert("Name required!");return;}
        if(editId) await SB.from("restaurants").update(d).eq("id",editId);
        else await SB.from("restaurants").insert([d]);
        set({modal:null});loadAll();
      }}, editId?"Save Changes":"Add Restaurant")
    ));
  }

  else if (type === "menu") {
    box.appendChild(el("div",{style:{fontSize:"17px",fontWeight:"800",color:"#1E3A8A",marginBottom:"16px"}},"📋 "+rname));
    const itemList = el("div",{style:{marginBottom:"18px"}});
    box.appendChild(itemList);
    const loadItems = async () => {
      const {data:items} = await SB.from("menu_items").select("*").eq("restaurant_id",rid).order("created_at",{ascending:false});
      itemList.innerHTML = "";
      if(!items||!items.length){itemList.appendChild(el("div",{style:{textAlign:"center",padding:"20px",color:"#94A3B8",fontSize:"13px"}},"No items yet"));return;}
      items.forEach(item=>{
        itemList.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"11px 0",borderBottom:"1px solid #F0F4FF"}},
          el("div",{style:{flex:"1"}},
            el("div",{style:{fontWeight:"600",fontSize:"13px"}}),item.name,
            el("div",{style:{fontSize:"12px",color:"#64748B",marginTop:"2px"}}),"₹"+item.price+" • "+(item.veg?"🥦":"🍗")+(item.bestseller?" ⭐":"")
          ),
          el("button",{class:"btn-danger",style:{padding:"6px 10px"},onclick:async()=>{await SB.from("menu_items").delete().eq("id",item.id);loadItems();}},"🗑️")
        ));
      });
    };
    loadItems();
    const nd = {name:"",price:"",veg:true};
    box.appendChild(el("div",{style:{background:"#F8FAFF",borderRadius:"12px",padding:"14px",border:"2px solid #E8EEFF"}},
      el("div",{style:{fontSize:"13px",fontWeight:"700",color:"#2563EB",marginBottom:"10px"}},"+ Add Item"),
      el("input",{class:"inp",placeholder:"Item name",oninput:e=>nd.name=e.target.value}),
      el("input",{class:"inp",type:"number",placeholder:"Price ₹",oninput:e=>nd.price=e.target.value}),
      el("div",{style:{display:"flex",gap:"8px",marginBottom:"10px"}},
        el("button",{class:"btn-ghost",style:{flex:"1",fontSize:"12px"},onclick:()=>nd.veg=true},"🥦 Veg"),
        el("button",{style:{flex:"1",fontSize:"12px",background:"#FEE2E2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"10px",padding:"10px",cursor:"pointer"},onclick:()=>nd.veg=false},"🍗 Non-Veg")
      ),
      el("button",{class:"btn-primary",onclick:async()=>{
        if(!nd.name||!nd.price){alert("Name and price required!");return;}
        await SB.from("menu_items").insert([{restaurant_id:rid,name:nd.name,price:parseFloat(nd.price),veg:nd.veg}]);
        loadItems();
      }},"✅ Add Item")
    ));
    box.appendChild(el("button",{class:"btn-ghost",style:{width:"100%",marginTop:"12px",padding:"12px"},onclick:()=>set({modal:null})},"Close"));
  }

  else if (type === "addOwner") {
    box.appendChild(el("div",{style:{fontSize:"17px",fontWeight:"800",color:"#1E3A8A",marginBottom:"18px"}},"👨‍💼 New Owner"));
    [["FULL NAME","text",d.name,v=>d.name=v,"Owner name"],["EMAIL","email",d.email,v=>d.email=v,"email@example.com"],["PHONE","tel",d.phone,v=>d.phone=v,"Phone number"],["PASSWORD","password",d.password,v=>d.password=v,"Set password"]].forEach(([lbl,type,val,cb,ph])=>{
      box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"6px"}},lbl));
      box.appendChild(el("input",{class:"inp",type,placeholder:ph,value:val||"",oninput:e=>cb(e.target.value)}));
    });
    box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"6px"}},"RESTAURANT"));
    const sel = el("select",{class:"inp",onchange:e=>d.restaurant_id=e.target.value},
      el("option",{value:""},"Select restaurant"),
      ...state.restaurants.map(r=>el("option",{value:r.id},r.name))
    );
    box.appendChild(sel);
    box.appendChild(el("div",{style:{display:"flex",gap:"12px",marginTop:"12px"}},
      el("button",{class:"btn-ghost",style:{flex:"1",padding:"13px"},onclick:()=>set({modal:null})},"Cancel"),
      el("button",{class:"btn-primary",style:{flex:"2"},onclick:async()=>{
        if(!d.name||!d.email||!d.password){alert("Fill required fields!");return;}
        const {error} = await SB.from("restaurant_owners").insert([{name:d.name,email:d.email,phone:d.phone,password:d.password,restaurant_id:d.restaurant_id||null}]);
        if(error){alert(error.message);return;}
        set({modal:null});loadAll();
      }},"Add Owner")
    ));
  }

  else if (type === "addRider") {
    box.appendChild(el("div",{style:{fontSize:"17px",fontWeight:"800",color:"#1E3A8A",marginBottom:"6px"}},"🏍️ Add Rider"));
    box.appendChild(el("div",{style:{fontSize:"13px",color:"#64748B",marginBottom:"18px"}},"Rider logs in with phone + password on the Delivery app"));
    [["FULL NAME","text",d.name,v=>d.name=v,"Rider name"],["PHONE","tel",d.phone,v=>d.phone=v,"Mobile number"],["PASSWORD","password",d.password,v=>d.password=v,"Set password"],["DELIVERY AREA","text",d.area,v=>d.area=v,"e.g. Coimbatore North"]].forEach(([lbl,type,val,cb,ph])=>{
      box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"6px"}},lbl));
      box.appendChild(el("input",{class:"inp",type,placeholder:ph,value:val||"",oninput:e=>cb(e.target.value)}));
    });
    box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"6px"}},"VEHICLE"));
    box.appendChild(el("select",{class:"inp",onchange:e=>d.vehicle=e.target.value},
      ...["Bike","Scooter","Bicycle","Car","Auto"].map(v=>el("option",{value:v,...(v===d.vehicle?{selected:""}:{})},v))
    ));
    box.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#94A3B8",letterSpacing:"1px",marginBottom:"8px"}},"EMOJI"));
    box.appendChild(el("div",{style:{display:"flex",gap:"10px",marginBottom:"18px"}},
      ...["🏍️","🛵","🚴","🚗","🛺"].map(e=>
        el("div",{style:{width:"46px",height:"46px",borderRadius:"10px",background:d.emoji===e?"#DBEAFE":"#F8FAFF",border:d.emoji===e?"2px solid #2563EB":"2px solid #E8EEFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",cursor:"pointer"},onclick:()=>{d.emoji=e;state.modal.data=d;render();}},e)
      )
    ));
    box.appendChild(el("div",{style:{display:"flex",gap:"12px"}},
      el("button",{class:"btn-ghost",style:{flex:"1",padding:"13px"},onclick:()=>set({modal:null})},"Cancel"),
      el("button",{class:"btn-primary",style:{flex:"2"},onclick:async()=>{
        if(!d.name||!d.phone||!d.password){alert("Name, phone and password required!");return;}
        const {error} = await SB.from("delivery_riders").insert([{name:d.name,phone:d.phone,password:d.password,area:d.area||"",vehicle:d.vehicle||"Bike",emoji:d.emoji||"🏍️",active:true}]);
        if(error){alert(error.message);return;}
        set({modal:null});loadAll();
      }},"✅ Add Rider")
    ));
  }

  return wrap;
}

render();
</script>
</body>
</html>
