// HELPERS
function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="cls")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(9)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}
function inp(ph,val,cb,type="text",st={}){
  const e=el("input",{type,placeholder:ph,value:val||"",style:{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #333",backgroundColor:"#1a1a1a",color:"#fff",fontSize:14,outline:"none",...st}});
  e.addEventListener("input",ev=>cb(ev.target.value));
  e.addEventListener("focus",()=>e.style.borderColor="#FF4D00");
  e.addEventListener("blur",()=>e.style.borderColor="#333");
  return e;
}
function sel(opts,val,cb,st={}){
  const e=el("select",{style:{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid #333",backgroundColor:"#1a1a1a",color:"#fff",fontSize:14,outline:"none",cursor:"pointer",...st}});
  for(const o of opts){const opt=el("option",{value:o},o);if(o===val)opt.selected=true;e.appendChild(opt);}
  e.addEventListener("change",ev=>cb(ev.target.value));
  return e;
}
function btn(label,cb,bg="#FF4D00",st={}){
  return el("button",{style:{backgroundColor:bg,color:bg==="transparent"?"#aaa":"#fff",border:"none",borderRadius:10,padding:"10px 20px",fontWeight:700,fontSize:14,cursor:"pointer",...st},onClick:cb},label);
}
function badge(text,color){
  return el("span",{style:{backgroundColor:color+"22",color,padding:"3px 12px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},text);
}
function card(st={},...kids){
  return el("div",{style:{backgroundColor:"#1A1A1A",borderRadius:14,padding:18,border:"1px solid #252525",...st}},...kids);
}
function loader(){
  return el("div",{style:{display:"flex",justifyContent:"center",padding:60}},
    el("div",{cls:"spin",style:{width:36,height:36,border:"3px solid #FF4D0030",borderTop:"3px solid #FF4D00",borderRadius:"50%"}})
  );
}
function row(...items){return el("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},...items);}
function label(text){return el("div",{style:{fontSize:11,color:"#555",fontWeight:700,marginBottom:5,letterSpacing:.5}},text);}
function field(lbl,child){return el("div",{style:{marginBottom:12}},label(lbl.toUpperCase()),child);}
function toggle(val,cb){
  return el("div",{style:{width:44,height:26,borderRadius:13,backgroundColor:val?"#22C55E":"#333",cursor:"pointer",position:"relative",transition:"all .2s",flexShrink:0},onClick:cb},
    el("div",{style:{width:20,height:20,borderRadius:"50%",backgroundColor:"#fff",position:"absolute",top:3,left:val?21:3,transition:"all .2s"}})
  );
}

// DATA
async function loadAll(){
  ss({loading:true});
  const [r,o,c,ow]=await Promise.all([
    db.from("restaurants").select("*").order("created_at",{ascending:false}),
    db.from("orders").select("*").order("created_at",{ascending:false}),
    db.from("customers").select("*").order("created_at",{ascending:false}),
    db.from("restaurant_owners").select("*").order("created_at",{ascending:false}).catch(()=>({data:[]})),
  ]);
  ss({restaurants:r.data||[],orders:o.data||[],customers:c.data||[],owners:ow.data||[],loading:false});
}
async function loadMenu(rid){
  const {data}=await db.from("menu_items").select("*").eq("restaurant_id",rid).order("veg",{ascending:false});
  ss({menuItems:{...S.menuItems,[rid]:data||[]}});
}

// LOGIN
function loginScreen(){
  let email="",pass="",err="",loading=false;
  const wrap=el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 20% 20%,#2a0d00,#0F0F0F 60%)"}});
  function draw(){
    wrap.innerHTML="";
    const loginBtn=btn(loading?"Please wait...":"🔐 Login to Dashboard",async()=>{
      if(loading)return;
      if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){ss({loggedIn:true});loadAll();}
      else{err="❌ Invalid credentials!";draw();}
    },"#FF4D00",{width:"100%",padding:14,fontSize:15,borderRadius:12,opacity:loading?.6:1});
    wrap.appendChild(card({width:360,padding:40},
      el("div",{style:{textAlign:"center",marginBottom:30}},
        el("div",{style:{fontSize:56,marginBottom:8}},"🍽️"),
        el("div",{style:{fontSize:26,fontWeight:900,color:"#FF4D00"}},"Zaiqa Admin"),
        el("div",{style:{fontSize:12,color:"#444",marginTop:4}},"Restricted Access Only")
      ),
      err?el("div",{style:{backgroundColor:"#FF4D0020",color:"#FF4D00",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,marginBottom:16}},err):null,
      field("Email Address",inp("Admin email",email,v=>email=v,"email")),
      field("Password",inp("Admin password",pass,v=>pass=v,"password")),
      loginBtn
    ));
  }
  draw();
  return wrap;
}

// DASHBOARD

  for(const[icon,lbl,val,color]of[

    ["⏳","Pending",pending,"#F59E0B"],

    grid.appendChild(card({padding:16,borderLeft:`3px solid ${color}`},

      el("div",{style:{fontSize:12,color:"#666",marginTop:3}},lbl)
    ));
  }
  div.appendChild(grid);
  div.appendChild(el("div",{style:{fontSize:16,fontWeight:800,marginBottom:14,color:"#ccc"}},"🕐 Recent Orders"));
  const tbl=el("div",{style:{overflowX:"auto"}});
  const table=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}});
  table.appendChild(el("thead",{},el("tr",{style:{borderBottom:"1px solid #222"}},
    ...["#","Customer","Restaurant","Total","Status","Date"].map(h=>
      el("th",{style:{padding:"10px 12px",textAlign:"left",color:"#555",fontWeight:700,whiteSpace:"nowrap"}},h)

  for(const o of orders.slice(0,15)){

  } else {
    for(const o of S.owners){
      const rest=S.restaurants.find(r=>r.id===o.restaurant_id);
      div.appendChild(card({marginBottom:10,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"},
        el("div",{style:{width:46,height:46,borderRadius:"50%",backgroundColor:"#3B82F620",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}},"👨‍💼"),
        el("div",{style:{flex:1}},
          el("div",{style:{fontWeight:800,fontSize:15}},o.name),
          el("div",{style:{fontSize:12,color:"#666",marginTop:2}},o.email),
          el("div",{style:{fontSize:12,color:"#555",marginTop:1}},"📱 "+(o.phone||"N/A")),
          rest?el("div",{style:{fontSize:12,color:"#FF4D00",marginTop:4,fontWeight:700}},"🏪 "+rest.name):el("span",{},"No restaurant assigned")
        ),
        btn("🗑️ Remove",async()=>{if(confirm("Remove "+o.name+"?")){await db.from("restaurant_owners").delete().eq("id",o.id);loadAll();}},"#EF444418",{padding:"8px 14px",border:"1px solid #EF4444",borderRadius:8,color:"#EF4444",fontSize:13})
      ));
    }
  }
  main.appendChild(div);
}

// MODALS
function modalOverlay(){
  const {type,data}=S.modal;
  const overlay=el("div",{style:{position:"fixed",inset:0,backgroundColor:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16},
    onClick:e=>{if(e.target===overlay)ss({modal:null});}
  });
  const box=el("div",{style:{backgroundColor:"#1a1a1a",borderRadius:16,padding:24,width:"100%",maxWidth:500,maxHeight:"92vh",overflowY:"auto",border:"1px solid #2a2a2a"}});

  if(type==="addRestaurant"||type==="editRestaurant"){
    const d={...data};
    const isEdit=type==="editRestaurant";
    box.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20,color:"#FF4D00"}},isEdit?"✏️ Edit Restaurant":"+ Add Restaurant"));
    box.appendChild(field("Restaurant Name",inp("e.g. Al Baik",d.name,v=>d.name=v)));
    box.appendChild(field("Cuisine",inp("e.g. Biryani, Pizza",d.cuisine,v=>d.cuisine=v)));
    box.appendChild(row(
      el("div",{style:{flex:1}},field("Rating",inp("e.g. 4.2",d.rating,v=>d.rating=v))),
      el("div",{style:{flex:1}},field("Delivery Time",inp("e.g. 25-35 mins",d.delivery_time,v=>d.delivery_time=v)))
    ));
    box.appendChild(row(
      el("div",{style:{flex:1}},field("Price Range",inp("e.g. ₹200-400",d.price_range,v=>d.price_range=v))),
      el("div",{style:{flex:1}},field("Tag",inp("e.g. New, Popular",d.tag,v=>d.tag=v)))
    ));
    box.appendChild(field("Category",sel(CATS,d.category,v=>d.category=v)));
    box.appendChild(el("div",{style:{marginBottom:14}},
      label("RESTAURANT EMOJI"),
      el("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}},
        ...EMOJIS.map(e=>el("div",{
          style:{fontSize:28,cursor:"pointer",padding:6,borderRadius:8,backgroundColor:d.image===e?"#FF4D0030":"#252525",border:d.image===e?"1px solid #FF4D00":"1px solid transparent",transition:"all .15s"},
          onClick:()=>{d.image=e;ss({modal:{type,data:{...d}}});}},e
        ))
      )
    ));
    for(const[key,lbl]of[["has_veg","🥗 Has Veg Items"],["has_nonveg","🍖 Has Non-Veg Items"],["is_halal","✅ Halal Certified"],["active","🟢 Active (visible to customers)"]]){
      box.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #252525"}},
        el("span",{style:{fontSize:14,color:"#aaa"}},lbl),
        toggle(d[key],()=>{d[key]=!d[key];ss({modal:{type,data:{...d}}});})
      ));
    }
    box.appendChild(el("div",{style:{display:"flex",gap:10,marginTop:20}},
      btn("Cancel",()=>ss({modal:null}),"#252525",{flex:1,border:"1px solid #333",color:"#888"}),
      btn(isEdit?"💾 Save Changes":"✅ Add Restaurant",async()=>{
        if(!d.name||!d.cuisine){alert("Name and cuisine are required!");return;}
        const payload={name:d.name,cuisine:d.cuisine,rating:parseFloat(d.rating)||4.0,delivery_time:d.delivery_time||"30-40 mins",price_range:d.price_range||"₹200-400",image:d.image||"🍽️",tag:d.tag||"",category:d.category,has_veg:!!d.has_veg,has_nonveg:!!d.has_nonveg,is_halal:!!d.is_halal,active:!!d.active};
        if(isEdit)await db.from("restaurants").update(payload).eq("id",d.id);
        else await db.from("restaurants").insert([payload]);
        ss({modal:null});loadAll();
      },"#FF4D00",{flex:2})
    ));
  }

  else if(type==="menu"){
    const rest=data;
    const items=S.menuItems[rest.id]||[];
    box.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      el("div",{style:{fontSize:17,fontWeight:900,color:"#FF4D00"}},"🍽️ "+rest.name),
      btn("+ Add Item",()=>ss({modal:{type:"addMenuItem",data:{restaurant_id:rest.id,name:"",description:"",price:"",veg:true,bestseller:false},_rest:rest}}),"#FF4D00",{padding:"8px 14px",borderRadius:8,fontSize:13})
    ));
    if(!items.length){
      box.appendChild(el("div",{style:{textAlign:"center",padding:40,color:"#555"}},"No menu items yet. Add some! 👆"));
    }
    for(const item of items){
      box.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #252525",gap:10}},
        el("div",{style:{flex:1}},
          el("div",{style:{display:"flex",gap:6,marginBottom:4,alignItems:"center"}},
            el("div",{style:{width:12,height:12,borderRadius:2,border:"2px solid "+(item.veg?"#22C55E":"#FF4D00"),display:"flex",alignItems:"center",justifyContent:"center"}},
              el("div",{style:{width:6,height:6,borderRadius:"50%",backgroundColor:item.veg?"#22C55E":"#FF4D00"}})
            ),
            item.bestseller?badge("🔥 Best","#F59E0B"):null
          ),
          el("div",{style:{fontWeight:700,fontSize:14}},item.name),
          item.description?el("div",{style:{fontSize:12,color:"#555",marginTop:2}},item.description):null,
          el("div",{style:{fontSize:16,fontWeight:900,color:"#FF4D00",marginTop:4}},"₹"+item.price)
        ),
        btn("🗑️",async()=>{
          await db.from("menu_items").delete().eq("id",item.id);
          await loadMenu(rest.id);
          ss({modal:{type:"menu",data:rest}});
        },"#EF444418",{padding:"7px 10px",border:"1px solid #EF4444",borderRadius:8,color:"#EF4444",fontSize:12})
      ));
    }
  }

  else if(type==="addMenuItem"){
    const d={...data};
    const rest=S.modal._rest;
    box.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20,color:"#FF4D00"}},"+ Add Menu Item"));
    box.appendChild(field("Item Name",inp("e.g. Chicken Biryani",d.name,v=>d.name=v)));
    box.appendChild(field("Description (optional)",inp("e.g. Spicy, aromatic...",d.description,v=>d.description=v)));
    box.appendChild(field("Price (₹)",inp("e.g. 180",d.price,v=>d.price=v,"number")));
    for(const[key,lbl]of[["veg","🥗 Vegetarian Item"],["bestseller","🔥 Mark as Bestseller"]]){
      box.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #252525"}},
        el("span",{style:{fontSize:14,color:"#aaa"}},lbl),
        toggle(d[key],()=>{d[key]=!d[key];ss({modal:{type,data:{...d},_rest:rest}});})
      ));
    }
    box.appendChild(el("div",{style:{display:"flex",gap:10,marginTop:20}},
      btn("← Back",()=>ss({modal:{type:"menu",data:rest}}),"#252525",{flex:1,border:"1px solid #333",color:"#888"}),
      btn("✅ Add Item",async()=>{
        if(!d.name||!d.price){alert("Name and price are required!");return;}
        await db.from("menu_items").insert([{restaurant_id:d.restaurant_id,name:d.name,description:d.description||"",price:parseFloat(d.price),veg:!!d.veg,bestseller:!!d.bestseller}]);
        await loadMenu(rest.id);
        ss({modal:{type:"menu",data:rest}});
      },"#FF4D00",{flex:2})
    ));
  }

  else if(type==="addOwner"){
    const d={...data};
    box.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20,color:"#FF4D00"}},"+ Add Restaurant Owner"));
    box.appendChild(field("Full Name",inp("Owner name",d.name,v=>d.name=v)));
    box.appendChild(field("Email",inp("owner@email.com",d.email,v=>d.email=v,"email")));
    box.appendChild(field("Phone",inp("Phone number",d.phone,v=>d.phone=v,"tel")));
    box.appendChild(field("Password (they'll use this to login)",inp("Set a password",d.password,v=>d.password=v,"password")));
    box.appendChild(field("Assign Restaurant",
      sel(["-- Select Restaurant --",...S.restaurants.map(r=>r.name)],
        S.restaurants.find(r=>r.id===d.restaurant_id)?.name||"-- Select Restaurant --",
        v=>{const r=S.restaurants.find(r=>r.name===v);d.restaurant_id=r?.id||"";}
      )
    ));
    box.appendChild(el("div",{style:{display:"flex",gap:10,marginTop:20}},
      btn("Cancel",()=>ss({modal:null}),"#252525",{flex:1,border:"1px solid #333",color:"#888"}),
      btn("✅ Create Owner Account",async()=>{
        if(!d.name||!d.email||!d.password){alert("Name, email and password required!");return;}
        const {error}=await db.from("restaurant_owners").insert([{name:d.name,email:d.email,phone:d.phone,password:d.password,restaurant_id:d.restaurant_id||null}]);
        if(error){alert("Error: "+error.message);return;}
        ss({modal:null});loadAll();
      },"#FF4D00",{flex:2})
    ));
  }

  overlay.appendChild(box);
  return overlay;
}

render();
</script>
</body>
</html>
