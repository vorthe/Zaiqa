<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Zaiqa Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#F0F4FF;color:#1a1a2e;}
button,input,select{font-family:'Poppins',sans-serif;}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(37,99,235,.08);border:1px solid #EEF2FF;margin-bottom:12px;}
.inp{width:100%;padding:12px 14px;background:#F8FAFF;border:2px solid #E8EEFF;border-radius:10px;font-size:14px;outline:none;display:block;box-sizing:border-box;margin-bottom:12px;}
.inp:focus{border-color:#2563EB;}
.pbtn{width:100%;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;padding:13px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;}
.gbtn{background:#fff;color:#2563EB;border:1px solid #DBEAFE;padding:9px 14px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;}
.dbtn{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;padding:7px 11px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EEF2FF;display:flex;padding:8px 0 16px;z-index:100;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:270px;background:#fff;z-index:300;box-shadow:4px 0 24px rgba(0,0,0,.15);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;}
.mbox{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 34px;max-height:88vh;overflow-y:auto;z-index:500;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var URL_BASE = "https://njxjqkebbloltsedecuh.supabase.co/rest/v1/";
var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4";
var HDR = {"apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json", "Accept-Profile": "public", "Content-Profile": "public"};

function dbGet(table, params) {
  return fetch(URL_BASE + table + "?" + params, {headers: HDR}).then(function(r){ return r.json(); });
}
function dbPatch(table, id, body) {
  return fetch(URL_BASE + table + "?id=eq." + id, {method:"PATCH", headers: HDR, body: JSON.stringify(body)});
}
function dbPost(table, body) {
  return fetch(URL_BASE + table, {method:"POST", headers: Object.assign({"Prefer":"return=representation"}, HDR), body: JSON.stringify(body)}).then(function(r){ return r.json(); });
}
function dbDelete(table, id) {
  return fetch(URL_BASE + table + "?id=eq." + id, {method:"DELETE", headers: HDR});
}

var ADMIN_EMAIL = "faizan@zaiqa.com";
var ADMIN_PASS = "Zaiqa@2025";
var state = {
  loggedIn: false, tab: "dashboard", drawer: false, modal: null,
  restaurants: [], orders: [], customers: [], owners: [], riders: [],
  filterStatus: ""
};

function show(html) { document.getElementById("app").innerHTML = html; }

function init() {
  show('<div style="min-height:100vh;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:60px">🍽️</div><div style="font-size:22px;font-weight:800;color:#1E3A8A">Zaiqa Admin</div></div>');
  setTimeout(showLogin, 800);
}

function showLogin(err) {
  var e = err ? '<div style="background:#FEE2E2;color:#DC2626;padding:11px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:14px;text-align:center">' + err + '</div>' : '';
  show('<div style="min-height:100vh;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);display:flex;align-items:center;justify-content:center;padding:20px"><div style="width:100%;max-width:380px"><div style="text-align:center;margin-bottom:28px"><div style="font-size:60px;margin-bottom:10px">🍽️</div><div style="font-size:24px;font-weight:800;color:#1E3A8A">Admin Login</div></div><div class="card" style="padding:24px">' + e + '<div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px">EMAIL</div><input class="inp" id="em" type="email" placeholder="faizan@zaiqa.com"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px">PASSWORD</div><input class="inp" id="pw" type="password" placeholder="Password" style="margin-bottom:18px"><button class="pbtn" onclick="tryLogin()">Sign In →</button></div></div></div>');
}

function tryLogin() {
  var em = document.getElementById("em").value.trim();
  var pw = document.getElementById("pw").value;
  if (em === ADMIN_EMAIL && pw === ADMIN_PASS) {
    state.loggedIn = true;
    loadAll();
  } else {
    showLogin("Wrong email or password!");
  }
}

function loadAll() {
  show('<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#F0F4FF"><div style="font-size:48px">⚙️</div><div style="font-size:16px;font-weight:600;color:#1E3A8A">Loading data...</div></div>');
  Promise.all([
    dbGet("restaurants", "select=*&order=created_at.desc"),
    dbGet("orders", "select=*&order=created_at.desc"),
    dbGet("customers", "select=*&order=created_at.desc"),
    dbGet("restaurant_owners", "select=*&order=created_at.desc"),
    dbGet("delivery_riders", "select=*&order=created_at.desc")
  ]).then(function(results) {
    state.restaurants = Array.isArray(results[0]) ? results[0] : [];
    state.orders = Array.isArray(results[1]) ? results[1] : [];
    state.customers = Array.isArray(results[2]) ? results[2] : [];
    state.owners = Array.isArray(results[3]) ? results[3] : [];
    state.riders = Array.isArray(results[4]) ? results[4] : [];
    renderApp();
  }).catch(function(err) {
    show('<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;background:#F0F4FF"><div style="font-size:48px">❌</div><div style="font-size:16px;font-weight:700;color:#DC2626;text-align:center">Load failed:<br>' + err.message + '</div><button class="pbtn" style="width:200px;margin-top:10px" onclick="loadAll()">Retry</button></div>');
  });
}

function renderApp() {
  var tabs = {dashboard:"📊 Dashboard", restaurants:"🏪 Restaurants", orders:"📋 Orders", customers:"👥 Customers", owners:"👨‍💼 Owners", riders:"🏍️ Riders"};
  var html = '<div style="min-height:100vh;background:#F0F4FF;padding-bottom:30px">';
  // topbar
  html += '<div style="background:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;box-shadow:0 2px 10px rgba(37,99,235,.08);position:sticky;top:0;z-index:50">';
  html += '<button onclick="openDrawer()" style="width:38px;height:38px;border-radius:9px;background:#EEF2FF;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px"><div style="width:16px;height:2px;background:#2563EB;border-radius:2px"></div><div style="width:12px;height:2px;background:#2563EB;border-radius:2px"></div><div style="width:16px;height:2px;background:#2563EB;border-radius:2px"></div></button>';
  html += '<div style="font-size:16px;font-weight:700;color:#1E3A8A">' + (tabs[state.tab] || "Dashboard") + '</div>';
  html += '<button onclick="loadAll()" style="width:38px;height:38px;border-radius:9px;background:#EEF2FF;border:none;cursor:pointer;font-size:20px">🔄</button>';
  html += '</div>';
  html += '<div style="padding:16px">' + getTabContent() + '</div></div>';
  document.getElementById("app").innerHTML = html;
  if (state.drawer) renderDrawer();
  if (state.modal) renderModal();
}

function openDrawer() { state.drawer = true; renderApp(); }
function closeDrawer() { state.drawer = false; renderApp(); }

function renderDrawer() {
  var items = [["📊","Dashboard","dashboard"],["🏪","Restaurants","restaurants"],["📋","Orders","orders"],["👥","Customers","customers"],["👨‍💼","Owners","owners"],["🏍️","Riders","riders"]];
  var html = '<div class="overlay" onclick="closeDrawer()"></div><div class="drawer"><div style="background:linear-gradient(135deg,#1E3A8A,#2563EB);padding:34px 20px 22px"><div style="font-size:40px;margin-bottom:8px">🍽️</div><div style="font-size:18px;font-weight:800;color:#fff">Zaiqa Admin</div></div><div style="padding:12px">';
  items.forEach(function(item) {
    var active = state.tab === item[2];
    html += '<div onclick="setTab(\'' + item[2] + '\')" style="display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;margin-bottom:3px;cursor:pointer;background:' + (active ? "#EEF2FF" : "transparent") + ';color:' + (active ? "#2563EB" : "#475569") + ';font-weight:' + (active ? "700" : "500") + ';font-size:14px"><span>' + item[0] + '</span>' + item[1] + '</div>';
  });
  html += '<div onclick="doLogout()" style="display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;cursor:pointer;background:#FEF2F2;color:#DC2626;font-weight:600;font-size:14px;margin-top:8px"><span>🚪</span>Logout</div>';
  html += '</div></div>';
  document.getElementById("app").insertAdjacentHTML("beforeend", html);
}

function setTab(t) { state.tab = t; state.drawer = false; renderApp(); }
function doLogout() { state.loggedIn = false; state.drawer = false; showLogin(); }

function getTabContent() {
  if (state.tab === "dashboard") return dashContent();
  if (state.tab === "restaurants") return restContent();
  if (state.tab === "orders") return ordContent();
  if (state.tab === "customers") return custContent();
  if (state.tab === "owners") return ownContent();
  if (state.tab === "riders") return riderContent();
  return dashContent();
}

function dashContent() {
  var rev = state.orders.filter(function(o){return o.status==="Delivered";}).reduce(function(a,o){return a+(o.total||0);},0);
  var pending = state.orders.filter(function(o){return ["Pending","Preparing"].includes(o.status);}).length;
  var today = state.orders.filter(function(o){return new Date(o.created_at).toDateString()===new Date().toDateString();}).length;
  var html = '<div style="font-size:12px;color:#64748B;margin-bottom:14px">' + new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"}) + '</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">';
  var stats = [["📦","Orders",state.orders.length,"#2563EB"],["💰","Revenue","₹"+rev.toLocaleString(),"#16A34A"],["👥","Customers",state.customers.length,"#7C3AED"],["🏪","Restaurants",state.restaurants.length,"#D97706"],["⏳","Pending",pending,"#DC2626"],["📅","Today",today,"#0891B2"]];
  stats.forEach(function(s) {
    html += '<div class="card" style="display:flex;align-items:center;gap:10px;margin-bottom:0"><div style="font-size:26px">' + s[0] + '</div><div><div style="font-size:22px;font-weight:900;color:' + s[3] + '">' + s[2] + '</div><div style="font-size:11px;color:#94A3B8;margin-top:1px">' + s[1] + '</div></div></div>';
  });
  html += '</div><div style="font-size:15px;font-weight:700;color:#1E3A8A;margin-bottom:10px">Recent Orders</div>';
  state.orders.slice(0,5).forEach(function(o) {
    var sc = {Delivered:"#16A34A","On the Way":"#7C3AED",Preparing:"#D97706",Cancelled:"#DC2626",Pending:"#2563EB"}[o.status]||"#64748B";
    html += '<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:13px">' + (o.customer_name||"Customer") + '</div><div style="font-size:12px;color:#64748B;margin-top:2px">' + (o.restaurant_name||"") + ' · ₹' + (o.total||0) + '</div></div><span style="background:' + sc + '20;color:' + sc + ';padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">' + o.status + '</span></div>';
  });
  return html;
}

function restContent() {
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:700;color:#1E3A8A">🏪 Restaurants</div><button class="gbtn" onclick="openModal(\'addRest\')">+ Add</button></div>';
  if (!state.restaurants.length) html += '<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:8px">🏪</div><div style="color:#94A3B8">No restaurants yet</div></div>';
  state.restaurants.forEach(function(r) {
    html += '<div class="card"><div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><div style="font-size:34px;background:#F0F4FF;width:50px;height:50px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + (r.image||"🍛") + '</div><div style="flex:1"><div style="font-weight:700;font-size:14px">' + r.name + '</div><div style="font-size:12px;color:#64748B;margin-top:2px">' + (r.cuisine||"") + ' · ⭐' + (r.rating||4) + ' · ' + (r.delivery_time||"") + '</div></div><div><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="tog-' + r.id + '" ' + (r.active?"checked":"") + ' onchange="toggleRest(\'' + r.id + '\',this.checked)" style="width:18px;height:18px;cursor:pointer"><span style="font-size:11px;font-weight:700;color:' + (r.active?"#16A34A":"#94A3B8") + '">' + (r.active?"Live":"Off") + '</span></label></div></div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
    if(r.has_veg) html += '<span style="background:#DCFCE7;color:#16A34A;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">🥦 Veg</span>';
    if(r.has_nonveg) html += '<span style="background:#FEE2E2;color:#DC2626;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">🍗 Non-Veg</span>';
    if(r.is_halal) html += '<span style="background:#DBEAFE;color:#2563EB;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">☪️ Halal</span>';
    html += '</div><div style="display:flex;gap:8px"><button class="gbtn" style="flex:1;font-size:12px;padding:8px" onclick="openModal(\'menu\',\'' + r.id + '\',\'' + r.name.replace(/'/g,"") + '\')">📋 Menu</button><button class="dbtn" onclick="delRest(\'' + r.id + '\',\'' + r.name.replace(/'/g,"") + '\')">🗑️ Delete</button></div></div>';
  });
  return html;
}

function toggleRest(id, val) {
  dbPatch("restaurants", id, {active: val}).then(function(){ /* silent */ });
}
function delRest(id, name) {
  if (!confirm("Delete " + name + "?")) return;
  dbDelete("restaurants", id).then(loadAll);
}

function ordContent() {
  var filters = ["","Pending","Preparing","On the Way","Delivered","Cancelled"];
  var filtered = state.filterStatus ? state.orders.filter(function(o){return o.status===state.filterStatus;}) : state.orders;
  var html = '<div style="font-size:17px;font-weight:700;color:#1E3A8A;margin-bottom:12px">📋 Orders (' + filtered.length + ')</div>';
  html += '<div style="display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:3px">';
  filters.forEach(function(f) {
    var active = state.filterStatus === f;
    html += '<button onclick="setFilter(\'' + f + '\')" style="background:' + (active?"#2563EB":"#fff") + ';color:' + (active?"#fff":"#64748B") + ';border:1px solid #DBEAFE;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">' + (f||"All") + '</button>';
  });
  html += '</div>';
  filtered.forEach(function(o) {
    var sc = {Delivered:"#16A34A","On the Way":"#7C3AED",Preparing:"#D97706",Cancelled:"#DC2626",Pending:"#2563EB"}[o.status]||"#64748B";
    html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-weight:700;font-size:14px">' + (o.customer_name||"Customer") + '</div><div style="font-size:13px;font-weight:700;color:#2563EB;margin-top:2px">₹' + (o.total||0) + '</div><div style="font-size:11px;color:#94A3B8;margin-top:2px">' + new Date(o.created_at).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"}) + '</div></div><span style="background:' + sc + '20;color:' + sc + ';padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">' + o.status + '</span></div>';
    html += '<div style="background:#F8FAFF;border-radius:9px;padding:9px 11px;margin-bottom:10px;font-size:12px;color:#475569;line-height:1.9">📍 ' + (o.customer_address||"No address") + '<br>📱 ' + (o.customer_phone||"No phone") + '<br>🏪 ' + (o.restaurant_name||"") + (o.rider_name?"<br>🏍️ "+o.rider_name:"") + '</div>';
    html += '<select id="sel-' + o.id + '" onchange="updateOrderStatus(\'' + o.id + '\',this.value)" style="width:100%;padding:9px 11px;border-radius:9px;border:2px solid #E8EEFF;background:#F8FAFF;font-size:13px;outline:none">';
    ["Pending","Preparing","On the Way","Delivered","Cancelled"].forEach(function(s) {
      html += '<option value="' + s + '"' + (s===o.status?" selected":"") + '>' + s + '</option>';
    });
    html += '</select></div>';
  });
  return html;
}

function setFilter(f) { state.filterStatus = f; renderApp(); }
function updateOrderStatus(id, status) {
  dbPatch("orders", id, {status: status}).then(function(){ /* done */ });
}

function custContent() {
  var html = '<div style="font-size:17px;font-weight:700;color:#1E3A8A;margin-bottom:14px">👥 Customers (' + state.customers.length + ')</div>';
  if (!state.customers.length) return html + '<div class="card" style="text-align:center;padding:40px"><div style="font-size:13px;color:#94A3B8">No customers yet</div></div>';
  state.customers.forEach(function(c) {
    html += '<div class="card" style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">' + (c.profile_emoji||"👤") + '</div><div style="flex:1"><div style="font-weight:700;font-size:14px">' + (c.name||"Unknown") + '</div><div style="font-size:12px;color:#64748B;margin-top:2px">' + (c.phone||c.email||"") + '</div><div style="font-size:12px;font-weight:600;color:#2563EB;margin-top:2px">' + (c.total_orders||0) + ' orders · ₹' + ((c.total_spent||0).toLocaleString()) + '</div></div></div>';
  });
  return html;
}

function ownContent() {
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:700;color:#1E3A8A">👨‍💼 Owners</div><button class="gbtn" onclick="openModal(\'addOwner\')">+ Add</button></div>';
  if (!state.owners.length) html += '<div class="card" style="text-align:center;padding:40px"><div style="color:#94A3B8">No owners yet</div></div>';
  state.owners.forEach(function(o) {
    var rest = state.restaurants.find(function(r){return r.id===o.restaurant_id;});
    html += '<div class="card" style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:50%;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👨‍💼</div><div style="flex:1"><div style="font-weight:700;font-size:14px">' + o.name + '</div><div style="font-size:12px;color:#64748B;margin-top:2px">' + o.email + '</div><div style="font-size:12px;font-weight:600;color:#2563EB;margin-top:2px">' + (rest?"🏪 "+rest.name:"No restaurant") + '</div></div><button class="dbtn" onclick="delOwner(\'' + o.id + '\',\'' + o.name.replace(/'/g,"") + '\')">🗑️</button></div>';
  });
  return html;
}
function delOwner(id, name) { if(!confirm("Remove "+name+"?")) return; dbDelete("restaurant_owners",id).then(loadAll); }

function riderContent() {
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:700;color:#1E3A8A">🏍️ Riders</div><button class="gbtn" onclick="openModal(\'addRider\')">+ Add Rider</button></div>';
  if (!state.riders.length) {
    html += '<div class="card" style="text-align:center;padding:50px 20px"><div style="font-size:52px;margin-bottom:10px">🏍️</div><div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:6px">No riders yet</div><div style="font-size:13px;color:#94A3B8;margin-bottom:18px">Add riders so they can log in and accept deliveries</div><button class="gbtn" onclick="openModal(\'addRider\')">+ Add First Rider</button></div>';
    return html;
  }
  state.riders.forEach(function(r) {
    var total = state.orders.filter(function(o){return o.rider_name===r.name&&o.status==="Delivered";}).length;
    var today = state.orders.filter(function(o){return o.rider_name===r.name&&o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString();}).length;
    html += '<div class="card"><div style="display:flex;gap:10px;align-items:center;margin-bottom:12px"><div style="font-size:30px;width:52px;height:52px;background:#EEF2FF;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + (r.emoji||"🏍️") + '</div><div style="flex:1"><div style="font-weight:800;font-size:15px">' + r.name + '</div><div style="font-size:12px;color:#64748B;margin-top:2px">📱 ' + r.phone + '</div><div style="font-size:12px;color:#94A3B8;margin-top:1px">📍 ' + (r.area||"No area") + ' · ' + (r.vehicle||"Bike") + '</div></div><div><label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" ' + (r.active?"checked":"") + ' onchange="toggleRider(\'' + r.id + '\',this.checked)" style="width:18px;height:18px;cursor:pointer"><span style="font-size:10px;font-weight:700;color:' + (r.active?"#16A34A":"#94A3B8") + '">' + (r.active?"Online":"Offline") + '</span></label></div></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px"><div style="background:#EEF2FF;border-radius:9px;padding:9px;text-align:center"><div style="font-size:18px;font-weight:800;color:#2563EB">' + today + '</div><div style="font-size:10px;color:#94A3B8;margin-top:1px">Today</div></div><div style="background:#DCFCE7;border-radius:9px;padding:9px;text-align:center"><div style="font-size:18px;font-weight:800;color:#16A34A">' + total + '</div><div style="font-size:10px;color:#94A3B8;margin-top:1px">Total</div></div><div style="background:#FEF3C7;border-radius:9px;padding:9px;text-align:center"><div style="font-size:18px;font-weight:800;color:#D97706">₹' + (total*30) + '</div><div style="font-size:10px;color:#94A3B8;margin-top:1px">Earned</div></div></div>';
    html += '<button class="dbtn" style="width:100%;padding:9px" onclick="delRider(\'' + r.id + '\',\'' + r.name.replace(/'/g,"") + '\')">🗑️ Remove Rider</button></div>';
  });
  return html;
}
function toggleRider(id, val) { dbPatch("delivery_riders", id, {active: val}); }
function delRider(id, name) { if(!confirm("Remove "+name+"?")) return; dbDelete("delivery_riders",id).then(loadAll); }

// MODALS
function openModal(type, a, b) { state.modal = {type:type, a:a, b:b}; renderApp(); }
function closeModal() { state.modal = null; renderApp(); }

function renderModal() {
  var m = state.modal;
  var wrap = document.createElement("div");
  wrap.innerHTML = '<div class="mbg" onclick="closeModal()"></div><div class="mbox" id="mbox"><div style="width:34px;height:4px;border-radius:2px;background:#E2E8F0;margin:0 auto 18px"></div></div>';
  document.getElementById("app").appendChild(wrap);
  var box = document.getElementById("mbox");

  if (m.type === "addRest") {
    box.innerHTML += '<div style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:16px">🏪 Add Restaurant</div><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">NAME</div><input class="inp" id="rn" placeholder="Restaurant name"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">CUISINE</div><input class="inp" id="rc" placeholder="e.g. North Indian"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">EMOJI</div><input class="inp" id="re" placeholder="🍛 🍕 🍔" style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">DELIVERY TIME</div><input class="inp" id="rt" placeholder="25-35 min" value="25-35 min"><div style="display:flex;gap:8px;margin-bottom:18px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="rv" checked style="width:16px;height:16px"> Veg</label><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="rnv" checked style="width:16px;height:16px"> Non-Veg</label><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="rh" style="width:16px;height:16px"> Halal</label></div><button class="pbtn" onclick="submitRest()">Add Restaurant</button>';
  }

  else if (m.type === "menu") {
    box.innerHTML += '<div style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:14px">📋 ' + m.b + '</div><div id="itemlist"><div style="text-align:center;color:#94A3B8;font-size:13px;padding:10px">Loading...</div></div><div style="background:#F8FAFF;border-radius:12px;padding:14px;border:2px solid #E8EEFF;margin-top:14px"><div style="font-size:13px;font-weight:700;color:#2563EB;margin-bottom:10px">+ Add Item</div><input class="inp" id="iname" placeholder="Item name"><input class="inp" id="iprice" type="number" placeholder="Price ₹" style="margin-bottom:10px"><div style="display:flex;gap:8px;margin-bottom:12px"><button class="gbtn" style="flex:1" onclick="window._iv=true">🥦 Veg</button><button style="flex:1;background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;padding:9px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer" onclick="window._iv=false">🍗 Non-Veg</button></div><button class="pbtn" onclick="addMenuItem(\'' + m.a + '\')">✅ Add Item</button></div><button class="gbtn" style="width:100%;margin-top:12px;padding:11px" onclick="closeModal()">Close</button>';
    window._iv = true;
    loadMenuItems(m.a);
  }

  else if (m.type === "addOwner") {
    var opts = state.restaurants.map(function(r){ return '<option value="'+r.id+'">'+r.name+'</option>'; }).join("");
    box.innerHTML += '<div style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:16px">👨‍💼 Add Owner</div><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">NAME</div><input class="inp" id="on" placeholder="Owner name"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">EMAIL</div><input class="inp" id="oe" type="email" placeholder="email@example.com"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">PHONE</div><input class="inp" id="op" type="tel" placeholder="Phone"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">PASSWORD</div><input class="inp" id="opw" type="password" placeholder="Set password"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">RESTAURANT</div><select class="inp" id="or" style="margin-bottom:18px"><option value="">Select restaurant</option>' + opts + '</select><button class="pbtn" onclick="submitOwner()">Add Owner</button>';
  }

  else if (m.type === "addRider") {
    box.innerHTML += '<div style="font-size:17px;font-weight:800;color:#1E3A8A;margin-bottom:6px">🏍️ Add Rider</div><div style="font-size:13px;color:#64748B;margin-bottom:16px">Rider logs in on the Delivery app with phone + password</div><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">FULL NAME</div><input class="inp" id="rdn" placeholder="Rider full name"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">PHONE</div><input class="inp" id="rdph" type="tel" placeholder="Mobile number"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">PASSWORD</div><input class="inp" id="rdpw" type="password" placeholder="Set password"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">AREA</div><input class="inp" id="rda" placeholder="e.g. Coimbatore North"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:5px">VEHICLE</div><select class="inp" id="rdv" style="margin-bottom:14px"><option>Bike</option><option>Scooter</option><option>Bicycle</option><option>Car</option></select><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:8px">EMOJI</div><div style="display:flex;gap:8px;margin-bottom:18px" id="emojiPick"><span onclick="pickEmoji(this,\'🏍️\')" style="font-size:28px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid #2563EB">🏍️</span><span onclick="pickEmoji(this,\'🛵\')" style="font-size:28px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent">🛵</span><span onclick="pickEmoji(this,\'🚴\')" style="font-size:28px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent">🚴</span><span onclick="pickEmoji(this,\'🚗\')" style="font-size:28px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent">🚗</span></div><button class="pbtn" onclick="submitRider()">✅ Add Rider</button>';
    window._rdEmoji = "🏍️";
  }
}

function loadMenuItems(rid) {
  dbGet("menu_items", "select=*&restaurant_id=eq."+rid+"&order=created_at.desc").then(function(items) {
    var el = document.getElementById("itemlist");
    if (!el) return;
    if (!items || !items.length) { el.innerHTML = '<div style="text-align:center;color:#94A3B8;font-size:13px;padding:10px">No items yet</div>'; return; }
    var html = "";
    items.forEach(function(item) {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0F4FF"><div style="font-size:22px">' + (item.veg?"🥦":"🍗") + '</div><div style="flex:1"><div style="font-weight:600;font-size:13px">' + item.name + '</div><div style="font-size:12px;color:#2563EB;font-weight:600">₹' + item.price + '</div></div><button class="dbtn" onclick="delItem(\'' + item.id + '\',\'' + rid + '\')">🗑️</button></div>';
    });
    el.innerHTML = html;
  });
}

function delItem(id, rid) {
  dbDelete("menu_items", id).then(function(){ loadMenuItems(rid); });
}

function addMenuItem(rid) {
  var n = document.getElementById("iname").value.trim();
  var p = document.getElementById("iprice").value;
  if (!n || !p) { alert("Name and price required!"); return; }
  dbPost("menu_items", {restaurant_id: rid, name: n, price: parseFloat(p), veg: window._iv !== false, bestseller: false}).then(function(){ loadMenuItems(rid); document.getElementById("iname").value=""; document.getElementById("iprice").value=""; });
}

function submitRest() {
  var n = document.getElementById("rn").value.trim();
  if (!n) { alert("Restaurant name required!"); return; }
  dbPost("restaurants", {name:n, cuisine:document.getElementById("rc").value, image:document.getElementById("re").value||"🍛", delivery_time:document.getElementById("rt").value||"25-35 min", rating:4.0, has_veg:document.getElementById("rv").checked, has_nonveg:document.getElementById("rnv").checked, is_halal:document.getElementById("rh").checked, active:true}).then(function(){ closeModal(); loadAll(); });
}

function submitOwner() {
  var n=document.getElementById("on").value.trim(), e=document.getElementById("oe").value.trim(), p=document.getElementById("opw").value;
  if (!n||!e||!p) { alert("Name, email and password required!"); return; }
  dbPost("restaurant_owners", {name:n, email:e, phone:document.getElementById("op").value, password:p, restaurant_id:document.getElementById("or").value||null}).then(function(r){ if(r&&r.code){alert("Error: "+r.message);return;} closeModal(); loadAll(); });
}

function pickEmoji(el, emoji) {
  window._rdEmoji = emoji;
  document.querySelectorAll("#emojiPick span").forEach(function(s){ s.style.border="2px solid transparent"; });
  el.style.border = "2px solid #2563EB";
}

function submitRider() {
  var n=document.getElementById("rdn").value.trim(), ph=document.getElementById("rdph").value.trim(), pw=document.getElementById("rdpw").value;
  if (!n||!ph||!pw) { alert("Name, phone and password required!"); return; }
  var body = {name:n, phone:ph, password:pw, area:document.getElementById("rda").value||"", vehicle:document.getElementById("rdv").value||"Bike", emoji:window._rdEmoji||"🏍️", active:true};
  fetch(URL_BASE + "delivery_riders", {
    method:"POST",
    headers: {"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=representation","Accept-Profile":"public","Content-Profile":"public"},
    body: JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(r){
    if(r&&r.code){alert("DB Error: "+r.message);return;}
    if(r&&r.message){alert("Error: "+r.message);return;}
    closeModal(); loadAll();
  }).catch(function(e){alert("Network error: "+e.message);});
}

init();
</script>
</body>
</html>
