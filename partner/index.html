<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zaiqa Partner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#22C55E;border-radius:3px;}
.fade{animation:fade .2s ease;}@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;}}
.spin{animation:spin 1s linear infinite;}@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
input,select,button{font-family:'Nunito',sans-serif;}
.tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #1f1f1f;z-index:100;padding:8px 0 12px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createClient}=window.supabase;
const db=createClient("https://njxjqkebbloltsedecuh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4");
const STATUS_C={Pending:"#F59E0B",Preparing:"#3B82F6","On the Way":"#8B5CF6",Delivered:"#22C55E",Cancelled:"#EF4444"};
const NEXT={Pending:"Preparing",Preparing:"On the Way","On the Way":"Delivered"};

let S={screen:"login",owner:null,restaurant:null,orders:[],menuItems:[],tab:"orders",modal:null,loading:false,form:{email:"",password:""},err:""};
function ss(p){S={...S,...p};render();}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="cls")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(9)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return e;
}
function inp(ph,val,cb,type="text"){
  const e=el("input",{type,placeholder:ph,value:val||"",style:{width:"100%",padding:"12px 16px",borderRadius:12,border:"1px solid #2a2a2a",backgroundColor:"#161616",color:"#fff",fontSize:15,outline:"none"}});
  e.addEventListener("input",ev=>cb(ev.target.value));
  e.addEventListener("focus",()=>e.style.borderColor="#22C55E");
  e.addEventListener("blur",()=>e.style.borderColor="#2a2a2a");
  return e;
}
function btn(label,cb,bg="#22C55E",st={}){
  return el("button",{style:{backgroundColor:bg,color:"#fff",border:"none",borderRadius:12,padding:"12px 20px",fontWeight:800,fontSize:14,cursor:"pointer",...st},onClick:cb},label);
}
function badge(text,color){
  return el("span",{style:{backgroundColor:color+"22",color,padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:800}},text);
}
function card(st,...kids){return el("div",{style:{backgroundColor:"#161616",borderRadius:14,padding:16,border:"1px solid #1f1f1f",...st}},...kids);}
function loader(){return el("div",{style:{display:"flex",justifyContent:"center",padding:60}},el("div",{cls:"spin",style:{width:32,height:32,border:"3px solid #22C55E30",borderTop:"3px solid #22C55E",borderRadius:"50%"}}));}

async function loadData(){
  if(!S.owner)return;
  const [o,m]=await Promise.all([
    db.from("orders").select("*").eq("restaurant_name",S.restaurant?.name||"").order("created_at",{ascending:false}),
    db.from("menu_items").select("*").eq("restaurant_id",S.restaurant?.id||"").order("veg",{ascending:false})
  ]);
  ss({orders:o.data||[],menuItems:m.data||[]});
}

async function handleLogin(){
  const {email,password}=S.form;
  if(!email||!password){ss({err:"Enter email and password!"});return;}
  ss({loading:true,err:""});
  const {data:rows}=await db.from("restaurant_owners").select("*").eq("email",email).limit(1);
  const owner=rows&&rows[0];
  if(!owner||owner.password!==password){ss({loading:false,err:"❌ Wrong email or password!"});return;}
  let restaurant=null;
  if(owner.restaurant_id){
    const {data}=await db.from("restaurants").select("*").eq("id",owner.restaurant_id).limit(1);
    restaurant=data&&data[0];
  }
  ss({loading:false,owner,restaurant,screen:"app"});
  loadData();
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  root.appendChild(S.screen==="login"?loginScreen():appScreen());
}

function loginScreen(){
  const wrap=el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 30% 30%,#052212,#0a0a0a 60%)",padding:20}});
  wrap.appendChild(el("div",{style:{width:"100%",maxWidth:360}},
    el("div",{style:{textAlign:"center",marginBottom:36}},
      el("div",{style:{fontSize:60,marginBottom:10}},"🏪"),
      el("div",{style:{fontSize:24,fontWeight:900,color:"#22C55E"}},"Partner Portal"),
      el("div",{style:{fontSize:13,color:"#444",marginTop:4}},"Zaiqa Restaurant Dashboard")
    ),
    S.err?el("div",{style:{backgroundColor:"#EF444420",color:"#EF4444",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,marginBottom:16}},S.err):null,
    el("div",{style:{marginBottom:12}},
      el("div",{style:{fontSize:11,color:"#444",fontWeight:700,marginBottom:6,letterSpacing:.5}},"EMAIL"),
      inp("Your email",S.form.email,v=>S.form.email=v,"email")
    ),
    el("div",{style:{marginBottom:24}},
      el("div",{style:{fontSize:11,color:"#444",fontWeight:700,marginBottom:6,letterSpacing:.5}},"PASSWORD"),
      inp("Your password",S.form.password,v=>S.form.password=v,"password")
    ),
    btn(S.loading?"Please wait...":"🔐 Login to Dashboard",handleLogin,"#22C55E",{width:"100%",padding:14,fontSize:15,opacity:S.loading?.6:1}),
    el("div",{style:{textAlign:"center",marginTop:16,fontSize:12,color:"#444"}},"Contact Zaiqa admin to get your login credentials")
  ));
  return wrap;
}

function appScreen(){
  const tabs=[["📋","Orders","orders"],["🍽️","Menu","menu"],["📊","Stats","stats"],["⚙️","Settings","settings"]];
  const wrap=el("div",{style:{minHeight:"100vh",paddingBottom:80}});

  // Header
  wrap.appendChild(el("div",{style:{backgroundColor:"#111",borderBottom:"1px solid #1f1f1f",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
    el("div",{},
      el("div",{style:{fontWeight:900,fontSize:16,color:"#22C55E"}},S.restaurant?.name||"Your Restaurant"),
      el("div",{style:{fontSize:11,color:"#444",marginTop:2}},"Partner Dashboard")
    ),
    el("div",{style:{display:"flex",alignItems:"center",gap:10}},
      el("div",{style:{width:10,height:10,borderRadius:"50%",backgroundColor:S.restaurant?.active?"#22C55E":"#EF4444"}}),
      el("span",{style:{fontSize:12,color:S.restaurant?.active?"#22C55E":"#EF4444",fontWeight:700}},S.restaurant?.active?"Live":"Offline")
    )
  ));

  const main=el("div",{style:{padding:16}});
  if(S.loading){main.appendChild(loader());}
  else{
    ({orders:ordersTab,menu:menuTab,stats:statsTab,settings:settingsTab}[S.tab]||ordersTab)(main);
  }
  if(S.modal)wrap.appendChild(modalOverlay());
  wrap.appendChild(main);

  // Tab bar
  wrap.appendChild(el("div",{cls:"tab-bar"},
    ...tabs.map(([icon,lbl,tab])=>el("div",{
      style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",color:S.tab===tab?"#22C55E":"#444",fontSize:10,fontWeight:800},
      onClick:()=>{ss({tab,modal:null});if(tab==="orders"||tab==="menu")loadData();}},
      el("span",{style:{fontSize:22}},icon),lbl
    ))
  ));
  return wrap;
}

function ordersTab(main){
  const pending=S.orders.filter(o=>o.status==="Pending");
  const active=S.orders.filter(o=>["Preparing","On the Way"].includes(o.status));
  const done=S.orders.filter(o=>["Delivered","Cancelled"].includes(o.status));

  const div=el("div",{cls:"fade"});
  div.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
    el("div",{style:{fontSize:18,fontWeight:900}},"📋 Orders"),
    el("div",{style:{display:"flex",gap:8}},
      pending.length?badge(pending.length+" New","#F59E0B"):null,
      btn("🔄",()=>loadData(),"#1f1f1f",{padding:"8px 12px",border:"1px solid #2a2a2a",fontSize:16})
    )
  ));

  if(!S.orders.length){
    div.appendChild(el("div",{style:{textAlign:"center",padding:60,color:"#333"}},
      el("div",{style:{fontSize:56,marginBottom:12}},"📭"),
      el("div",{style:{fontSize:16,fontWeight:700,color:"#444"}},"No orders yet"),
      el("div",{style:{fontSize:13,marginTop:6}},"New orders will appear here")
    ));
  }

  for(const[title,list,color]of[["🔴 New Orders",pending,"#F59E0B"],["🟡 Active",active,"#3B82F6"],["✅ Completed",done,"#555"]]){
    if(!list.length)continue;
    div.appendChild(el("div",{style:{fontSize:13,fontWeight:800,color,marginBottom:10,marginTop:16}},title+" ("+list.length+")"));
    for(const o of list){
      const canUpdate=!!NEXT[o.status];
      div.appendChild(card({marginBottom:10},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
          el("div",{},
            el("div",{style:{fontWeight:900,fontSize:15}},"Order #"+o.id),
            el("div",{style:{fontSize:12,color:"#666",marginTop:2}},new Date(o.created_at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}))
          ),
          badge(o.status||"Pending",STATUS_C[o.status]||"#888")
        ),
        el("div",{style:{fontSize:13,color:"#aaa",marginBottom:4}},"👤 "+(o.customer_name||"")+" • 📱 "+(o.customer_phone||"")),
        el("div",{style:{fontSize:13,color:"#666",marginBottom:4}},"🛒 "+o.items),
        el("div",{style:{fontSize:12,color:"#555",marginBottom:10}},"📍 "+o.customer_address),
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          el("div",{style:{fontWeight:900,fontSize:18,color:"#22C55E"}},"₹"+o.total),
          canUpdate?btn("→ Mark as "+NEXT[o.status],async()=>{
            await db.from("orders").update({status:NEXT[o.status]}).eq("id",o.id);
            loadData();
          },"#22C55E",{padding:"8px 16px",fontSize:12,borderRadius:8}):
          o.status==="Pending"?btn("❌ Cancel",async()=>{
            if(confirm("Cancel this order?")){{await db.from("orders").update({status:"Cancelled"}).eq("id",o.id);loadData();}}
          },"#EF444420",{padding:"8px 14px",fontSize:12,border:"1px solid #EF4444",color:"#EF4444",borderRadius:8}):null
        )
      ));
    }
  }
  main.appendChild(div);
}

function menuTab(main){
  const div=el("div",{cls:"fade"});
  div.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
    el("div",{style:{fontSize:18,fontWeight:900}},"🍽️ Menu ("+S.menuItems.length+")"),
    btn("+ Add Item",()=>ss({modal:{type:"addItem",data:{name:"",description:"",price:"",veg:true,bestseller:false}}}),"#22C55E",{padding:"10px 16px",borderRadius:10,fontSize:13})
  ));
  const veg=S.menuItems.filter(i=>i.veg),nonveg=S.menuItems.filter(i=>!i.veg);
  for(const[title,list,color]of[["🥗 Veg Items",veg,"#22C55E"],["🍖 Non-Veg Items",nonveg,"#EF4444"]]){
    if(!list.length)continue;
    div.appendChild(el("div",{style:{fontSize:13,fontWeight:800,color,marginBottom:10,marginTop:8}},title));
    for(const item of list){
      div.appendChild(card({marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10},
        el("div",{style:{flex:1}},
          el("div",{style:{display:"flex",gap:6,alignItems:"center",marginBottom:4}},
            item.bestseller?badge("🔥 Best","#F59E0B"):null
          ),
          el("div",{style:{fontWeight:700,fontSize:14}},item.name),
          item.description?el("div",{style:{fontSize:12,color:"#555",marginTop:2}},item.description):null,
          el("div",{style:{fontSize:16,fontWeight:900,color:"#22C55E",marginTop:4}},"₹"+item.price)
        ),
        el("div",{style:{display:"flex",gap:6}},
          btn("🔥",async()=>{await db.from("menu_items").update({bestseller:!item.bestseller}).eq("id",item.id);loadData();},"#F59E0B20",{padding:"7px 10px",border:"1px solid #F59E0B",color:"#F59E0B",borderRadius:8,fontSize:13}),
          btn("🗑️",async()=>{if(confirm("Delete "+item.name+"?")){await db.from("menu_items").delete().eq("id",item.id);loadData();}},"#EF444420",{padding:"7px 10px",border:"1px solid #EF4444",color:"#EF4444",borderRadius:8,fontSize:13})
        )
      ));
    }
  }
  if(!S.menuItems.length)div.appendChild(el("div",{style:{textAlign:"center",padding:50,color:"#333"}},
    el("div",{style:{fontSize:50,marginBottom:10}},"🍽️"),
    el("div",{style:{fontSize:15,fontWeight:700,color:"#444"}},"Menu is empty"),
    el("div",{style:{fontSize:12,marginTop:6}},"Add your dishes above")
  ));
  main.appendChild(div);
}

function statsTab(main){
  const orders=S.orders;
  const delivered=orders.filter(o=>o.status==="Delivered");
  const revenue=delivered.reduce((s,o)=>s+(o.total||0),0);
  const today=orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString());
  const todayRev=today.filter(o=>o.status==="Delivered").reduce((s,o)=>s+(o.total||0),0);
  const div=el("div",{cls:"fade"});
  div.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20}},"📊 Your Stats"));
  const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}});
  for(const[icon,lbl,val,c]of[
    ["💰","Total Revenue","₹"+revenue.toLocaleString(),"#22C55E"],
    ["📦","Total Orders",orders.length,"#3B82F6"],
    ["📅","Today's Orders",today.length,"#F59E0B"],
    ["💵","Today's Revenue","₹"+todayRev.toLocaleString(),"#EC4899"],
    ["✅","Delivered",delivered.length,"#22C55E"],
    ["❌","Cancelled",orders.filter(o=>o.status==="Cancelled").length,"#EF4444"],
  ]){
    grid.appendChild(card({padding:14,borderLeft:`3px solid ${c}`},
      el("div",{style:{fontSize:26,marginBottom:6}},icon),
      el("div",{style:{fontSize:20,fontWeight:900,color:c}},val),
      el("div",{style:{fontSize:11,color:"#555",marginTop:2}},lbl)
    ));
  }
  div.appendChild(grid);
  main.appendChild(div);
}

function settingsTab(main){
  const r=S.restaurant;
  const div=el("div",{cls:"fade"});
  div.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20}},"⚙️ Settings"));
  if(r){
    div.appendChild(card({marginBottom:16},
      el("div",{style:{fontSize:36,marginBottom:8}},r.image||"🍽️"),
      el("div",{style:{fontSize:18,fontWeight:900}},r.name),
      el("div",{style:{fontSize:13,color:"#666",marginTop:4}},r.cuisine),
      el("div",{style:{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}},
        badge("⭐ "+r.rating,"#F59E0B"),
        badge(r.delivery_time,"#3B82F6"),
        r.is_halal?badge("✅ Halal","#22C55E"):null
      )
    ));
    div.appendChild(card({marginBottom:16},
      el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        el("div",{},
          el("div",{style:{fontWeight:800,fontSize:15}},r.active?"🟢 Restaurant is Live":"🔴 Restaurant is Offline"),
          el("div",{style:{fontSize:12,color:"#555",marginTop:4}},r.active?"Customers can see and order from you":"You're hidden from customers")
        ),
        el("div",{style:{width:52,height:30,borderRadius:15,backgroundColor:r.active?"#22C55E":"#333",cursor:"pointer",position:"relative",transition:"all .2s"},
          onClick:async()=>{await db.from("restaurants").update({active:!r.active}).eq("id",r.id);const {data}=await db.from("restaurants").select("*").eq("id",r.id).limit(1);ss({restaurant:data&&data[0]});}},
          el("div",{style:{width:24,height:24,borderRadius:"50%",backgroundColor:"#fff",position:"absolute",top:3,left:r.active?25:3,transition:"all .2s"}})
        )
      )
    ));
  }
  div.appendChild(card({},
    el("div",{style:{fontWeight:800,fontSize:15,marginBottom:4}},"👤 "+S.owner?.name),
    el("div",{style:{fontSize:13,color:"#666",marginBottom:2}},S.owner?.email),
    el("div",{style:{fontSize:13,color:"#555"}},S.owner?.phone||""),
    btn("🚪 Logout",()=>ss({screen:"login",owner:null,restaurant:null,orders:[],menuItems:[],form:{email:"",password:""},err:""}),"#EF444420",{marginTop:16,width:"100%",border:"1px solid #EF4444",color:"#EF4444"})
  ));
  main.appendChild(div);
}

function modalOverlay(){
  const {type,data}=S.modal;
  const overlay=el("div",{style:{position:"fixed",inset:0,backgroundColor:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"},
    onClick:e=>{if(e.target===overlay)ss({modal:null});}
  });
  const box=el("div",{style:{backgroundColor:"#161616",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",border:"1px solid #2a2a2a"}});
  box.appendChild(el("div",{style:{width:40,height:4,borderRadius:2,backgroundColor:"#2a2a2a",margin:"0 auto 20px"}}));

  if(type==="addItem"){
    const d={...data};
    box.appendChild(el("div",{style:{fontSize:18,fontWeight:900,marginBottom:20,color:"#22C55E"}},"+ Add Menu Item"));
    for(const[ph,key,t]of[["Item Name","name","text"],["Description (optional)","description","text"],["Price (₹)","price","number"]]){
      box.appendChild(el("div",{style:{marginBottom:14}},
        el("div",{style:{fontSize:11,color:"#444",fontWeight:700,marginBottom:5,letterSpacing:.5}},ph.toUpperCase()),
        inp(ph,d[key],v=>d[key]=v,t)
      ));
    }
    for(const[key,lbl,c]of[["veg","🥗 Vegetarian Item","#22C55E"],["bestseller","🔥 Mark as Bestseller","#F59E0B"]]){
      box.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1f1f1f"}},
        el("span",{style:{fontSize:14,color:"#aaa"}},lbl),
        el("div",{style:{width:46,height:26,borderRadius:13,backgroundColor:d[key]?c:"#2a2a2a",cursor:"pointer",position:"relative",transition:"all .2s"},
          onClick:()=>{d[key]=!d[key];ss({modal:{type,data:{...d}}});}},
          el("div",{style:{width:20,height:20,borderRadius:"50%",backgroundColor:"#fff",position:"absolute",top:3,left:d[key]?23:3,transition:"all .2s"}})
        )
      ));
    }
    box.appendChild(el("div",{style:{display:"flex",gap:10,marginTop:20}},
      btn("Cancel",()=>ss({modal:null}),"#1f1f1f",{flex:1,border:"1px solid #2a2a2a",color:"#666"}),
      btn("✅ Add to Menu",async()=>{
        if(!d.name||!d.price){alert("Name and price required!");return;}
        await db.from("menu_items").insert([{restaurant_id:S.restaurant.id,name:d.name,description:d.description||"",price:parseFloat(d.price),veg:!!d.veg,bestseller:!!d.bestseller}]);
        ss({modal:null});loadData();
      },"#22C55E",{flex:2})
    ));
  }
  overlay.appendChild(box);
  return overlay;
}

render();
</script>
</body>
</html>
