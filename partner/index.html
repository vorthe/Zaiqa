<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Zaiqa Partner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#F0F4FF;color:#1a1a2e;}
button,input,select{font-family:'Poppins',sans-serif;}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 16px rgba(37,99,235,.07);border:1px solid #EEF2FF;margin-bottom:12px;}
.inp{width:100%;padding:13px 16px;background:#F8FAFF;border:2px solid #E8EEFF;border-radius:12px;color:#1a1a2e;font-size:14px;outline:none;font-family:'Poppins',sans-serif;display:block;box-sizing:border-box;margin-bottom:12px;}
.inp:focus{border-color:#2563EB;}
.btn{background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;padding:13px 20px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif;}
.btn-w{background:#fff;color:#2563EB;border:1px solid #DBEAFE;padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;}
.btn-d{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;padding:8px 12px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EEF2FF;display:flex;padding:10px 0 16px;z-index:100;}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);">
    <div style="font-size:50px;">🏪</div>
    <div style="font-size:20px;font-weight:800;color:#1E3A8A;">Zaiqa Partner</div>
    <div style="font-size:13px;color:#64748B;">Loading...</div>
  </div>
</div>
<script>
var SURL="https://njxjqkebbloltsedecuh.supabase.co";
var SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4";
var H={"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","apikey":SKEY,"Accept":"application/json"};
function sget(t,q){return fetch(SURL+"/rest/v1/"+t+"?"+q,{headers:H}).then(function(r){return r.json();});}
function spatch(t,id,d){return fetch(SURL+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify(d)});}
function sins(t,d){return fetch(SURL+"/rest/v1/"+t,{method:"POST",headers:Object.assign({},H,{"Prefer":"return=representation"}),body:JSON.stringify(d)}).then(function(r){return r.json();});}
function sdel(t,id){return fetch(SURL+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:H});}

var owner=null,restaurant=null,orders=[],menu=[],currentTab="orders";

async function doLogin(email,pass){
  var rows=await sget("restaurant_owners","select=*&email=eq."+encodeURIComponent(email)+"&limit=1");
  if(!Array.isArray(rows)||!rows[0]||rows[0].password!==pass){renderLogin("Wrong email or password!");return;}
  owner=rows[0];
  var rrows=await sget("restaurants","select=*&id=eq."+owner.restaurant_id+"&limit=1");
  restaurant=rrows&&rrows[0]||null;
  await loadData();
  renderApp();
}
async function loadData(){
  if(!restaurant)return;
  var res=await Promise.all([
    sget("orders","select=*&restaurant_name=eq."+encodeURIComponent(restaurant.name)+"&order=created_at.desc"),
    sget("menu_items","select=*&restaurant_id=eq."+restaurant.id+"&order=created_at.desc")
  ]);
  orders=Array.isArray(res[0])?res[0]:[];
  menu=Array.isArray(res[1])?res[1]:[];
}

function renderLogin(err){
  var app=document.getElementById("app");app.innerHTML="";
  var w=document.createElement("div");w.style.cssText="min-height:100vh;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);display:flex;align-items:center;justify-content:center;padding:24px;";
  w.innerHTML='<div style="width:100%;max-width:380px;"><div style="text-align:center;margin-bottom:28px;"><div style="width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#2563EB,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;">🏪</div><div style="font-size:22px;font-weight:800;color:#1E3A8A;margin-bottom:4px;">Partner Login</div><div style="font-size:13px;color:#64748B;">Restaurant Owner Portal</div></div><div class="card" style="padding:24px;">'+(err?'<div style="background:#FEE2E2;border-radius:10px;padding:11px 14px;color:#DC2626;font-size:13px;font-weight:600;margin-bottom:14px;text-align:center;">'+err+'</div>':'')+'<div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">EMAIL</div><input class="inp" type="email" id="em" placeholder="your@email.com"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">PASSWORD</div><input class="inp" type="password" id="pw" placeholder="Your password" style="margin-bottom:18px;"><button class="btn" id="lb" style="width:100%;">Sign In →</button></div></div>';
  app.appendChild(w);
  document.getElementById("lb").addEventListener("click",async function(){
    var em=document.getElementById("em").value.trim(),pw=document.getElementById("pw").value;
    if(!em||!pw){renderLogin("Enter email and password!");return;}
    document.getElementById("lb").textContent="Please wait...";
    try{await doLogin(em,pw);}catch(e){renderLogin("Login failed: "+e.message);}
  });
}

function renderApp(){
  var app=document.getElementById("app");app.innerHTML="";
  var active=orders.filter(function(o){return ["Pending","Preparing"].includes(o.status);});
  var wrap=document.createElement("div");wrap.style.cssText="min-height:100vh;background:#F0F4FF;padding-bottom:80px;";

  var hdr=document.createElement("div");hdr.style.cssText="background:linear-gradient(135deg,#1E3A8A,#2563EB);padding:20px 18px 22px;";
  hdr.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div><div style="font-size:12px;color:rgba(255,255,255,.65);">Welcome,</div><div style="font-size:18px;font-weight:800;color:#fff;">'+(restaurant&&restaurant.image||"🏪")+" "+(restaurant&&restaurant.name||"Partner")+'</div></div><div id="liveToggleWrap" style="background:rgba(255,255,255,.15);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;"><div id="liveToggle" style="width:36px;height:20px;border-radius:10px;background:'+(restaurant&&restaurant.active?"#4ADE80":"#CBD5E1")+';position:relative;"><div style="position:absolute;top:2px;left:'+(restaurant&&restaurant.active?"18px":"2px")+';width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;"></div></div><span style="font-size:11px;color:#fff;font-weight:600;">'+(restaurant&&restaurant.active?"Live":"Offline")+'</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#fff;">'+active.length+'</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Active</div></div><div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#fff;">'+orders.filter(function(o){return o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString();}).length+'</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Today</div></div><div id="refreshBtn2" style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;cursor:pointer;"><div style="font-size:18px;color:#fff;">🔄</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Refresh</div></div></div>';
  wrap.appendChild(hdr);

  var main=document.createElement("div");main.id="pmain";main.style.padding="16px";wrap.appendChild(main);

  var tabbar=document.createElement("div");tabbar.className="tabbar";
  tabbar.innerHTML='<div id="pt-orders" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">📋</span>Orders</div><div id="pt-menu" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">🍽️</span>Menu</div><div id="pt-stats" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">📊</span>Stats</div><div id="pt-settings" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">⚙️</span>Settings</div>';
  wrap.appendChild(tabbar);
  app.appendChild(wrap);

  document.getElementById("liveToggleWrap").addEventListener("click",async function(){
    var newVal=!(restaurant&&restaurant.active);
    await spatch("restaurants",restaurant.id,{active:newVal});
    restaurant.active=newVal;
    renderApp();
  });
  document.getElementById("refreshBtn2").addEventListener("click",async function(){await loadData();renderApp();});

  function setTab(t){
    currentTab=t;
    ["orders","menu","stats","settings"].forEach(function(x){
      var el=document.getElementById("pt-"+x);
      if(el)el.style.color=x===t?"#2563EB":"#94A3B8";
    });
    renderPartnerMain();
  }
  document.getElementById("pt-orders").addEventListener("click",function(){setTab("orders");});
  document.getElementById("pt-menu").addEventListener("click",function(){setTab("menu");});
  document.getElementById("pt-stats").addEventListener("click",function(){setTab("stats");});
  document.getElementById("pt-settings").addEventListener("click",function(){setTab("settings");});
  setTab(currentTab);
}

function renderPartnerMain(){
  var main=document.getElementById("pmain");if(!main)return;main.innerHTML="";
  if(currentTab==="orders")renderOrders(main);
  else if(currentTab==="menu")renderMenu(main);
  else if(currentTab==="stats")renderStats(main);
  else renderSettings(main);
}

function renderOrders(main){
  var active=orders.filter(function(o){return ["Pending","Preparing"].includes(o.status);});
  var recent=orders.filter(function(o){return !["Pending","Preparing"].includes(o.status);}).slice(0,8);
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:14px;";h.textContent="📋 Incoming Orders";main.appendChild(h);
  if(!active.length){
    var e=document.createElement("div");e.className="card";e.style.textAlign="center";e.style.padding="40px 20px";
    e.innerHTML='<div style="font-size:48px;margin-bottom:10px;">😴</div><div style="font-size:14px;font-weight:600;color:#475569;">No new orders</div>';
    main.appendChild(e);
  }
  active.forEach(function(o){
    var c=document.createElement("div");c.className="card";c.style.border="2px solid #DBEAFE";
    var statusBtn=o.status==="Pending"?'<button id="act-'+o.id+'" class="btn" style="flex:2;font-size:12px;padding:10px;">👨‍🍳 Start Preparing</button>':'<button id="act-'+o.id+'" class="btn" style="flex:2;font-size:12px;padding:10px;background:linear-gradient(135deg,#16A34A,#15803D);">✅ Ready for Pickup</button>';
    c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div><div style="font-size:14px;font-weight:700;color:#1E3A8A;">Order #'+o.id+'</div><div style="font-size:11px;color:#94A3B8;margin-top:2px;">'+new Date(o.created_at).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"})+'</div></div><div style="font-size:22px;font-weight:900;color:#2563EB;">₹'+o.total+'</div></div><div style="background:#EEF2FF;border-radius:12px;padding:12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#2563EB;margin-bottom:6px;">👤 CUSTOMER</div><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:14px;font-weight:700;color:#1a1a2e;">'+(o.customer_name||"Customer")+'</div><div style="font-size:12px;color:#64748B;margin-top:2px;">'+(o.customer_address||"No address")+'</div><div style="font-size:12px;font-weight:700;color:#2563EB;margin-top:3px;">📱 '+(o.customer_phone||"")+'</div></div><button id="call-'+o.id+'" class="btn" style="padding:8px 14px;font-size:12px;">📞 Call</button></div></div><div style="background:#F8FAFF;border-radius:12px;padding:12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#94A3B8;margin-bottom:5px;">🛒 ORDER ITEMS</div><div style="font-size:13px;color:#475569;line-height:1.8;">'+(o.items||"")+'</div><div style="display:flex;justify-content:space-between;margin-top:8px;"><span style="font-size:12px;color:#64748B;">'+(o.payment_method==="COD"?"💵 Cash on Delivery":"✅ Paid Online")+'</span><span style="font-size:15px;font-weight:800;color:#2563EB;">₹'+o.total+'</span></div></div>'+(o.rider_name?'<div style="background:#DCFCE7;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;font-weight:600;color:#16A34A;">🏍️ Rider: '+o.rider_name+'</div>':'')+'<div style="display:flex;gap:8px;">'+statusBtn+'<button id="cancel-'+o.id+'" class="btn-d">❌ Cancel</button></div>';
    main.appendChild(c);
    document.getElementById("call-"+o.id).addEventListener("click",function(){window.open("tel:"+(o.customer_phone||""));});
    document.getElementById("act-"+o.id).addEventListener("click",async function(){
      var ns=o.status==="Pending"?"Preparing":"Ready";
      await spatch("orders",o.id,{status:ns});
      await loadData();renderApp();
    });
    document.getElementById("cancel-"+o.id).addEventListener("click",async function(){
      if(confirm("Cancel order #"+o.id+"?")){await spatch("orders",o.id,{status:"Cancelled"});await loadData();renderApp();}
    });
  });
  if(recent.length){
    var rh=document.createElement("div");rh.style.cssText="font-size:15px;font-weight:700;color:#1E3A8A;margin-bottom:10px;margin-top:6px;";rh.textContent="📜 Recent";main.appendChild(rh);
    recent.forEach(function(o){
      var sc={Delivered:"#16A34A",Cancelled:"#DC2626"}[o.status]||"#D97706";
      var c=document.createElement("div");c.className="card";c.style.cssText="display:flex;justify-content:space-between;align-items:center;padding:14px;";
      c.innerHTML='<div><div style="font-weight:600;font-size:13px;">'+(o.customer_name||"Customer")+'</div><div style="font-size:11px;color:#64748B;margin-top:2px;">'+new Date(o.created_at).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"})+'</div></div><div style="display:flex;align-items:center;gap:10px;"><div style="font-size:14px;font-weight:700;color:#2563EB;">₹'+o.total+'</div><span style="background:'+sc+'20;color:'+sc+';border:1px solid '+sc+'40;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;">'+o.status+'</span></div>';
      main.appendChild(c);
    });
  }
}

function renderMenu(main){
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:14px;";h.textContent="🍽️ Menu ("+menu.length+")";main.appendChild(h);
  var form=document.createElement("div");form.className="card";form.style.border="2px solid #DBEAFE";
  form.innerHTML='<div style="font-size:13px;font-weight:700;color:#2563EB;margin-bottom:12px;">+ Add New Item</div><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">ITEM NAME</div><input class="inp" id="iname" placeholder="e.g. Chicken Biryani"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">PRICE (₹)</div><input class="inp" id="iprice" type="number" placeholder="199" style="margin-bottom:12px;"><div style="display:flex;gap:8px;margin-bottom:14px;"><button id="vegBtn" class="btn-w" style="flex:1;">🥦 Veg</button><button id="nvBtn" style="flex:1;background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;border-radius:10px;padding:10px;cursor:pointer;font-family:Poppins,sans-serif;font-weight:600;font-size:13px;">🍗 Non-Veg</button></div><button id="addItem" class="btn" style="width:100%;">✅ Add to Menu</button>';
  main.appendChild(form);
  var isVeg=true;
  document.getElementById("vegBtn").addEventListener("click",function(){isVeg=true;});
  document.getElementById("nvBtn").addEventListener("click",function(){isVeg=false;});
  document.getElementById("addItem").addEventListener("click",async function(){
    var n=document.getElementById("iname").value.trim(),p=document.getElementById("iprice").value;
    if(!n||!p){alert("Name and price required!");return;}
    await sins("menu_items",{restaurant_id:restaurant.id,name:n,price:parseFloat(p),veg:isVeg,bestseller:false});
    await loadData();renderPartnerMain();
  });
  if(!menu.length){
    var e=document.createElement("div");e.className="card";e.style.textAlign="center";e.style.padding="24px";
    e.innerHTML='<div style="font-size:13px;color:#94A3B8;">No menu items yet. Add your first item above.</div>';
    main.appendChild(e);
  }
  menu.forEach(function(item){
    var c=document.createElement("div");c.className="card";c.style.cssText="display:flex;align-items:center;gap:12px;padding:14px;";
    c.innerHTML='<div style="width:44px;height:44px;border-radius:10px;background:'+(item.veg?"#DCFCE7":"#FEE2E2")+';display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">'+(item.veg?"🥦":"🍗")+'</div><div style="flex:1;"><div style="font-weight:600;font-size:13px;">'+(item.name)+'</div><div style="font-size:13px;font-weight:700;color:#2563EB;margin-top:2px;">₹'+item.price+'</div>'+(item.bestseller?'<div style="font-size:11px;color:#D97706;margin-top:2px;">⭐ Bestseller</div>':'')+'</div><button id="del-'+item.id+'" class="btn-d">🗑️</button>';
    main.appendChild(c);
    document.getElementById("del-"+item.id).addEventListener("click",async function(){
      if(confirm("Remove "+item.name+"?")){await sdel("menu_items",item.id);await loadData();renderPartnerMain();}
    });
  });
}

function renderStats(main){
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:18px;";h.textContent="📊 Stats";main.appendChild(h);
  var delivered=orders.filter(function(o){return o.status==="Delivered";});
  var revenue=delivered.reduce(function(a,o){return a+(o.total||0);},0);
  var today=orders.filter(function(o){return o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString();});
  var big=document.createElement("div");big.className="card";big.style.background="linear-gradient(135deg,#1E3A8A,#2563EB)";big.style.border="none";big.style.textAlign="center";big.style.marginBottom="16px";
  big.innerHTML='<div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:6px;">TOTAL REVENUE</div><div style="font-size:42px;font-weight:900;color:#fff;">₹'+revenue.toLocaleString()+'</div><div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:6px;">'+delivered.length+' orders</div>';
  main.appendChild(big);
  var grid=document.createElement("div");grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:12px;";
  grid.innerHTML='<div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#16A34A;">₹'+today.reduce(function(a,o){return a+(o.total||0);},0).toLocaleString()+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Today Revenue</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#2563EB;">'+today.length+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Today Orders</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#D97706;">'+menu.length+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Menu Items</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#DC2626;">'+orders.filter(function(o){return o.status==="Cancelled";}).length+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Cancelled</div></div>';
  main.appendChild(grid);
}

function renderSettings(main){
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:18px;";h.textContent="⚙️ Settings";main.appendChild(h);
  var c=document.createElement("div");c.className="card";
  c.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:12px;">'+(restaurant&&restaurant.image||"🏪")+" "+(restaurant&&restaurant.name||"Restaurant")+'</div><div style="font-size:13px;color:#64748B;line-height:2.2;">🍴 '+(restaurant&&restaurant.cuisine||"")+'<br>⭐ '+(restaurant&&restaurant.rating||"")+'<br>🕐 '+(restaurant&&restaurant.delivery_time||"")+'<br>👤 '+(owner&&owner.name||"")+'<br>📧 '+(owner&&owner.email||"")+'</div>';
  main.appendChild(c);
  var lb=document.createElement("button");lb.className="btn-d";lb.style.cssText="width:100%;padding:13px;margin-top:8px;font-size:14px;";lb.textContent="🚪 Logout";
  lb.addEventListener("click",function(){owner=null;restaurant=null;orders=[];menu=[];currentTab="orders";renderLogin();});
  main.appendChild(lb);
}

renderLogin();
</script>
</body>
</html>
