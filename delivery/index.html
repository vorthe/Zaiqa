<style>

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

<body>
<div id="root"></div>
<script>
const {createClient}=window.supabase;
const db=createClient("https://njxjqkebbloltsedecuh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4");

// Masked support numbers — rider calls this, we forward to customer (privacy)
const SUPPORT_NUMBER = "9000000000"; // Replace with your masked number

let S={screen:"splash",rider:null,orders:[],tab:"available",form:{phone:"",password:""},err:"",loading:false};
function ss(p){S={...S,...p};render();}

function h(tag,props={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="cls")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.flat(9).forEach(c=>{if(c==null||c===false||c===undefined)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}
const div=(p,...k)=>h("div",p,...k);
const span=(p,...k)=>h("span",p,...k);

function btn(label,cb,type="primary",extra={}){
  const styles={
    primary:{background:"linear-gradient(135deg,#2563EB,#1D4ED8)",color:"#fff",border:"none",boxShadow:"0 4px 14px rgba(37,99,235,.3)"},
    white:{background:"#fff",color:"#2563EB",border:"1px solid #DBEAFE"},
    danger:{background:"#FEE2E2",color:"#DC2626",border:"1px solid #FECACA"},
    success:{background:"linear-gradient(135deg,#16A34A,#15803D)",color:"#fff",border:"none",boxShadow:"0 4px 14px rgba(22,163,74,.3)"},
    ghost:{background:"transparent",color:"#64748B",border:"1px solid #E2E8F0"},
    orange:{background:"linear-gradient(135deg,#EA580C,#DC2626)",color:"#fff",border:"none",boxShadow:"0 4px 14px rgba(234,88,12,.3)"},
  };
  return h("button",{style:{...styles[type]||styles.primary,padding:"12px 20px",borderRadius:12,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap",...extra},onClick:cb},label);
}
function card(style={},...kids){return div({style:{background:"#fff",borderRadius:18,padding:20,boxShadow:"0 2px 16px rgba(0,0,0,.06)",border:"1px solid #EEF2FF",...style}},...kids);}
function inp(ph,val,cb,type="text"){
  const e=h("input",{type,placeholder:ph,value:val||"",style:{width:"100%",padding:"14px 16px",background:"#F8FAFF",border:"2px solid #E8EEFF",borderRadius:12,color:"#1a1a2e",fontSize:14,outline:"none"}});
  e.addEventListener("input",ev=>cb(ev.target.value));
  e.addEventListener("focus",()=>e.style.borderColor="#2563EB");
  e.addEventListener("blur",()=>e.style.borderColor="#E8EEFF");
  return e;
}

async function requestPermissions(){
  if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(()=>{},()=>{},{timeout:5000});
}

async function loadOrders(){
  try{
    const {data}=await db.from("orders").select("*").in("status",["Preparing","On the Way"]).order("created_at",{ascending:true});
    ss({orders:data||[]});
  }catch(e){ss({orders:[]});}
}

let locationWatchers={};
function startLocationSharing(orderId){
  if(locationWatchers[orderId]||!navigator.geolocation)return;
  locationWatchers[orderId]=navigator.geolocation.watchPosition(
    async pos=>{await db.from("orders").update({rider_lat:pos.coords.latitude,rider_lng:pos.coords.longitude}).eq("id",orderId);},
    ()=>{},{enableHighAccuracy:true,maximumAge:5000,timeout:15000}
  );
}
function stopLocationSharing(orderId){
  if(locationWatchers[orderId]){navigator.geolocation.clearWatch(locationWatchers[orderId]);delete locationWatchers[orderId];}
}

// Generate 4-digit OTP per order
function getOTP(orderId){return String(orderId).split("").reduce((a,c)=>a+c.charCodeAt(0),1337).toString().slice(-4);}

// Mask customer address - show area but not full address
function maskAddress(addr){
  if(!addr)return "Address hidden";
  const parts=addr.split(",");
  if(parts.length>2)return parts.slice(-2).join(",").trim()+" (Full address on delivery)";
  return addr;
}

async function handleLogin(){
  const {phone,password}=S.form;
  if(!phone||!password){ss({err:"Enter phone and password!"});return;}
  ss({loading:true,err:""});
  try{
    const {data:rows}=await db.from("delivery_riders").select("*").eq("phone",phone).limit(1);
    const rider=rows&&rows[0];
    if(!rider||rider.password!==password){ss({loading:false,err:"❌ Wrong phone or password!"});return;}
    ss({loading:false,rider,screen:"app",err:""});
    requestPermissions();
    loadOrders();
  }catch(e){ss({loading:false,err:"❌ Login failed. Try again!"});}
}

function render(){
  document.getElementById("root").innerHTML="";
  ({splash:splashScreen,login:loginScreen,app:appScreen}[S.screen]||loginScreen)();
}

function splashScreen(){
  setTimeout(()=>ss({screen:"login"}),2200);

      div({style:{fontSize:13,color:"#64748B"}}),"Delivery Partner App"
    )
  );
}

      div({style:{width:"100%",maxWidth:380}},
        div({style:{textAlign:"center",marginBottom:36}},

          div({style:{fontSize:24,fontWeight:800,color:"#1E3A8A",marginBottom:6}}),"Rider Login",
          div({style:{fontSize:13,color:"#64748B"}}),"Zaiqa Delivery Partner Portal"
        ),
        card({padding:28,boxShadow:"0 8px 40px rgba(37,99,235,.1)"},
          S.err?div({style:{background:"#FEE2E2",borderRadius:10,padding:"12px 16px",color:"#DC2626",fontSize:13,fontWeight:600,marginBottom:16,textAlign:"center"}},S.err):null,
          div({style:{marginBottom:14}},div({style:{fontSize:11,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:7}}),"PHONE NUMBER",inp("Your registered phone",S.form.phone,v=>S.form.phone=v,"tel")),
          div({style:{marginBottom:24}},div({style:{fontSize:11,fontWeight:700,color:"#94A3B8",letterSpacing:1,marginBottom:7}}),"PASSWORD",inp("Your password",S.form.password,v=>S.form.password=v,"password")),
          btn(S.loading?"Please wait...":"🚀 Start Delivering",handleLogin,"primary",{width:"100%",padding:15,fontSize:15,borderRadius:14,opacity:S.loading?.6:1})
        ),
        div({style:{textAlign:"center",marginTop:20,fontSize:12,color:"#94A3B8"}}),"Contact Zaiqa admin for your login credentials"
      )
    )
  );
}

function appScreen(){
  const available=S.orders.filter(o=>o.status==="Preparing");
  const myOrders=S.orders.filter(o=>o.status==="On the Way");

  const wrap=div({style:{minHeight:"100vh",background:"#F0F4FF",paddingBottom:80}});

  // Header
  wrap.appendChild(div({style:{background:"linear-gradient(135deg,#1E3A8A,#2563EB)",padding:"20px 20px 24px"}},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      div({},
        div({style:{fontSize:12,color:"rgba(255,255,255,.65)",marginBottom:2}}),"Welcome back,",
        div({style:{fontSize:20,fontWeight:800,color:"#fff"}}),S.rider?.emoji+" "+(S.rider?.name?.split(" ")[0]||"Rider")
      ),
      div({style:{textAlign:"right"}},
        div({style:{fontSize:11,color:"rgba(255,255,255,.65)"}}),"Active Orders",

    div({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}},

      div({style:{background:"rgba(255,255,255,.15)",borderRadius:12,padding:"10px",textAlign:"center"}},div({style:{fontSize:18,fontWeight:800,color:"#fff"}}),S.rider?.area||"All",div({style:{fontSize:10,color:"rgba(255,255,255,.7)"}}),"Your Area"),

  wrap.appendChild(main);

  // Tab bar

      )
    )
  ));
  root.appendChild(wrap);
}

        div({style:{background:"#EDE9FE",color:"#7C3AED",padding:"5px 14px",borderRadius:20,fontSize:11,fontWeight:700}}),"🚀 On the Way"
      ),

      div({style:{background:"#EEF2FF",borderRadius:12,padding:14,marginBottom:10}},
        div({style:{fontSize:11,fontWeight:700,color:"#2563EB",letterSpacing:.5,marginBottom:6}}),"📦 PICK UP",
        div({style:{fontSize:15,fontWeight:700,color:"#1E3A8A"}}),o.restaurant_name||"Restaurant",

      ),
      // Customer — address visible on active delivery, but NOT phone
      div({style:{background:"#DCFCE7",borderRadius:12,padding:14,marginBottom:10}},
        div({style:{fontSize:11,fontWeight:700,color:"#16A34A",letterSpacing:.5,marginBottom:6}}),"🏠 DELIVERY ADDRESS",
        div({style:{fontSize:14,fontWeight:600,color:"#1a1a2e",lineHeight:1.5}}),o.customer_address||"No address",
        div({style:{marginTop:10,background:"#fff",borderRadius:10,padding:"10px 14px"}}),
        div({style:{fontSize:11,color:"#64748B",marginBottom:4}}),"Need to contact customer?",
        div({style:{display:"flex",gap:8,alignItems:"center"}},
          div({style:{fontSize:13,fontWeight:600,color:"#475569"}}),"Call via support line:",
          btn("📞 Call",()=>window.open("tel:"+SUPPORT_NUMBER),"primary",{padding:"7px 14px",fontSize:12,borderRadius:10})
        )
      ),
      // Items + payment
      div({style:{background:"#F8FAFF",borderRadius:12,padding:14,marginBottom:14}},
        div({style:{fontSize:11,fontWeight:700,color:"#94A3B8",letterSpacing:.5,marginBottom:6}}),"ORDER ITEMS",
        div({style:{fontSize:13,color:"#475569",lineHeight:1.6}}),o.items||"",
        o.payment_method==="COD"?div({style:{marginTop:10,background:"#FEF3C7",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}},div({style:{fontSize:13,fontWeight:700,color:"#D97706"}}),"💵 COLLECT CASH",div({style:{fontSize:18,fontWeight:900,color:"#D97706"}}),"₹"+o.total):
        div({style:{marginTop:10,background:"#DCFCE7",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#16A34A"}}),"✅ PAID ONLINE — No cash needed"
      ),
      // OTP PIN
      div({style:{background:"linear-gradient(135deg,#1E3A8A,#2563EB)",borderRadius:14,padding:16,marginBottom:14,textAlign:"center"}},
        div({style:{fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:8}}),"DELIVERY OTP — Ask customer to confirm",
        div({style:{fontSize:42,fontWeight:900,color:"#fff",letterSpacing:12}}),otp,
        div({style:{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:6}}),"Customer must provide this 4-digit code"
      ),
      // Buttons
      div({style:{display:"flex",gap:8}},
        btn("🗺️ Navigate",()=>window.open("https://maps.google.com/?q="+encodeURIComponent(o.customer_address||"")),"white",{flex:1,fontSize:12,padding:11}),

          }
          loadOrders();
        },"success",{flex:2,fontSize:13,padding:11})
      )
    ));

  main.appendChild(d);
}
