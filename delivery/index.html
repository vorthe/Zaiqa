<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Zaiqa Rider</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#F0F4FF;color:#1a1a2e;}
button,input,select{font-family:'Poppins',sans-serif;}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 16px rgba(37,99,235,.07);border:1px solid #EEF2FF;margin-bottom:12px;}
.inp{width:100%;padding:13px 16px;background:#F8FAFF;border:2px solid #E8EEFF;border-radius:12px;color:#1a1a2e;font-size:14px;outline:none;font-family:'Poppins',sans-serif;display:block;box-sizing:border-box;}
.inp:focus{border-color:#2563EB;}
.btn{width:100%;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;padding:14px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Poppins',sans-serif;}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EEF2FF;display:flex;padding:10px 0 16px;z-index:100;}
.errbx{background:#FEE2E2;border-radius:10px;padding:12px 16px;color:#DC2626;font-size:13px;font-weight:600;margin-bottom:14px;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);">
    <div style="font-size:50px;">🏍️</div>
    <div style="font-size:20px;font-weight:800;color:#1E3A8A;">Zaiqa Rider</div>
    <div style="font-size:13px;color:#64748B;">Loading...</div>
  </div>
</div>

<script>
// Inline Supabase using fetch — no CDN dependency
var SURL = "https://njxjqkebbloltsedecuh.supabase.co";
var SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGpxa2ViYmxvbHRzZWRlY3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.SurEvT-3Kd5rHNMdfmrRd8ZltpCHTs3NoBrV-5PtHw4";

function sget(table, query) {
  var url = SURL + "/rest/v1/" + table + "?" + query + "&apikey=" + SKEY;
  return fetch(url, {headers:{"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","Accept":"application/json"}}).then(function(r){return r.json();});
}
function spatch(table, id, data) {
  return fetch(SURL+"/rest/v1/"+table+"?id=eq."+id, {method:"PATCH",headers:{"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","apikey":SKEY},body:JSON.stringify(data)});
}
function sins(table, data) {
  return fetch(SURL+"/rest/v1/"+table, {method:"POST",headers:{"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","apikey":SKEY,"Prefer":"return=representation"},body:JSON.stringify(data)}).then(function(r){return r.json();});
}

var SUPPORT = "9000000000";
var rider = null;
var orders = [];
var currentTab = "available";

function otp(id){ return String(Number(String(id).replace(/\D/g,"")%10000)).padStart(4,"0"); }

// GPS
var watchers = {};
function startGPS(oid){
  if(watchers[oid]||!navigator.geolocation)return;
  watchers[oid]=navigator.geolocation.watchPosition(function(p){
    spatch("orders",oid,{rider_lat:p.coords.latitude,rider_lng:p.coords.longitude});
  },function(){},{enableHighAccuracy:true,maximumAge:5000});
}
function stopGPS(oid){
  if(watchers[oid]){navigator.geolocation.clearWatch(watchers[oid]);delete watchers[oid];}
}

async function loadOrders(){
  try{
    var data = await sget("orders","select=*&status=in.(\"Preparing\",\"On the Way\")&order=created_at.asc");
    orders = Array.isArray(data) ? data : [];
    renderApp();
  }catch(e){ orders=[]; renderApp(); }
}

async function doLogin(phone, pass){
  showMsg("Logging in...");
  try{
    var rows = await sget("delivery_riders","select=*&phone=eq."+encodeURIComponent(phone)+"&limit=1");
    if(!Array.isArray(rows)||!rows[0]){showMsg("Wrong phone or password!");return;}
    if(rows[0].password !== pass){showMsg("Wrong phone or password!");return;}
    rider = rows[0];
    if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
    if(navigator.geolocation) navigator.geolocation.getCurrentPosition(function(){},function(){});
    await loadOrders();
  }catch(e){ showMsg("Login failed: "+e.message); }
}

function showMsg(msg){
  var app = document.getElementById("app");
  app.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);padding:24px;"><div style="font-size:50px;">🏍️</div><div style="font-size:16px;font-weight:600;color:#1E3A8A;text-align:center;">'+msg+'</div></div>';
}

function renderLogin(err){
  var app = document.getElementById("app");
  app.innerHTML = "";
  var wrap = document.createElement("div");
  wrap.style.cssText = "min-height:100vh;background:linear-gradient(160deg,#EEF2FF,#DBEAFE);display:flex;align-items:center;justify-content:center;padding:24px;";
  var box = document.createElement("div");
  box.style.cssText = "width:100%;max-width:380px;";
  box.innerHTML = '<div style="text-align:center;margin-bottom:28px;"><div style="width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#2563EB,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;">🏍️</div><div style="font-size:22px;font-weight:800;color:#1E3A8A;margin-bottom:4px;">Rider Login</div><div style="font-size:13px;color:#64748B;">Zaiqa Delivery Partner</div></div><div class="card" style="padding:24px;">'+(err?'<div class="errbx">'+err+'</div>':'')+'<div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">PHONE NUMBER</div><input class="inp" type="tel" id="ph" placeholder="Your registered phone" style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:6px;">PASSWORD</div><input class="inp" type="password" id="pw" placeholder="Your password" style="margin-bottom:18px;"><button class="btn" id="loginBtn">🚀 Start Delivering</button></div><div style="text-align:center;margin-top:14px;font-size:12px;color:#94A3B8;">Contact Zaiqa admin for credentials</div>';
  wrap.appendChild(box);
  app.appendChild(wrap);
  document.getElementById("loginBtn").addEventListener("click",function(){
    var ph=document.getElementById("ph").value.trim();
    var pw=document.getElementById("pw").value;
    if(!ph||!pw){renderLogin("Enter phone and password!");return;}
    doLogin(ph,pw);
  });
}

function renderApp(){
  var app = document.getElementById("app");
  app.innerHTML = "";
  var avail = orders.filter(function(o){return o.status==="Preparing";});
  var active = orders.filter(function(o){return o.status==="On the Way";});

  var wrap = document.createElement("div");
  wrap.style.cssText = "min-height:100vh;background:#F0F4FF;padding-bottom:80px;";

  // Header
  var hdr = document.createElement("div");
  hdr.style.cssText = "background:linear-gradient(135deg,#1E3A8A,#2563EB);padding:20px 18px 22px;";
  hdr.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div><div style="font-size:12px;color:rgba(255,255,255,.65);margin-bottom:2px;">Welcome back,</div><div style="font-size:19px;font-weight:800;color:#fff;">'+(rider.emoji||"🏍️")+" "+(rider.name.split(" ")[0]||"Rider")+'</div></div><div style="text-align:right;"><div style="font-size:11px;color:rgba(255,255,255,.65);">Active</div><div style="font-size:30px;font-weight:900;color:#fff;">'+active.length+'</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#fff;">'+avail.length+'</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Available</div></div><div style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:13px;font-weight:700;color:#fff;">'+(rider.area||"All")+'</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Area</div></div><div id="refreshBtn" style="background:rgba(255,255,255,.15);border-radius:10px;padding:10px;text-align:center;cursor:pointer;"><div style="font-size:18px;color:#fff;">🔄</div><div style="font-size:10px;color:rgba(255,255,255,.7);">Refresh</div></div></div>';
  wrap.appendChild(hdr);

  var main = document.createElement("div");
  main.id = "main";
  main.style.cssText = "padding:16px;";
  wrap.appendChild(main);

  // Tab bar
  var tabbar = document.createElement("div");
  tabbar.className = "tabbar";
  tabbar.innerHTML = '<div id="tab-available" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">📦</span>Available</div><div id="tab-active" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">🏍️</span>Deliveries</div><div id="tab-earnings" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;padding:4px;"><span style="font-size:22px;">💰</span>Earnings</div>';
  wrap.appendChild(tabbar);
  app.appendChild(wrap);

  function setTab(t){
    currentTab=t;
    ["available","active","earnings"].forEach(function(x){
      var el=document.getElementById("tab-"+x);
      if(el) el.style.color = x===t?"#2563EB":"#94A3B8";
    });
    renderMain();
  }
  document.getElementById("tab-available").addEventListener("click",function(){setTab("available");loadOrders();});
  document.getElementById("tab-active").addEventListener("click",function(){setTab("active");loadOrders();});
  document.getElementById("tab-earnings").addEventListener("click",function(){setTab("earnings");});
  document.getElementById("refreshBtn").addEventListener("click",loadOrders);
  setTab(currentTab);
}

function renderMain(){
  var main = document.getElementById("main");
  if(!main)return;
  main.innerHTML="";
  var avail = orders.filter(function(o){return o.status==="Preparing";});
  var active = orders.filter(function(o){return o.status==="On the Way";});
  if(currentTab==="available") renderAvailable(main,avail);
  else if(currentTab==="active") renderActive(main,active);
  else renderEarnings(main);
}

function renderAvailable(main,list){
  var h=document.createElement("div");
  h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:14px;";
  h.textContent="📦 Available Orders";
  main.appendChild(h);
  if(!list.length){
    var c=document.createElement("div");c.className="card";c.style.textAlign="center";c.style.padding="50px 20px";
    c.innerHTML='<div style="font-size:52px;margin-bottom:10px;">😴</div><div style="font-size:14px;font-weight:600;color:#475569;">No orders ready yet</div>';
    main.appendChild(c);return;
  }
  list.forEach(function(o){
    var c=document.createElement("div");c.className="card";
    c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div><div style="font-size:13px;font-weight:700;color:#1E3A8A;">Order #'+o.id+'</div><div style="font-size:11px;color:#94A3B8;margin-top:2px;">'+new Date(o.created_at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+'</div></div><div style="font-size:22px;font-weight:900;color:#2563EB;">₹'+o.total+'</div></div><div style="background:#EEF2FF;border-radius:12px;padding:12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#2563EB;margin-bottom:5px;">📦 PICK UP FROM</div><div style="font-size:15px;font-weight:700;color:#1E3A8A;">'+(o.restaurant_name||"Restaurant")+'</div><div style="font-size:12px;color:#64748B;margin-top:2px;">Show Order ID #'+o.id+' at counter</div></div><div style="background:#DCFCE7;border-radius:12px;padding:12px;margin-bottom:12px;"><div style="font-size:11px;font-weight:700;color:#16A34A;margin-bottom:5px;">🏠 DELIVERY AREA</div><div style="font-size:13px;color:#475569;">'+(o.customer_address||"").split(",").slice(-2).join(",").trim()+'</div><div style="background:#fff;border-radius:8px;padding:8px 12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;color:#64748B;">Contact via support:</div><div style="font-size:13px;font-weight:700;color:#2563EB;">📞 '+SUPPORT+'</div></div>'+(o.payment_method==="COD"?'<div style="background:#FEF3C7;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;font-weight:700;color:#D97706;">💵 Collect ₹'+o.total+' cash</div>':'<div style="background:#DCFCE7;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;font-weight:700;color:#16A34A;">✅ Paid online</div>')+'</div><button class="btn" id="acc-'+o.id+'">✅ Accept & Pick Up</button>';
    main.appendChild(c);
    document.getElementById("acc-"+o.id).addEventListener("click",async function(){
      await spatch("orders",o.id,{status:"On the Way",rider_name:rider.name||"",rider_phone:rider.phone||""});
      startGPS(o.id);
      currentTab="active";
      await loadOrders();
    });
  });
}

function renderActive(main,list){
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:14px;";h.textContent="🚀 Active Deliveries";main.appendChild(h);
  if(!list.length){
    var c=document.createElement("div");c.className="card";c.style.textAlign="center";c.style.padding="50px 20px";
    c.innerHTML='<div style="font-size:52px;margin-bottom:10px;">🏍️</div><div style="font-size:14px;font-weight:600;color:#475569;">No active deliveries</div><div style="font-size:13px;color:#94A3B8;margin-top:4px;">Accept an order from Available tab</div>';
    main.appendChild(c);return;
  }
  list.forEach(function(o){
    var pin=otp(o.id);
    var c=document.createElement("div");c.className="card";c.style.border="2px solid #DBEAFE";
    c.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div><div style="font-size:14px;font-weight:700;color:#1E3A8A;">Order #'+o.id+'</div><div style="font-size:11px;color:#94A3B8;margin-top:2px;">'+new Date(o.created_at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})+'</div></div><span style="background:#EDE9FE;color:#7C3AED;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;">🚀 On the Way</span></div><div style="background:#EEF2FF;border-radius:12px;padding:12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#2563EB;margin-bottom:4px;">📦 PICK UP</div><div style="font-size:15px;font-weight:700;color:#1E3A8A;">'+(o.restaurant_name||"Restaurant")+'</div><div style="font-size:12px;color:#64748B;margin-top:2px;">Show #'+o.id+' at counter</div></div><div style="background:#DCFCE7;border-radius:12px;padding:12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:#16A34A;margin-bottom:4px;">🏠 DELIVER TO</div><div style="font-size:13px;color:#1a1a2e;line-height:1.6;">'+(o.customer_address||"No address")+'</div><div style="background:#fff;border-radius:8px;padding:8px 12px;margin-top:8px;"><div style="font-size:11px;color:#64748B;margin-bottom:4px;">Need to contact customer?</div><div style="display:flex;gap:8px;align-items:center;"><div style="font-size:13px;color:#475569;">Call support:</div><button id="call-'+o.id+'" style="background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;padding:7px 14px;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;font-family:Poppins,sans-serif;">📞 Call</button></div></div>'+(o.payment_method==="COD"?'<div style="background:#FEF3C7;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;font-weight:700;color:#D97706;">💵 COLLECT ₹'+o.total+' CASH</div>':'<div style="background:#DCFCE7;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;font-weight:700;color:#16A34A;">✅ PAID ONLINE</div>')+'</div><div style="background:linear-gradient(135deg,#1E3A8A,#2563EB);border-radius:12px;padding:14px;margin-bottom:12px;text-align:center;"><div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:6px;">DELIVERY PIN — Customer must confirm</div><div style="font-size:44px;font-weight:900;color:#fff;letter-spacing:10px;">'+pin+'</div><div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:6px;">Ask customer for this 4-digit code</div></div><div style="display:flex;gap:8px;"><button id="nav-'+o.id+'" style="flex:1;background:#fff;color:#2563EB;border:1px solid #DBEAFE;padding:11px;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;font-family:Poppins,sans-serif;">🗺️ Navigate</button><button id="done-'+o.id+'" style="flex:2;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:Poppins,sans-serif;">✅ Delivered</button></div>';
    main.appendChild(c);
    document.getElementById("call-"+o.id).addEventListener("click",function(){window.open("tel:"+SUPPORT);});
    document.getElementById("nav-"+o.id).addEventListener("click",function(){window.open("https://maps.google.com/?q="+encodeURIComponent(o.customer_address||""));});
    document.getElementById("done-"+o.id).addEventListener("click",async function(){
      await spatch("orders",o.id,{status:"Delivered",rider_lat:null,rider_lng:null});
      stopGPS(o.id);
      if(o.customer_id){
        var cr=await sget("customers","select=total_orders,total_spent&id=eq."+o.customer_id+"&limit=1");
        if(cr&&cr[0]) await spatch("customers",o.customer_id,{total_orders:(cr[0].total_orders||0)+1,total_spent:(cr[0].total_spent||0)+(o.total||0)});
      }
      await loadOrders();
    });
  });
}

function renderEarnings(main){
  var h=document.createElement("div");h.style.cssText="font-size:16px;font-weight:700;color:#1E3A8A;margin-bottom:18px;";h.textContent="💰 My Earnings";main.appendChild(h);
  var totalDel=orders.filter(function(o){return o.status==="Delivered";}).length;
  var todayDel=orders.filter(function(o){return o.status==="Delivered"&&new Date(o.created_at).toDateString()===new Date().toDateString();}).length;
  var bigCard=document.createElement("div");bigCard.className="card";bigCard.style.background="linear-gradient(135deg,#1E3A8A,#2563EB)";bigCard.style.border="none";bigCard.style.textAlign="center";bigCard.style.marginBottom="16px";
  bigCard.innerHTML='<div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:6px;">TOTAL EARNED</div><div style="font-size:42px;font-weight:900;color:#fff;">₹'+(totalDel*30).toLocaleString()+'</div><div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:6px;">'+totalDel+' deliveries</div>';
  main.appendChild(bigCard);
  var grid=document.createElement("div");grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;";
  grid.innerHTML='<div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#16A34A;">₹'+(todayDel*30)+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Today</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#2563EB;">'+todayDel+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Today Orders</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#D97706;">'+totalDel+'</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Total</div></div><div class="card" style="text-align:center;margin-bottom:0;"><div style="font-size:24px;font-weight:800;color:#7C3AED;">₹30</div><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Per Delivery</div></div>';
  main.appendChild(grid);
  var logoutBtn=document.createElement("button");logoutBtn.className="btn";logoutBtn.style.background="#fff";logoutBtn.style.color="#DC2626";logoutBtn.style.border="1px solid #FECACA";logoutBtn.textContent="🚪 Logout";
  logoutBtn.addEventListener("click",function(){rider=null;orders=[];currentTab="available";renderLogin();});
  main.appendChild(logoutBtn);
}

// START
renderLogin();
</script>
</body>
</html>
