// ===================== ADMIN DASHBOARD =====================
function AdminDashboard({ onLogout }) {
  const [tab, setTab] = useState("orders");
  const [orders, setOrders] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [stats, setStats] = useState({ total: 0, revenue: 0, pending: 0, delivered: 0 });

  useEffect(() => { fetchData(); }, [tab]);

  const fetchData = async () => {
    setLoading(true);
    try {
      if (tab === "orders" || tab === "dashboard") {
        const { data } = await supabase.from("orders").select("*").order("created_at", { ascending: false });
        if (data) {
          setOrders(data);
          setStats({
            total: data.length,
            revenue: data.reduce((s, o) => s + (o.total || 0), 0),
            pending: data.filter(o => o.status === "Pending").length,
            delivered: data.filter(o => o.status === "Delivered").length,
          });
        }
      }
      if (tab === "customers") {
        const { data } = await supabase.from("customers").select("*").order("created_at", { ascending: false });
        if (data) setCustomers(data);
      }
    } catch(e) {}
    setLoading(false);
  };

  const updateStatus = async (id, status) => {
    await supabase.from("orders").update({ status }).eq("id", id);
    fetchData();
  };

  const statusColor = (s) => s === "Delivered" ? "#22C55E" : s === "Preparing" ? "#F59E0B" : s === "On the Way" ? "#3B82F6" : "#FF4D00";

  return (
    <div style={{ fontFamily:"'Nunito',sans-serif", minHeight:"100vh", backgroundColor:"#0F172A", color:"#fff", maxWidth:430, margin:"0 auto" }}>

          <div>
            <div style={{ fontSize:22, fontWeight:900 }}>🍽️ Zaiqa Admin</div>
            <div style={{ fontSize:12, opacity:0.85 }}>Creator Dashboard</div>
          </div>
          <button onClick={onLogout} style={{ backgroundColor:"rgba(255,255,255,0.2)", color:"#fff", border:"none", borderRadius:10, padding:"8px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Logout</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", backgroundColor:"#1E293B", borderBottom:"1px solid #334155" }}>
        {[["📊","dashboard"],["📦","orders"],["👥","customers"]].map(([icon,t]) => (
          <div key={t} onClick={() => setTab(t)} style={{ flex:1, padding:"12px 0", textAlign:"center", fontSize:11, fontWeight:700, cursor:"pointer", color:tab===t?"#FF4D00":"#94A3B8", borderBottom:tab===t?"2px solid #FF4D00":"2px solid transparent", textTransform:"capitalize" }}>
            {icon} {t}
          </div>
        ))}
      </div>

      <div style={{ padding:"16px 16px 30px", overflowY:"auto", maxHeight:"calc(100vh - 130px)" }}>

        {/* DASHBOARD TAB */}
        {tab === "dashboard" && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
              {[["📦","Total Orders",stats.total,"#3B82F6"],["💰","Revenue","₹"+stats.revenue,"#22C55E"],["⏳","Pending",stats.pending,"#F59E0B"],["✅","Delivered",stats.delivered,"#8B5CF6"]].map(([icon,label,val,color]) => (
                <div key={label} style={{ backgroundColor:"#1E293B", borderRadius:14, padding:16, borderLeft:`4px solid ${color}` }}>
                  <div style={{ fontSize:22 }}>{icon}</div>
                  <div style={{ fontSize:22, fontWeight:900, color, marginTop:6 }}>{val}</div>
                  <div style={{ fontSize:11, color:"#94A3B8", marginTop:2 }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{ backgroundColor:"#1E293B", borderRadius:14, padding:16 }}>
              <div style={{ fontSize:15, fontWeight:800, marginBottom:12 }}>Recent Orders</div>
              {loading ? <div style={{ color:"#94A3B8", textAlign:"center", padding:20 }}>Loading...</div> :

                orders.slice(0,5).map(order => (

        {/* ORDERS TAB */}
        {tab === "orders" && (

                      <div style={{ fontSize:13, color:"#94A3B8", marginTop:2 }}>{order.customer_name || "Customer"}</div>

                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:16, fontWeight:900, color:"#FF4D00" }}>₹{order.total}</div>
                      <div style={{ fontSize:10, color:"#64748B", marginTop:2 }}>{new Date(order.created_at).toLocaleDateString()}</div>
                    </div>
                  </div>
                  <div style={{ fontSize:12, color:"#94A3B8", marginTop:8, padding:"8px", backgroundColor:"#0F172A", borderRadius:8 }}>
                    {order.items}
                  </div>
                  <div style={{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" }}>
                    {["Pending","Preparing","On the Way","Delivered"].map(s => (
                      <button key={s} onClick={() => updateStatus(order.id, s)} style={{ padding:"5px 10px", borderRadius:8, border:"none", cursor:"pointer", fontSize:11, fontWeight:700, backgroundColor:order.status===s?statusColor(s):"#334155", color:order.status===s?"#fff":"#94A3B8" }}>{s}</button>
                    ))}
                  </div>
                </div>
              ))
            }
          </>
        )}

        {/* CUSTOMERS TAB */}
        {tab === "customers" && (
          <>
            <div style={{ fontSize:16, fontWeight:800, marginBottom:14 }}>Customers ({customers.length})</div>
            {loading ? <div style={{ color:"#94A3B8", textAlign:"center", padding:40 }}>Loading...</div> :
              customers.length === 0 ? (

                    <div style={{ fontSize:11, color:"#64748B" }}>₹{c.total_spent || 0}</div>

  );
}

// ===================== CHECKOUT FORM =====================
function CheckoutForm({ cartItems, allCartTotal, onOrderPlaced, onBack }) {
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [address, setAddress] = useState("");
  const [loading, setLoading] = useState(false);
  const tax = Math.round(allCartTotal * 0.05);
  const total = allCartTotal + 5 + tax;

  const placeOrder = async () => {
    if (!name || !phone || !address) { alert("Please fill all fields!"); return; }
    setLoading(true);
    try {
      const itemsStr = cartItems.map(i => `${i.name} x${i.qty}`).join(", ");
      const restaurantName = cartItems.length > 0 ? (Object.values(menuItems).find(items => items.find(m => m.id === cartItems[0].id)) ? restaurants.find(r => menuItems[r.id]?.find(m => m.id === cartItems[0].id))?.name : "Zaiqa") : "Zaiqa";

      // Save order to Supabase
      await supabase.from("orders").insert([{
        customer_name: name,
        customer_phone: phone,
        customer_address: address,
        items: itemsStr,
        total: total,
        restaurant_name: restaurantName || "Zaiqa Restaurant",
        status: "Pending",
      }]);

      // Save/update customer
      const { data: existing } = await supabase.from("customers").select("*").eq("phone", phone).single();
      if (existing) {
        await supabase.from("customers").update({ total_orders: (existing.total_orders||0)+1, total_spent: (existing.total_spent||0)+total }).eq("phone", phone);
      } else {
        await supabase.from("customers").insert([{ name, phone, address, total_orders: 1, total_spent: total }]);
      }

      onOrderPlaced();
    } catch(e) {
      alert("Order placed! (Database will sync shortly)");
      onOrderPlaced();
    }
    setLoading(false);
  };

  return (
    <div style={S.app}>
      <div style={{ ...S.topBar, display:"flex", alignItems:"center", gap:14 }}>
        <span style={{ fontSize:24, cursor:"pointer" }} onClick={onBack}>←</span>
        <div style={{ fontSize:20, fontWeight:800 }}>📋 Checkout</div>
      </div>
      <div style={{ padding:"16px 16px 30px", overflowY:"auto", maxHeight:"calc(100vh - 80px)" }}>
        <div style={{ ...S.card, padding:20, marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:800, marginBottom:14 }}>Delivery Details</div>
          {[["Your Name", name, setName, "text", "👤"], ["Phone Number", phone, setPhone, "tel", "📱"], ["Delivery Address", address, setAddress, "text", "📍"]].map(([label, val, setter, type, icon]) => (
            <div key={label} style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#888", marginBottom:6 }}>{icon} {label}</div>
              <input style={S.input} placeholder={label} value={val} onChange={e=>setter(e.target.value)} type={type}/>
            </div>
          ))}
        </div>

        <div style={{ ...S.card, padding:16, marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:800, marginBottom:12 }}>Order Summary</div>
          {cartItems.map(item => (
            <div key={item.id} style={{ display:"flex", justifyContent:"space-between", marginBottom:8, fontSize:13 }}>
              <span>{item.name} x{item.qty}</span>
              <span style={{ fontWeight:700 }}>₹{item.price * item.qty}</span>
            </div>
          ))}
          <div style={{ borderTop:"1.5px dashed #eee", paddingTop:10, marginTop:8 }}>
            {[["Item Total", `₹${allCartTotal}`],["Delivery", "FREE 🎉"],["Platform Fee","₹5"],["Taxes",`₹${tax}`]].map(([k,v]) => (
              <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:13, color:"#666" }}>
                <span>{k}</span><span>{v}</span>
              </div>
            ))}
            <div style={{ display:"flex", justifyContent:"space-between", fontWeight:800, fontSize:16, marginTop:8, paddingTop:8, borderTop:"1px solid #eee" }}>
              <span>Total</span><span style={{ color:"#FF4D00" }}>₹{total}</span>
            </div>
          </div>
        </div>

        <button style={{ ...S.btn(true), borderRadius:16, padding:16 }} onClick={placeOrder} disabled={loading}>
          {loading ? "Placing Order..." : `🛵 Place Order • ₹${total}`}
        </button>
      </div>
    </div>
  );
}

// ===================== MAIN APP =====================
function App() {
  const [screen, setScreen] = useState("home");
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [cart, setCart] = useState({});
  const [activeCategory, setActiveCategory] = useState("All");
  const [orderPlaced, setOrderPlaced] = useState(false);
  const [trackingStep, setTrackingStep] = useState(0);
  const [searchQuery, setSearchQuery] = useState("");
  const [isAdmin, setIsAdmin] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [showCheckout, setShowCheckout] = useState(false);
  const [myOrders, setMyOrders] = useState([]);

  const cartCount = Object.values(cart).reduce((a,b)=>a+b,0);
  const allCartTotal = Object.entries(cart).reduce((sum,[id,qty]) => {
    for (const items of Object.values(menuItems)) {
      const item = items.find(i => i.id === parseInt(id));
      if (item) return sum + item.price * qty;
    }
    return sum;
  }, 0);

  const cartItems = [];
  for (const items of Object.values(menuItems)) {
    for (const item of items) {
      if(cart[item.id]) cartItems.push({...item, qty:cart[item.id]});
    }
  }

  const addToCart = (itemId) => setCart(p => ({...p,[itemId]:(p[itemId]||0)+1}));
  const removeFromCart = (itemId) => setCart(p => {
    const u={...p};
    if(u[itemId]>1) u[itemId]--; else delete u[itemId];
    return u;
  });

  const filteredRestaurants = restaurants.filter(r => {
    const matchCat = activeCategory==="All" || r.category===activeCategory;
    const matchSearch = r.name.toLowerCase().includes(searchQuery.toLowerCase()) || r.cuisine.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });

  const handleOrderPlaced = () => {
    setCart({});
    setShowCheckout(false);
    setOrderPlaced(true);
    setTrackingStep(0);
    setScreen("tracking");
    let step=0;
    const interval=setInterval(()=>{ step++; setTrackingStep(step); if(step>=4) clearInterval(interval); },2500);
  };

  if (showAdminLogin && !isAdmin) return <AdminLogin onLogin={() => { setIsAdmin(true); setShowAdminLogin(false); }} />;
  if (isAdmin) return <AdminDashboard onLogout={() => setIsAdmin(false)} />;
  if (showCheckout) return <CheckoutForm cartItems={cartItems} allCartTotal={allCartTotal} onOrderPlaced={handleOrderPlaced} onBack={() => setShowCheckout(false)} />;

  // HOME
  if (screen==="home") return (
    <div style={S.app}>
      <div style={{...S.topBar, paddingBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:24,fontWeight:900,letterSpacing:1}}>🍽️ Zaiqa</div>
            <div style={{fontSize:11,opacity:0.85}}>📍 Coimbatore, Tamil Nadu ▾</div>
          </div>
          <div style={{fontSize:28,cursor:"pointer"}} onClick={()=>setScreen("profile")}>👤</div>
        </div>
        <div style={{marginTop:14,position:"relative"}}>
          <input style={{...S.input,paddingLeft:42}} placeholder="Search restaurants, dishes..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>🔍</span>
        </div>
      </div>

      <div style={{padding:"16px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 130px)"}}>
        <div style={{background:"linear-gradient(135deg,#FF4D00,#FF8C00)",borderRadius:20,padding:"20px",color:"#fff",marginBottom:24,position:"relative",overflow:"hidden"}}>
          <div style={{fontSize:20,fontWeight:900}}>🎉 50% OFF</div>
          <div style={{fontSize:13,opacity:0.9,marginTop:4}}>On your first 3 orders! Use code <strong>ZAIQA50</strong></div>
          <div style={{fontSize:50,position:"absolute",right:16,top:"50%",transform:"translateY(-50%)",opacity:0.25}}>🛵</div>
        </div>

        <div style={{marginBottom:24}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:14,color:"#1A1A1A"}}>What's on your mind?</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
            {dishTypes.map(d => (
              <div key={d.name} onClick={()=>setActiveCategory(d.name==="Noodles"?"Chinese":d.name)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
                <div style={{width:50,height:50,borderRadius:16,backgroundColor:d.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,border:`2px solid ${d.color}30`}}>{d.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color:"#444",textAlign:"center"}}>{d.name}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:20,scrollbarWidth:"none"}}>
          {categories.map(cat => (
            <div key={cat} onClick={()=>setActiveCategory(cat)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,fontSize:13,fontWeight:700,cursor:"pointer",backgroundColor:activeCategory===cat?"#FF4D00":"#fff",color:activeCategory===cat?"#fff":"#666",border:`1.5px solid ${activeCategory===cat?"#FF4D00":"#eee"}`}}>{cat}</div>
          ))}
        </div>

        <div style={{fontSize:16,fontWeight:800,marginBottom:14,color:"#1A1A1A"}}>{filteredRestaurants.length} Restaurants Near You</div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {filteredRestaurants.map(r => (
            <div key={r.id} style={S.card} onClick={()=>{setSelectedRestaurant(r);setScreen("menu");}}>
              <div style={{backgroundColor:"#FFF3E0",height:130,display:"flex",alignItems:"center",justifyContent:"center",fontSize:65,position:"relative"}}>
                {r.image}
                <div style={{position:"absolute",top:10,left:10,...S.badge()}}>{r.tag}</div>
              </div>
              <div style={{padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:16,fontWeight:800}}>{r.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:4,backgroundColor:"#22C55E",color:"#fff",padding:"3px 8px",borderRadius:8,fontSize:13,fontWeight:700}}>⭐ {r.rating}</div>
                </div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>{r.cuisine}</div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:"#666",borderTop:"1px solid #f3f3f3",paddingTop:10}}>
                  <span>🕐 {r.time}</span><span>💰 {r.price}</span><span>🛵 Free</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // DISHES
  if (screen==="dishes") return (
    <div style={S.app}>
      <div style={S.topBar}>
        <div style={{fontSize:20,fontWeight:800}}>🍽️ Explore Dishes</div>
      </div>
      <div style={{padding:"16px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 80px)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {dishTypes.map(d => (
            <div key={d.name} onClick={()=>{setActiveCategory(d.name==="Noodles"?"Chinese":d.name);setScreen("home");}} style={{...S.card,padding:20,display:"flex",flexDirection:"column",alignItems:"center",gap:10,backgroundColor:d.color+"15",border:`2px solid ${d.color}30`}}>
              <div style={{fontSize:46}}>{d.emoji}</div>
              <div style={{fontSize:15,fontWeight:800,color:"#1A1A1A"}}>{d.name}</div>
              <div style={{fontSize:11,color:"#888"}}>{Math.floor(Math.random()*8)+2} restaurants</div>
            </div>
          ))}
        </div>
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // MENU
  if (screen==="menu" && selectedRestaurant) {
    const items = menuItems[selectedRestaurant.id] || [];
    const menuCartTotal = items.reduce((sum,item)=>sum+(cart[item.id]||0)*item.price,0);
    return (
      <div style={S.app}>
        <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>{selectedRestaurant.name}</div>
            <div style={{fontSize:12,opacity:0.85}}>{selectedRestaurant.cuisine}</div>
          </div>
        </div>
        <div style={{backgroundColor:"#fff",padding:"12px 20px",borderBottom:"1px solid #f0f0f0",display:"flex",gap:20,fontSize:13}}>
          <span>⭐ {selectedRestaurant.rating}</span>
          <span>🕐 {selectedRestaurant.time}</span>
          <span>💰 {selectedRestaurant.price}</span>
        </div>
        <div style={{padding:"16px 16px 120px",overflowY:"auto",maxHeight:"calc(100vh - 140px)"}}>
          {items.map(item => (
            <div key={item.id} style={{...S.card,padding:16,marginBottom:14,display:"flex",gap:14}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{width:14,height:14,borderRadius:2,border:`2px solid ${item.veg?"#22C55E":"#FF4D00"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",backgroundColor:item.veg?"#22C55E":"#FF4D00"}}/>
                  </div>
                  {item.bestseller && <span style={S.tag("#FF8C00")}>🔥 Bestseller</span>}
                </div>
                <div style={{fontWeight:700,fontSize:15}}>{item.name}</div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>{item.desc}</div>
                <div style={{fontWeight:800,fontSize:16,marginTop:8}}>₹{item.price}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",gap:6}}>
                <div style={{fontSize:34}}>{selectedRestaurant.image}</div>
                {cart[item.id] ? (
                  <div style={{display:"flex",alignItems:"center",gap:10,backgroundColor:"#FF4D00",borderRadius:10,padding:"6px 12px"}}>
                    <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18}} onClick={()=>removeFromCart(item.id)}>−</span>
                    <span style={{color:"#fff",fontWeight:800}}>{cart[item.id]}</span>
                    <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18}} onClick={()=>addToCart(item.id)}>+</span>
                  </div>
                ) : (
                  <button style={S.btn()} onClick={()=>addToCart(item.id)}>ADD</button>
                )}
              </div>
            </div>
          ))}
        </div>
        {menuCartTotal>0 && (
          <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",width:"90%",maxWidth:390}}>
            <button style={{...S.btn(true),borderRadius:16,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setScreen("cart")}>
              <span>{cartCount} items</span><span>View Cart →</span><span>₹{menuCartTotal}</span>
            </button>
          </div>
        )}
      </div>
    );
  }

  // CART
  if (screen==="cart") {
    const tax = Math.round(allCartTotal*0.05);
    return (
      <div style={S.app}>
        <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
          <div style={{fontSize:20,fontWeight:800}}>🛒 Your Cart</div>
        </div>
        <div style={{padding:"16px 16px 100px",overflowY:"auto",maxHeight:"calc(100vh - 80px)"}}>
          {cartItems.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:80}}>🛒</div>
              <div style={{fontSize:20,fontWeight:800,marginTop:16}}>Your cart is empty</div>
              <button style={{...S.btn(),marginTop:24}} onClick={()=>setScreen("home")}>Browse Restaurants</button>
            </div>
          ) : (
            <>
              {cartItems.map(item => (
                <div key={item.id} style={{...S.card,padding:16,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{item.name}</div>
                    <div style={{fontSize:13,color:"#888",marginTop:2}}>₹{item.price} each</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,backgroundColor:"#FF4D00",borderRadius:10,padding:"6px 12px"}}>
                      <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18}} onClick={()=>removeFromCart(item.id)}>−</span>
                      <span style={{color:"#fff",fontWeight:800}}>{item.qty}</span>
                      <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18}} onClick={()=>addToCart(item.id)}>+</span>
                    </div>
                    <div style={{fontWeight:800,fontSize:15,minWidth:55,textAlign:"right"}}>₹{item.price*item.qty}</div>
                  </div>
                </div>
              ))}
              <div style={{...S.card,padding:16,marginTop:16}}>
                <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>Bill Summary</div>
                {[["Item Total",`₹${allCartTotal}`],["Delivery","FREE 🎉"],["Platform Fee","₹5"],["Taxes",`₹${tax}`]].map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:14,color:"#555"}}>
                    <span>{k}</span><span>{v}</span>
                  </div>
                ))}
                <div style={{borderTop:"1.5px dashed #eee",paddingTop:10,marginTop:8,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:16}}>
                  <span>Total</span><span style={{color:"#FF4D00"}}>₹{allCartTotal+5+tax}</span>
                </div>
              </div>
              <div style={{height:80}}/>
              <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",width:"90%",maxWidth:390}}>
                <button style={{...S.btn(true),borderRadius:16,padding:16}} onClick={()=>setShowCheckout(true)}>
                  Proceed to Checkout • ₹{allCartTotal+5+tax}
                </button>
              </div>
            </>
          )}
        </div>
        <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
      </div>
    );
  }

  // TRACKING
  if (screen==="tracking") {
    const steps=[
      {icon:"✅",label:"Order Placed",desc:"Your order has been received"},
      {icon:"👨‍🍳",label:"Preparing",desc:"Chef is cooking your food"},
      {icon:"🛵",label:"On the Way",desc:"Delivery partner is coming"},
      {icon:"🏠",label:"Delivered",desc:"Enjoy your meal!"},
    ];
    return (
      <div style={S.app}>
        <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
          <div style={{fontSize:20,fontWeight:800}}>📦 Track Order</div>
        </div>
        <div style={{padding:"20px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 80px)"}}>
          {orderPlaced ? (
            <>
              <div style={{...S.card,padding:20,marginBottom:20,textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:10}}>🛵</div>
                <div style={{fontSize:18,fontWeight:800}}>Order Confirmed! 🎉</div>
                <div style={{fontSize:14,color:"#888",marginTop:4}}>Est. delivery: 25-30 minutes</div>
                <div style={{marginTop:12,backgroundColor:"#FFF3E0",borderRadius:12,padding:"10px 16px",fontSize:13,color:"#FF8C00",fontWeight:700}}>
                  {trackingStep<4?"Live Tracking Active 🟢":"✅ Order Delivered!"}
                </div>
              </div>
              <div style={{...S.card,padding:20}}>
                {steps.map((step,i)=>(
                  <div key={i} style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:i<steps.length-1?20:0}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div style={{width:44,height:44,borderRadius:"50%",backgroundColor:i<=trackingStep?"#FF4D00":"#F3F4F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transition:"all 0.5s"}}>{step.icon}</div>
                      {i<steps.length-1 && <div style={{width:2,height:28,backgroundColor:i<trackingStep?"#FF4D00":"#eee",marginTop:4,transition:"all 0.5s"}}/>}
                    </div>
                    <div style={{paddingTop:10}}>
                      <div style={{fontWeight:800,fontSize:14,color:i<=trackingStep?"#1A1A1A":"#999"}}>{step.label}</div>
                      <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{step.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:60}}>📦</div>
              <div style={{fontSize:18,fontWeight:800,marginTop:16}}>No active orders</div>
              <div style={{fontSize:13,color:"#888",marginTop:8}}>Place an order to track it here</div>
              <button style={{...S.btn(),marginTop:24}} onClick={()=>setScreen("home")}>Order Now</button>
            </div>
          )}
        </div>
        <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
      </div>
    );
  }

  // PROFILE
  if (screen==="profile") return (
    <div style={S.app}>
      <div style={S.topBar}>
        <div style={{fontSize:20,fontWeight:800}}>👤 My Profile</div>
      </div>
      <div style={{padding:"20px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 80px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,...S.card,padding:20,marginBottom:20}}>
          <div style={{width:64,height:64,borderRadius:"50%",backgroundColor:"#FF4D0020",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,border:"3px solid #FF4D00"}}>✈️</div>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>Mohammed Faizan Z</div>
            <div style={{fontSize:13,color:"#888"}}>faizan@zaiqa.com</div>
            <div style={{fontSize:12,color:"#FF4D00",fontWeight:700,marginTop:4}}>⭐ Gold Member</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
          {[["12","Orders"],["4.8","Rating"],["₹2,400","Saved"]].map(([val,label])=>(
            <div key={label} style={{...S.card,padding:14,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:"#FF4D00"}}>{val}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>

        {/* ADMIN LOGIN BUTTON */}
        <div onClick={()=>setShowAdminLogin(true)} style={{...S.card,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,backgroundColor:"#FF4D00",cursor:"pointer"}}>
          <span style={{fontSize:22}}>🔐</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>Admin Dashboard</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:1}}>Manage orders & customers</div>
          </div>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:18}}>›</span>
        </div>

        {[["📍","Saved Addresses","Home, Office, College"],["❤️","Favourites","6 restaurants saved"],["💳","Payment Methods","UPI, Card added"],["🎁","Offers & Rewards","2 coupons available"],["🔔","Notifications","All enabled"],["🆘","Help & Support","24/7 available"],["⚙️","Settings","Account settings"]].map(([icon,title,sub])=>(
          <div key={title} style={{...S.card,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:22}}>{icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>{title}</div>
              <div style={{fontSize:12,color:"#aaa",marginTop:1}}>{sub}</div>
            </div>
            <span style={{color:"#ccc",fontSize:18}}>›</span>
          </div>
        ))}
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
