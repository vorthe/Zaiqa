// ── AUTH ──────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("welcome");
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [resetSent,setResetSent]=useState(false);

  const forgotPassword=async()=>{
    if(!form.email||!form.email.includes("@")){setErr("Enter your email first!");return;}
    setLoading(true);setErr("");
    try{
      await auth.sendPasswordResetEmail(form.email);
      setResetSent(true);
    }catch(e){setErr("Could not send reset email. Check the email address!");}
    setLoading(false);
  };

  const googleLogin=async()=>{
    setLoading(true);setErr("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      // Use redirect on mobile for better compatibility
      await auth.signInWithRedirect(provider);
    }catch(e){setErr("Google login failed. Try again!");setLoading(false);}
  };

  // Handle Google redirect result on load
  useEffect(()=>{
    auth.getRedirectResult().then(async(result)=>{
      if(result&&result.user){
        const u=result.user;
        let {data:ex}=await db.from("customers").select("*").eq("email",u.email).single().catch(()=>({data:null}));
        if(!ex){
          const {data:nu}=await db.from("customers").insert([{name:u.displayName||"Zaiqa User",email:u.email,phone:"",profile_emoji:"😊",total_orders:0,total_spent:0,saved_addresses:[]}]).select().single();
          ex=nu;
        }
        if(ex)onAuth(ex);
      }
    }).catch(()=>{});
    const saved=localStorage.getItem("zaiqaUser");
    if(saved){try{onAuth(JSON.parse(saved));}catch(e){}}
  },[]);

  const handleSubmit=async()=>{
    if(mode==="signup"&&!form.name.trim()){setErr("Enter your name!");return;}
    if(!form.email.includes("@")){setErr("Enter a valid email!");return;}
    if(form.password.length<6){setErr("Password must be at least 6 characters!");return;}
    setLoading(true);setErr("");
    try{
      let fbUser;
      if(mode==="signup"){
        const r=await auth.createUserWithEmailAndPassword(form.email,form.password);
        fbUser=r.user;
        await fbUser.updateProfile({displayName:form.name});
        const {data:nu}=await db.from("customers").insert([{name:form.name,email:form.email,phone:"",profile_emoji:"😊",total_orders:0,total_spent:0,saved_addresses:[]}]).select().single();
        onAuth(nu);
      } else {
        const r=await auth.signInWithEmailAndPassword(form.email,form.password);
        fbUser=r.user;
        let {data:ex}=await db.from("customers").select("*").eq("email",form.email).single().catch(()=>({data:null}));
        if(!ex){
          const {data:nu}=await db.from("customers").insert([{name:fbUser.displayName||"Zaiqa User",email:form.email,phone:"",profile_emoji:"😊",total_orders:0,total_spent:0,saved_addresses:[]}]).select().single();
          ex=nu;
        }
        onAuth(ex);
      }
    }catch(e){
      const code=e.code||"";
      if(code==="auth/email-already-in-use")setErr("Account already exists! Please login.");
      else if(code==="auth/wrong-password"||code==="auth/invalid-credential"||code==="auth/invalid-login-credentials")setErr("Wrong email or password. Try again!");
      else if(code==="auth/user-not-found")setErr("No account found. Please sign up!");
      else if(code==="auth/too-many-requests")setErr("Too many attempts. Wait a few minutes and try again!");
      else if(code==="auth/network-request-failed")setErr("No internet connection. Check your network!");
      else setErr("Error: "+(e.message||"Something went wrong. Try again!"));
    }
    setLoading(false);
  };

  if(resetSent) return(
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:30,minHeight:"100vh",textAlign:"center"}}>
      <div style={{fontSize:72}}>📧</div>
      <div style={{fontSize:22,fontWeight:900,marginTop:16}}>Reset Email Sent!</div>
      <div style={{fontSize:14,color:"#888",marginTop:10,lineHeight:1.7}}>We sent a password reset link to<br/><strong style={{color:"#FF4D00"}}>{form.email}</strong></div>
      <div style={{marginTop:20,backgroundColor:"#FFF3E0",borderRadius:14,padding:16,fontSize:13,color:"#FF8C00",fontWeight:600,lineHeight:1.5}}>Check your email and tap the reset link. Then come back and login with your new password.</div>
      <button style={{...S.btn(true),marginTop:24,borderRadius:14}} onClick={()=>{setResetSent(false);setMode("login");setErr("");}}>← Back to Login</button>
    </div>
  );

  if(mode==="welcome") return(
    <div style={{...S.app,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 30px",textAlign:"center"}}>
        <div style={{fontSize:90}}>🍽️</div>
        <div style={{fontSize:36,fontWeight:900,color:"#FF4D00",marginTop:12}}>Zaiqa</div>
        <div style={{fontSize:16,color:"#666",marginTop:8,lineHeight:1.6}}>Delicious food delivered fast</div>
        <div style={{display:"flex",gap:12,marginTop:16,fontSize:13,flexWrap:"wrap",justifyContent:"center"}}>
          <span style={{backgroundColor:"#22C55E20",color:"#22C55E",padding:"6px 14px",borderRadius:20,fontWeight:700}}>🥗 Veg</span>
          <span style={{backgroundColor:"#FF4D0020",color:"#FF4D00",padding:"6px 14px",borderRadius:20,fontWeight:700}}>🍖 Non-Veg</span>
          <span style={{backgroundColor:"#3B82F620",color:"#3B82F6",padding:"6px 14px",borderRadius:20,fontWeight:700}}>✅ Halal</span>
        </div>
      </div>
      <div style={{padding:"0 24px 44px"}}>
        <button style={{...S.btn(true),borderRadius:16,padding:16,fontSize:16,marginBottom:14}} onClick={()=>setMode("signup")}>🚀 Create Account</button>
        <button style={{...S.btnO(true),borderRadius:16,padding:16,fontSize:16}} onClick={()=>setMode("login")}>Login</button>
        <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#bbb"}}>By continuing you agree to our Terms & Privacy Policy</div>
      </div>
    </div>
  );

  return(
    <div style={{...S.app,padding:24,minHeight:"100vh"}}>
      <div style={{paddingTop:24,marginBottom:24}}>
        <span style={{fontSize:26,cursor:"pointer",color:"#FF4D00",fontWeight:800}} onClick={()=>{setMode("welcome");setErr("");}}>←</span>
      </div>
      <div style={{fontSize:28,fontWeight:900}}>{mode==="signup"?"Create Account 👋":"Welcome Back 👋"}</div>
      <div style={{fontSize:14,color:"#888",marginTop:6,marginBottom:28}}>{mode==="signup"?"Sign up to order amazing food":"Login to continue"}</div>

      {/* Google Login */}
      <button onClick={googleLogin} disabled={loading} style={{width:"100%",padding:15,borderRadius:14,border:"1.5px solid #eee",backgroundColor:"#fff",display:"flex",alignItems:"center",justifyContent:"center",gap:12,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:22,color:"#333"}}>
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
        <div style={{flex:1,height:1,backgroundColor:"#eee"}}/>
        <span style={{fontSize:13,color:"#bbb"}}>or use email</span>
        <div style={{flex:1,height:1,backgroundColor:"#eee"}}/>
      </div>

      {mode==="signup"&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:6,letterSpacing:0.5}}>YOUR NAME</div>
          <input style={S.inp} placeholder="Enter your full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        </div>
      )}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:6,letterSpacing:0.5}}>EMAIL ADDRESS</div>
        <input style={S.inp} placeholder="Enter your email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} type="email"/>
      </div>
      <div style={{marginBottom:22,position:"relative"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:6,letterSpacing:0.5}}>PASSWORD</div>
        <input style={{...S.inp,paddingRight:50}} placeholder={mode==="signup"?"Create a password (min 6 chars)":"Enter your password"} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} type={showPass?"text":"password"}/>
        <span onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:14,bottom:14,cursor:"pointer",fontSize:18}}>{showPass?"🙈":"👁️"}</span>
      </div>

      {mode==="login"&&(
        <div style={{textAlign:"right",marginTop:-14,marginBottom:18}}>
          <span onClick={forgotPassword} style={{fontSize:13,color:"#FF4D00",fontWeight:700,cursor:"pointer"}}>Forgot Password?</span>
        </div>
      )}

      {err&&<div style={{backgroundColor:"#FF4D0012",color:"#FF4D00",borderRadius:10,padding:"11px 14px",fontSize:13,fontWeight:700,marginBottom:18}}>{err}</div>}

      <button style={{...S.btn(true),borderRadius:14,padding:15,fontSize:15}} onClick={handleSubmit} disabled={loading}>
        {loading?"Please wait...":(mode==="signup"?"🚀 Create Account":"🔑 Login")}
      </button>

      <div style={{textAlign:"center",marginTop:22,fontSize:14,color:"#888"}}>
        {mode==="signup"?"Already have an account? ":"New to Zaiqa? "}
        <span style={{color:"#FF4D00",fontWeight:800,cursor:"pointer"}} onClick={()=>{setMode(mode==="signup"?"login":"signup");setErr("");}}>
          {mode==="signup"?"Login":"Sign Up"}
        </span>
      </div>
    </div>
  );
}

// ── CHECKOUT ──────────────────────────────────────────────────
function Checkout({cartItems,subtotal,tax,total,user,onPlaced,onBack}){
  const [payMethod,setPayMethod]=useState("cod");
  const [address,setAddress]=useState("");
  const [selSaved,setSelSaved]=useState(null);
  const [coupon,setCoupon]=useState("");
  const [discount,setDiscount]=useState(0);
  const [couponMsg,setCouponMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const saved=user?.saved_addresses||[];
  const finalTotal=Math.max(total-discount,0);

  const applyCoupon=()=>{
    const c=COUPONS[coupon.toUpperCase()];
    if(!c){setCouponMsg("❌ Invalid coupon code");setDiscount(0);return;}
    const d=c.flat||Math.min(Math.round(total*(c.pct/100)),c.max||9999);
    setDiscount(d);setCouponMsg(`✅ Coupon applied! You save ₹${d}`);
  };

  const placeOrder=async(payId="COD")=>{
    const addr=selSaved||address;
    if(!addr.trim()){alert("Please enter a delivery address!");return;}
    setLoading(true);
    try{
      const itemsStr=cartItems.map(i=>`${i.name} x${i.qty}`).join(", ");
      await db.from("orders").insert([{
        customer_name:user.name,customer_phone:user.phone||"",customer_address:addr,
        items:itemsStr,total:finalTotal,restaurant_name:cartItems[0]?.restName||"Zaiqa",
        status:"Pending",customer_id:user.id,payment_method:payId==="COD"?"COD":"Online",
        payment_id:payId,coupon_used:coupon||null,discount_amount:discount
      }]);
      await db.from("customers").update({total_orders:(user.total_orders||0)+1,total_spent:(user.total_spent||0)+finalTotal}).eq("id",user.id);
      if(address&&!saved.includes(address)){
        await db.from("customers").update({saved_addresses:[...saved,address].slice(-5)}).eq("id",user.id);
      }
      onPlaced();
    }catch(e){alert("Failed to place order. Please try again!");}
    setLoading(false);
  };

  const payOnline=()=>{
    const rzp=new window.Razorpay({
      key:RZP_KEY,amount:finalTotal*100,currency:"INR",name:"Zaiqa",description:"Food Order",
      handler:(r)=>placeOrder(r.razorpay_payment_id),
      prefill:{name:user.name,email:user.email||"",contact:user.phone||""},
      theme:{color:"#FF4D00"},modal:{ondismiss:()=>setLoading(false)}
    });
    rzp.open();
  };

  return(
    <div style={S.app}>
      <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontSize:26,cursor:"pointer"}} onClick={onBack}>←</span>
        <div style={{fontSize:20,fontWeight:800}}>📋 Checkout</div>
      </div>
      <div style={{padding:"16px 16px 30px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>

        {/* Delivery */}
        <div style={{...S.card,padding:18,marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>📍 Delivery Address</div>
          {saved.length>0&&(
            <>
              <div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:8}}>SAVED ADDRESSES</div>
              {saved.map((a,i)=>(
                <div key={i} onClick={()=>{setSelSaved(a);setAddress("");}} style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${selSaved===a?"#FF4D00":"#eee"}`,marginBottom:8,cursor:"pointer",fontSize:13,backgroundColor:selSaved===a?"#FFF3E0":"#fff",display:"flex",gap:8,alignItems:"center"}}>
                  <span>📍</span><span style={{flex:1}}>{a}</span>
                  {selSaved===a&&<span style={{color:"#FF4D00",fontWeight:800}}>✓</span>}
                </div>
              ))}
              <div style={{fontSize:11,fontWeight:700,color:"#FF4D00",marginBottom:8,marginTop:8}}>OR ENTER NEW ADDRESS</div>
            </>
          )}
          <input style={S.inp} placeholder="Enter complete delivery address" value={address} onChange={e=>{setAddress(e.target.value);setSelSaved(null);}}/>
        </div>

        {/* Order Summary */}
        <div style={{...S.card,padding:16,marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>🛒 Order Summary</div>
          {cartItems.map(item=>(
            <div key={item.id} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
              <span style={{color:"#555"}}>{item.name} × {item.qty}</span>
              <span style={{fontWeight:700}}>₹{item.price*item.qty}</span>
            </div>
          ))}
          <div style={{borderTop:"1px dashed #eee",paddingTop:10,marginTop:4}}>
            {[["Item Total","₹"+subtotal],["Delivery","FREE 🎉"],["Platform Fee","₹5"],["Tax (5%)","₹"+tax]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13,color:"#777"}}><span>{k}</span><span>{v}</span></div>
            ))}
            {discount>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#22C55E",fontWeight:700,marginBottom:6}}><span>🎁 Coupon Discount</span><span>-₹{discount}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:17,borderTop:"1.5px solid #eee",paddingTop:10,marginTop:4}}>
              <span>Total</span><span style={{color:"#FF4D00"}}>₹{finalTotal}</span>
            </div>
          </div>
        </div>

        {/* Coupon */}
        <div style={{...S.card,padding:16,marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>🎁 Promo Code</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...S.inp,flex:1}} placeholder="Enter coupon code" value={coupon} onChange={e=>setCoupon(e.target.value.toUpperCase())}/>
            <button style={{...S.btn(false),borderRadius:10,padding:"0 18px",fontSize:14}} onClick={applyCoupon}>Apply</button>
          </div>
          {couponMsg&&<div style={{fontSize:13,fontWeight:700,marginTop:8,color:couponMsg.startsWith("✅")?"#22C55E":"#FF4D00"}}>{couponMsg}</div>}
          <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.keys(COUPONS).map(c=>(
              <div key={c} onClick={()=>setCoupon(c)} style={{padding:"5px 12px",borderRadius:20,backgroundColor:"#FF4D0012",color:"#FF4D00",fontSize:12,fontWeight:700,cursor:"pointer"}}>{c}</div>
            ))}
          </div>
        </div>

        {/* Payment */}
        <div style={{...S.card,padding:16,marginBottom:20}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>💳 Payment Method</div>
          {[["cod","💵 Cash on Delivery","Pay when food arrives"],["online","📱 Pay Online","UPI, Card, Net Banking via Razorpay"]].map(([val,label,sub])=>(
            <div key={val} onClick={()=>setPayMethod(val)} style={{padding:"12px 14px",borderRadius:12,border:`2px solid ${payMethod===val?"#FF4D00":"#eee"}`,marginBottom:10,cursor:"pointer",backgroundColor:payMethod===val?"#FFF8F5":"#fff",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:20,height:20,borderRadius:"50%",border:`2.5px solid ${payMethod===val?"#FF4D00":"#ddd"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {payMethod===val&&<div style={{width:10,height:10,borderRadius:"50%",backgroundColor:"#FF4D00"}}/>}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{label}</div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>{sub}</div>
              </div>
            </div>
          ))}
        </div>

        <button style={{...S.btn(true),borderRadius:16,padding:16,fontSize:16}} onClick={payMethod==="cod"?()=>placeOrder("COD"):payOnline} disabled={loading}>
          {loading?"Processing...":(payMethod==="cod"?`🛵 Place Order • ₹${finalTotal}`:`💳 Pay ₹${finalTotal} Online`)}
        </button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [screen,setScreen]=useState("home");
  const [restaurants,setRestaurants]=useState([]);
  const [menuItems,setMenuItems]=useState({});
  const [selectedRest,setSelectedRest]=useState(null);
  const [cart,setCart]=useState({});
  const [cartMeta,setCartMeta]=useState({});
  const [activeCategory,setActiveCategory]=useState("All");
  const [vegFilter,setVegFilter]=useState("all");
  const [searchQuery,setSearchQuery]=useState("");
  const [orderPlaced,setOrderPlaced]=useState(false);
  const [trackingStep,setTrackingStep]=useState(0);
  const [showCheckout,setShowCheckout]=useState(false);
  const [myOrders,setMyOrders]=useState([]);
  const [loading,setLoading]=useState(true);

  const dishTypes=[
    {name:"Biryani",emoji:"🍛",color:"#FF6B35"},{name:"Pizza",emoji:"🍕",color:"#E74C3C"},
    {name:"Burgers",emoji:"🍔",color:"#F39C12"},{name:"Chinese",emoji:"🍜",color:"#9B59B6"},
    {name:"Kebabs",emoji:"🍢",color:"#27AE60"},{name:"Sushi",emoji:"🍱",color:"#1ABC9C"},
    {name:"Desserts",emoji:"🍰",color:"#E91E63"},{name:"South Indian",emoji:"🥞",color:"#3498DB"},
    {name:"Mexican",emoji:"🌮",color:"#FF9800"},{name:"Drinks",emoji:"🥤",color:"#FF5722"},
  ];

  useEffect(()=>{
    const saved=localStorage.getItem("zaiqaUser");
    if(saved){
      try{
        const u=JSON.parse(saved);
        setUser(u);
        setAuthLoading(false);
        fetchRestaurants();
        // Refresh profile from Supabase in background
        if(u.id){
          db.from("customers").select("*").eq("id",u.id).single().then(({data})=>{
            if(data){setUser(data);localStorage.setItem("zaiqaUser",JSON.stringify(data));}
          }).catch(()=>{});
        }
        return;
      }catch(e){}
    }
    setAuthLoading(false);
  },[]);

  useEffect(()=>{if(user)fetchRestaurants();},[user]);

  const fetchRestaurants=async()=>{
    setLoading(true);
    const {data}=await db.from("restaurants").select("*").eq("active",true).order("created_at",{ascending:false});
    if(data)setRestaurants(data);
    setLoading(false);
  };

  const fetchMenu=async(restId)=>{
    if(menuItems[restId])return;
    const {data}=await db.from("menu_items").select("*").eq("restaurant_id",restId);
    if(data)setMenuItems(p=>({...p,[restId]:data}));
  };

  const fetchMyOrders=async()=>{
    if(!user)return;
    const {data}=await db.from("orders").select("*").eq("customer_id",user.id).order("created_at",{ascending:false});
    if(data)setMyOrders(data);
  };

  useEffect(()=>{if(user&&screen==="myorders")fetchMyOrders();},[user,screen]);

  const handleAuth=async(u)=>{
    // Always fetch fresh data from Supabase by id or email
    try{
      let fresh=null;
      if(u.id){
        const {data}=await db.from("customers").select("*").eq("id",u.id).single();
        fresh=data;
      }
      if(!fresh&&u.email){
        const {data}=await db.from("customers").select("*").eq("email",u.email).single();
        fresh=data;
      }
      const finalUser=fresh||u;
      setUser(finalUser);
      localStorage.setItem("zaiqaUser",JSON.stringify(finalUser));
      fetchRestaurants();
    }catch(e){
      setUser(u);
      localStorage.setItem("zaiqaUser",JSON.stringify(u));
      fetchRestaurants();
    }
  };
  const handleLogout=()=>{auth.signOut();localStorage.removeItem("zaiqaUser");setUser(null);};

  const cartCount=Object.values(cart).reduce((a,b)=>a+b,0);
  const cartItems=Object.entries(cart).map(([id,qty])=>({...cartMeta[id],qty})).filter(Boolean);
  const subtotal=cartItems.reduce((s,i)=>s+i.price*i.qty,0);
  const tax=Math.round(subtotal*0.05);
  const total=subtotal+5+tax;
  const addToCart=(item,restName)=>{setCart(p=>({...p,[item.id]:(p[item.id]||0)+1}));setCartMeta(p=>({...p,[item.id]:{...item,restName}}));};
  const removeFromCart=id=>setCart(p=>{const u={...p};if(u[id]>1)u[id]--;else delete u[id];return u;});

  const filtered=restaurants.filter(r=>{
    const matchCat=activeCategory==="All"||r.category===activeCategory;
    const matchSearch=!searchQuery||r.name?.toLowerCase().includes(searchQuery.toLowerCase())||r.cuisine?.toLowerCase().includes(searchQuery.toLowerCase());
    const matchVeg=vegFilter==="all"||(vegFilter==="veg"&&r.has_veg)||(vegFilter==="nonveg"&&r.has_nonveg)||(vegFilter==="halal"&&r.is_halal);
    return matchCat&&matchSearch&&matchVeg;
  });

  const handleOrderPlaced=()=>{
    setCart({});setCartMeta({});setShowCheckout(false);setOrderPlaced(true);setTrackingStep(0);setScreen("tracking");
    let s=0;const iv=setInterval(()=>{s++;setTrackingStep(s);if(s>=4)clearInterval(iv);},3000);
  };

  const sc=s=>s==="Delivered"?"#22C55E":s==="Preparing"?"#F59E0B":s==="On the Way"?"#3B82F6":"#FF4D00";

  if(authLoading)return(
    <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:72}}>🍽️</div>
        <div style={{fontSize:22,fontWeight:900,color:"#FF4D00",marginTop:12}}>Zaiqa</div>
        <div className="spin" style={{width:32,height:32,border:"3px solid #FF4D0020",borderTop:"3px solid #FF4D00",borderRadius:"50%",margin:"20px auto 0"}}/>
      </div>
    </div>
  );

  if(!user)return <AuthScreen onAuth={handleAuth}/>;
  if(showCheckout)return <Checkout cartItems={cartItems} subtotal={subtotal} tax={tax} total={total} user={user} onPlaced={handleOrderPlaced} onBack={()=>setShowCheckout(false)}/>;

  // HOME
  if(screen==="home")return(
    <div style={S.app}>
      <div style={{...S.topBar,paddingBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:22,fontWeight:900}}>🍽️ Zaiqa</div>
            <div style={{fontSize:12,opacity:0.9}}>👋 Hey, {user.name?.split(" ")[0] || "there"}!</div>
          </div>
          <div onClick={()=>setScreen("profile")} style={{width:42,height:42,borderRadius:"50%",backgroundColor:"rgba(255,255,255,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,cursor:"pointer"}}>
            {user.profile_emoji||"😊"}
          </div>
        </div>
        <div style={{position:"relative"}}>
          <input style={{...S.inp,paddingLeft:46,borderRadius:14}} placeholder="Search restaurants, cuisines..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>🔍</span>
          {searchQuery&&<span onClick={()=>setSearchQuery("")} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:18,cursor:"pointer",color:"#999"}}>×</span>}
        </div>
      </div>

      <div style={{padding:"16px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 140px)"}}>
        {/* Banner */}
        <div style={{background:"linear-gradient(135deg,#FF4D00,#FF8C00)",borderRadius:20,padding:20,color:"#fff",marginBottom:20,position:"relative",overflow:"hidden",cursor:"pointer"}}>
          <div style={{fontSize:20,fontWeight:900}}>🎉 50% OFF First Order!</div>
          <div style={{fontSize:13,opacity:0.9,marginTop:4}}>Use code <strong>ZAIQA50</strong> at checkout</div>
          <div style={{position:"absolute",right:-10,top:"50%",transform:"translateY(-50%)",fontSize:70,opacity:0.15}}>🛵</div>
        </div>

        {/* Veg / Halal Filter */}
        <div style={{display:"flex",gap:8,marginBottom:18,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
          {[["all","🍽️ All"],["veg","🥗 Veg Only"],["nonveg","🍖 Non-Veg"],["halal","✅ Halal Certified"]].map(([val,label])=>(
            <div key={val} onClick={()=>setVegFilter(val)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,fontSize:13,fontWeight:700,cursor:"pointer",backgroundColor:vegFilter===val?"#FF4D00":"#fff",color:vegFilter===val?"#fff":"#666",border:`1.5px solid ${vegFilter===val?"#FF4D00":"#eee"}`,whiteSpace:"nowrap"}}>{label}</div>
          ))}
        </div>

        {/* Category Grid */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:17,fontWeight:800,marginBottom:12,color:"#1A1A1A"}}>What's on your mind?</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
            {dishTypes.map(d=>(
              <div key={d.name} onClick={()=>setActiveCategory(d.name===activeCategory?"All":d.name)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}}>
                <div style={{width:52,height:52,borderRadius:16,backgroundColor:activeCategory===d.name?d.color:d.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,border:`2px solid ${activeCategory===d.name?d.color:d.color+"30"}`,transition:"all 0.2s"}}>{d.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color:activeCategory===d.name?d.color:"#555",textAlign:"center"}}>{d.name}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Category Pills */}
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:20,scrollbarWidth:"none"}}>
          {CATEGORIES.map(cat=>(
            <div key={cat} onClick={()=>setActiveCategory(cat)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,fontSize:13,fontWeight:700,cursor:"pointer",backgroundColor:activeCategory===cat?"#FF4D00":"#fff",color:activeCategory===cat?"#fff":"#666",border:`1.5px solid ${activeCategory===cat?"#FF4D00":"#eee"}`}}>{cat}</div>
          ))}
        </div>

        {/* Restaurant List */}
        {loading?<Loader/>:filtered.length===0?(
          <div style={{textAlign:"center",padding:"50px 20px"}}>
            <div style={{fontSize:60}}>🏪</div>
            <div style={{fontSize:16,fontWeight:800,marginTop:16,color:"#333"}}>No restaurants found</div>
            <div style={{fontSize:13,color:"#888",marginTop:8}}>Try a different category or search</div>
          </div>
        ):(
          <>
            <div style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#1A1A1A"}}>{filtered.length} Restaurant{filtered.length!==1?"s":""} Near You</div>
            {filtered.map(r=>(
              <div key={r.id} style={{...S.card,cursor:"pointer",marginBottom:16}} onClick={()=>{setSelectedRest(r);fetchMenu(r.id);setScreen("menu");}}>
                <div style={{backgroundColor:"#FFF3E0",height:130,display:"flex",alignItems:"center",justifyContent:"center",fontSize:72,position:"relative"}}>
                  {r.image}
                  <div style={{position:"absolute",top:10,left:10,backgroundColor:"#FF4D00",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>{r.tag}</div>
                  <div style={{position:"absolute",top:10,right:10,display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                    {r.has_veg&&<span style={{backgroundColor:"#22C55E",color:"#fff",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:20}}>🥗 Veg</span>}
                    {r.has_nonveg&&<span style={{backgroundColor:"#FF4D00",color:"#fff",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:20}}>🍖 Non-Veg</span>}
                    {r.is_halal&&<span style={{backgroundColor:"#3B82F6",color:"#fff",fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:20}}>✅ Halal</span>}
                  </div>
                </div>
                <div style={{padding:"12px 14px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:16,fontWeight:800}}>{r.name}</div>
                    <div style={{backgroundColor:"#22C55E",color:"#fff",padding:"3px 8px",borderRadius:8,fontSize:13,fontWeight:700}}>⭐ {r.rating}</div>
                  </div>
                  <div style={{fontSize:12,color:"#888",marginTop:3}}>{r.cuisine}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:12,color:"#666",borderTop:"1px solid #f3f3f3",paddingTop:10}}>
                    <span>🕐 {r.delivery_time}</span><span>💰 {r.price_range}</span><span>🛵 Free delivery</span>
                  </div>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // DISHES
  if(screen==="dishes")return(
    <div style={S.app}>
      <div style={S.topBar}><div style={{fontSize:20,fontWeight:800}}>🍽️ Explore by Category</div></div>
      <div style={{padding:"16px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {dishTypes.map(d=>(
            <div key={d.name} onClick={()=>{setActiveCategory(d.name);setScreen("home");}} style={{...S.card,padding:20,display:"flex",flexDirection:"column",alignItems:"center",gap:10,backgroundColor:d.color+"12",border:`2px solid ${d.color}25`,cursor:"pointer"}}>
              <div style={{fontSize:48}}>{d.emoji}</div>
              <div style={{fontSize:15,fontWeight:800,color:"#1A1A1A"}}>{d.name}</div>
            </div>
          ))}
        </div>
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // MENU
  if(screen==="menu"&&selectedRest){
    const items=menuItems[selectedRest.id]||[];
    const vegItems=items.filter(i=>i.veg);
    const nonVegItems=items.filter(i=>!i.veg);
    const restCartTotal=items.reduce((s,i)=>s+(cart[i.id]||0)*i.price,0);
    return(
      <div style={S.app}>
        <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:26,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800}}>{selectedRest.name}</div>
            <div style={{fontSize:12,opacity:0.85}}>{selectedRest.cuisine}</div>
          </div>
        </div>
        <div style={{backgroundColor:"#fff",padding:"10px 16px",borderBottom:"1px solid #f0f0f0",display:"flex",gap:14,fontSize:12,flexWrap:"wrap",alignItems:"center"}}>
          <span>⭐ {selectedRest.rating}</span>
          <span>🕐 {selectedRest.delivery_time}</span>
          <span>💰 {selectedRest.price_range}</span>
          {selectedRest.is_halal&&<span style={{color:"#3B82F6",fontWeight:700,backgroundColor:"#3B82F610",padding:"2px 10px",borderRadius:20}}>✅ Halal Certified</span>}
        </div>
        <div style={{padding:"12px 16px 120px",overflowY:"auto",maxHeight:"calc(100vh - 150px)"}}>
          {items.length===0?(
            <div style={{textAlign:"center",padding:60}}>
              <div style={{fontSize:60}}>🍽️</div>
              <div style={{fontSize:16,fontWeight:800,marginTop:16}}>Menu coming soon!</div>
            </div>
          ):(
            <>
              {vegItems.length>0&&(
                <>
                  <div style={{fontSize:13,fontWeight:800,color:"#22C55E",marginBottom:10,marginTop:4,display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:"50%",backgroundColor:"#22C55E"}}/>VEG
                  </div>
                  {vegItems.map(item=>renderMenuItem(item,selectedRest,cart,addToCart,removeFromCart))}
                </>
              )}
              {nonVegItems.length>0&&(
                <>
                  <div style={{fontSize:13,fontWeight:800,color:"#FF4D00",marginBottom:10,marginTop:16,display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:"50%",backgroundColor:"#FF4D00"}}/>
                    NON-VEG {selectedRest.is_halal&&<span style={{fontSize:11,color:"#3B82F6",fontWeight:700}}>• ✅ Halal Meat</span>}
                  </div>
                  {nonVegItems.map(item=>renderMenuItem(item,selectedRest,cart,addToCart,removeFromCart))}
                </>
              )}
            </>
          )}
        </div>
        {restCartTotal>0&&(
          <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",width:"90%",maxWidth:390}}>
            <button style={{...S.btn(true),borderRadius:16,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setScreen("cart")}>
              <span style={{backgroundColor:"rgba(255,255,255,0.25)",borderRadius:8,padding:"2px 8px"}}>{cartCount}</span>
              <span>View Cart</span>
              <span>₹{restCartTotal} →</span>
            </button>
          </div>
        )}
      </div>
    );
  }

  // CART
  if(screen==="cart")return(
    <div style={S.app}>
      <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontSize:26,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
        <div style={{fontSize:20,fontWeight:800}}>🛒 Your Cart</div>
      </div>
      <div style={{padding:"16px 16px 100px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>
        {cartItems.length===0?(
          <div style={{textAlign:"center",padding:"70px 20px"}}>
            <div style={{fontSize:80}}>🛒</div>
            <div style={{fontSize:20,fontWeight:800,marginTop:16}}>Your cart is empty</div>
            <div style={{fontSize:14,color:"#888",marginTop:8}}>Add items from a restaurant</div>
            <button style={{...S.btn(false),marginTop:24,borderRadius:14}} onClick={()=>setScreen("home")}>Browse Restaurants</button>
          </div>
        ):(
          <>
            {cartItems.map(item=>(
              <div key={item.id} style={{...S.card,padding:16,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{item.name}</div>
                  <div style={{fontSize:12,color:"#888",marginTop:2}}>₹{item.price} × {item.qty} = <strong style={{color:"#FF4D00"}}>₹{item.price*item.qty}</strong></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,backgroundColor:"#FF4D00",borderRadius:10,padding:"6px 12px",flexShrink:0}}>
                  <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18,lineHeight:1}} onClick={()=>removeFromCart(item.id)}>−</span>
                  <span style={{color:"#fff",fontWeight:800,minWidth:16,textAlign:"center"}}>{item.qty}</span>
                  <span style={{color:"#fff",fontWeight:800,cursor:"pointer",fontSize:18,lineHeight:1}} onClick={()=>addToCart(item,item.restName)}>+</span>
                </div>
              </div>
            ))}
            <div style={{...S.card,padding:16,marginTop:4}}>
              <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>Bill Summary</div>
              {[["Item Total","₹"+subtotal],["Delivery","FREE 🎉"],["Platform Fee","₹5"],["Tax (5%)","₹"+tax]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13,color:"#666"}}><span>{k}</span><span>{v}</span></div>
              ))}
              <div style={{borderTop:"1.5px dashed #eee",paddingTop:10,marginTop:4,display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:17}}>
                <span>Total</span><span style={{color:"#FF4D00"}}>₹{total}</span>
              </div>
            </div>
            <div style={{height:80}}/>
            <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",width:"90%",maxWidth:390}}>
              <button style={{...S.btn(true),borderRadius:16,padding:16,fontSize:16}} onClick={()=>setShowCheckout(true)}>
                Proceed to Checkout • ₹{total}
              </button>
            </div>
          </>
        )}
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // TRACKING
  if(screen==="tracking"){
    const steps=[{icon:"✅",label:"Order Placed",desc:"We received your order!"},{icon:"👨‍🍳",label:"Preparing",desc:"Chef is cooking"},{icon:"🛵",label:"On the Way",desc:"Rider heading to you"},{icon:"🏠",label:"Delivered",desc:"Enjoy your meal!"}];
    return(
      <div style={S.app}>
        <div style={{...S.topBar,display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:26,cursor:"pointer"}} onClick={()=>setScreen("home")}>←</span>
          <div style={{fontSize:20,fontWeight:800}}>📦 Track Order</div>
        </div>
        <div style={{padding:"20px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>
          {orderPlaced?(
            <>
              <div style={{...S.card,padding:22,marginBottom:20,textAlign:"center"}}>
                <div style={{fontSize:56}}>🛵</div>
                <div style={{fontSize:20,fontWeight:900,marginTop:12}}>Order Confirmed! 🎉</div>
                <div style={{fontSize:14,color:"#888",marginTop:6}}>Estimated delivery: 25–35 minutes</div>
                <div style={{marginTop:14,backgroundColor:"#FFF3E0",borderRadius:12,padding:"10px 18px",fontSize:13,color:"#FF8C00",fontWeight:700}}>
                  {trackingStep<4?"🟢 Live Tracking Active":"✅ Order Delivered — Enjoy!"}
                </div>
              </div>
              <div style={{...S.card,padding:22}}>
                {steps.map((step,i)=>(
                  <div key={i} style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:i<steps.length-1?22:0}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div style={{width:48,height:48,borderRadius:"50%",backgroundColor:i<=trackingStep?"#FF4D00":"#F3F4F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,transition:"all 0.5s"}}>{step.icon}</div>
                      {i<steps.length-1&&<div style={{width:2,height:30,backgroundColor:i<trackingStep?"#FF4D00":"#eee",marginTop:4,transition:"all 0.5s"}}/>}
                    </div>
                    <div style={{paddingTop:12}}>
                      <div style={{fontWeight:800,fontSize:14,color:i<=trackingStep?"#1A1A1A":"#aaa"}}>{step.label}</div>
                      <div style={{fontSize:12,color:"#bbb",marginTop:2}}>{step.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          ):(
            <div style={{textAlign:"center",padding:"70px 20px"}}>
              <div style={{fontSize:64}}>📦</div>
              <div style={{fontSize:18,fontWeight:800,marginTop:16}}>No active orders</div>
              <button style={{...S.btn(false),marginTop:24,borderRadius:14}} onClick={()=>setScreen("home")}>Order Now 🛵</button>
            </div>
          )}
        </div>
        <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
      </div>
    );
  }

  // MY ORDERS
  if(screen==="myorders")return(
    <div style={S.app}>
      <div style={S.topBar}><div style={{fontSize:20,fontWeight:800}}>📦 My Orders</div></div>
      <div style={{padding:"16px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>
        {myOrders.length===0?(
          <div style={{textAlign:"center",padding:"70px 20px"}}>
            <div style={{fontSize:64}}>📦</div>
            <div style={{fontSize:18,fontWeight:800,marginTop:16}}>No orders yet!</div>
            <div style={{fontSize:13,color:"#888",marginTop:8}}>Your order history will appear here</div>
            <button style={{...S.btn(false),marginTop:24,borderRadius:14}} onClick={()=>setScreen("home")}>Order Now 🛵</button>
          </div>
        ):myOrders.map(o=>(
          <div key={o.id} style={{...S.card,padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontWeight:800,fontSize:15}}>{o.restaurant_name}</div>
              <span style={{fontSize:11,backgroundColor:sc(o.status)+"20",color:sc(o.status),padding:"4px 12px",borderRadius:20,fontWeight:700}}>{o.status}</span>
            </div>
            <div style={{fontSize:12,color:"#888",marginBottom:10,lineHeight:1.4}}>{o.items}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,borderTop:"1px solid #f3f3f3",paddingTop:10}}>
              <div>
                <div style={{color:"#888"}}>{new Date(o.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>
                <div style={{fontSize:11,color:"#bbb",marginTop:2}}>{o.payment_method||"COD"}</div>
              </div>
              <div style={{fontWeight:900,fontSize:16,color:"#FF4D00"}}>₹{o.total}</div>
            </div>
          </div>
        ))}
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );

  // PROFILE
  if(screen==="profile"){
    return <ProfileScreen user={user} handleAuth={handleAuth} handleLogout={handleLogout} setScreen={setScreen} cartCount={cartCount} screen={screen}/>;
  }

  return null;
}

// ── PROFILE COMPONENT (separate to fix hooks-in-conditional bug) ──
function ProfileScreen({user,handleAuth,handleLogout,setScreen,cartCount,screen}){
  const [editMode,setEditMode]=useState(false);
  const [editForm,setEditForm]=useState({name:user?.name||"",phone:user?.phone||""});
  const [newAddress,setNewAddress]=useState("");
  const [showEmoji,setShowEmoji]=useState(false);
  const saved=user?.saved_addresses||[];

  if(!user) return null;

  const saveProfile=async()=>{
    await db.from("customers").update({name:editForm.name,phone:editForm.phone}).eq("id",user.id);
    handleAuth({...user,...editForm});setEditMode(false);
  };
  const pickEmoji=async(e)=>{
    await db.from("customers").update({profile_emoji:e}).eq("id",user.id);
    handleAuth({...user,profile_emoji:e});setShowEmoji(false);
  };
  const addAddress=async()=>{
    if(!newAddress.trim())return;
    const updated=[...saved,newAddress.trim()].slice(-5);
    await db.from("customers").update({saved_addresses:updated}).eq("id",user.id);
    handleAuth({...user,saved_addresses:updated});setNewAddress("");
  };
  const removeAddress=async(idx)=>{
    const updated=saved.filter((_,i)=>i!==idx);
    await db.from("customers").update({saved_addresses:updated}).eq("id",user.id);
    handleAuth({...user,saved_addresses:updated});
  };

  return(
    <div style={S.app}>
      <div style={S.topBar}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:800}}>👤 My Profile</div>
          <button onClick={()=>setEditMode(!editMode)} style={{backgroundColor:"rgba(255,255,255,0.25)",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {editMode?"Cancel":"✏️ Edit"}
          </button>
        </div>
      </div>
      <div style={{padding:"20px 16px 90px",overflowY:"auto",maxHeight:"calc(100vh - 70px)"}}>

        {/* Profile Card */}
        <div style={{...S.card,padding:20,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{position:"relative",flexShrink:0}}>
              <div onClick={()=>setShowEmoji(!showEmoji)} style={{width:66,height:66,borderRadius:"50%",backgroundColor:"#FF4D0015",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,border:"3px solid #FF4D00",cursor:"pointer"}}>
                {user.profile_emoji||"😊"}
              </div>
              <div style={{position:"absolute",bottom:0,right:0,backgroundColor:"#FF4D00",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",cursor:"pointer"}} onClick={()=>setShowEmoji(!showEmoji)}>✏️</div>
            </div>
            <div style={{flex:1}}>
              {editMode?(
                <>
                  <input style={{...S.inp,marginBottom:8,fontSize:13}} placeholder="Full name" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}/>
                  <input style={{...S.inp,marginBottom:8,fontSize:13}} placeholder="Phone number" value={editForm.phone} onChange={e=>setEditForm({...editForm,phone:e.target.value})} type="tel"/>
                  <button style={{...S.btn(true),borderRadius:10,padding:"10px",fontSize:14,width:"100%"}} onClick={saveProfile}>Save Changes</button>
                </>
              ):(
                <>
                  <div style={{fontSize:18,fontWeight:800}}>{user.name||"Zaiqa User"}</div>
                  <div style={{fontSize:13,color:"#888",marginTop:3}}>📧 {user.email||"—"}</div>
                  <div style={{fontSize:13,color:"#888",marginTop:2}}>📱 {user.phone||"Add phone number"}</div>
                  <div style={{fontSize:12,color:"#FF4D00",fontWeight:700,marginTop:5}}>⭐ Zaiqa Member</div>
                </>
              )}
            </div>
          </div>
          {showEmoji&&(
            <div style={{marginTop:14,borderTop:"1px solid #f3f3f3",paddingTop:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:10}}>CHOOSE AVATAR</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                {PROFILE_EMOJIS.map(e=>(
                  <div key={e} onClick={()=>pickEmoji(e)} style={{fontSize:32,cursor:"pointer",padding:4,borderRadius:10,backgroundColor:user.profile_emoji===e?"#FF4D0015":"transparent"}}>{e}</div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[[user.total_orders||0,"📦 Total Orders"],[`₹${user.total_spent||0}`,"💰 Total Spent"]].map(([val,label])=>(
            <div key={label} style={{...S.card,padding:14,textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:900,color:"#FF4D00"}}>{val}</div>
              <div style={{fontSize:12,color:"#888",marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>

        {/* Saved Addresses */}
        <div style={{...S.card,padding:16,marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>📍 Saved Addresses</div>
          {saved.length===0&&<div style={{fontSize:13,color:"#bbb",marginBottom:12,textAlign:"center",padding:"10px 0"}}>No saved addresses yet</div>}
          {saved.map((a,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:10,backgroundColor:"#F9F9F9",marginBottom:8,gap:10}}>
              <span style={{fontSize:13,flex:1}}>📍 {a}</span>
              <span onClick={()=>removeAddress(i)} style={{cursor:"pointer",color:"#FF4D00",fontWeight:700,fontSize:18,lineHeight:1}}>×</span>
            </div>
          ))}
          {saved.length<5&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input style={{...S.inp,flex:1,fontSize:13}} placeholder="Add new address" value={newAddress} onChange={e=>setNewAddress(e.target.value)}/>
              <button style={{...S.btn(false),borderRadius:10,padding:"0 16px",fontSize:18}} onClick={addAddress}>+</button>
            </div>
          )}
        </div>

        {/* Menu Items */}
        {[["📦","My Orders","Full order history","myorders"],["🎁","Offers & Coupons","ZAIQA50 • WELCOME20 • FLAT30",null],["💳","Payment Methods","COD • UPI • Card",null],["🆘","Help & Support","24/7 customer service",null]].map(([icon,title,sub,nav])=>(
          <div key={title} onClick={()=>nav&&setScreen(nav)} style={{...S.card,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:nav?"pointer":"default"}}>
            <span style={{fontSize:22}}>{icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14}}>{title}</div>
              <div style={{fontSize:12,color:"#aaa",marginTop:1}}>{sub}</div>
            </div>
            {nav&&<span style={{color:"#ddd",fontSize:18}}>›</span>}
          </div>
        ))}

        <div onClick={handleLogout} style={{...S.card,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer",backgroundColor:"#FFF0F0"}}>
          <span style={{fontSize:22}}>🚪</span>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:"#FF4D00"}}>Logout</div><div style={{fontSize:12,color:"#bbb"}}>See you soon!</div></div>
        </div>
      </div>
      <BottomNav screen={screen} setScreen={setScreen} cartCount={cartCount}/>
    </div>
  );
}

function renderMenuItem(item,rest,cart,addToCart,removeFromCart){
  return(
    <div key={item.id} style={{backgroundColor:"#fff",borderRadius:16,boxShadow:"0 2px 12px rgba(0,0,0,0.07)",padding:16,marginBottom:14,display:"flex",gap:12}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,flexWrap:"wrap"}}>
          <div style={{width:14,height:14,borderRadius:2,border:`2px solid ${item.veg?"#22C55E":"#FF4D00"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <div style={{width:6,height:6,borderRadius:"50%",backgroundColor:item.veg?"#22C55E":"#FF4D00"}}/>
          </div>
          {item.bestseller&&<span style={{fontSize:10,backgroundColor:"#F59E0B18",color:"#F59E0B",padding:"2px 8px",borderRadius:20,fontWeight:700}}>🔥 Bestseller</span>}
          {!item.veg&&rest.is_halal&&<span style={{fontSize:10,backgroundColor:"#3B82F615",color:"#3B82F6",padding:"2px 8px",borderRadius:20,fontWeight:700}}>✅ Halal</span>}
        </div>
        <div style={{fontWeight:700,fontSize:15,color:"#1A1A1A"}}>{item.name}</div>
        {item.description&&<div style={{fontSize:12,color:"#999",marginTop:3,lineHeight:1.4}}>{item.description}</div>}
        <div style={{fontWeight:900,fontSize:16,marginTop:8,color:"#1A1A1A"}}>₹{item.price}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",gap:6,flexShrink:0}}>
        <div style={{fontSize:40,lineHeight:1}}>{rest.image}</div>
        {cart[item.id]?(
          <div style={{display:"flex",alignItems:"center",gap:10,backgroundColor:"#FF4D00",borderRadius:10,padding:"6px 12px"}}>
            <span style={{color:"#fff",fontWeight:900,cursor:"pointer",fontSize:18,lineHeight:1}} onClick={()=>removeFromCart(item.id)}>−</span>
            <span style={{color:"#fff",fontWeight:800,minWidth:16,textAlign:"center"}}>{cart[item.id]}</span>
            <span style={{color:"#fff",fontWeight:900,cursor:"pointer",fontSize:18,lineHeight:1}} onClick={()=>addToCart(item,rest.name)}>+</span>
          </div>
        ):(
          <button style={{backgroundColor:"#FF4D00",color:"#fff",border:"none",borderRadius:10,padding:"8px 20px",fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>addToCart(item,rest.name)}>ADD</button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
